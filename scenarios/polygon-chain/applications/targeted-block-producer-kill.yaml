apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: targeted-block-producer-kill
  description: >
    Specifically targets and kills the current block producer — the most dangerous
    single-node failure. Existing scenarios use exclude_producer=true to avoid this;
    this scenario does the opposite.
    Jepsen reference: "Targeted Leader/Primary Kill" — directly tests the most
    dangerous crash scenario by identifying and killing the current leader rather
    than a random node.
    Specific risks tested:
    - Mid-block-production crash: the producer is killed while assembling or
      broadcasting a block, leaving an incomplete block in the network
    - Span rotation trigger: Heimdall must detect the producer's absence and
      rotate to the next validator in the span. Tests whether span rotation
      fires correctly and the next producer picks up without gap
    - Bor sprint continuity: Bor uses producer sprints (consecutive blocks by
      the same producer). Killing mid-sprint tests whether the remaining sprint
      blocks are handled correctly by other validators
    - Double-sign risk: if the killed producer restarts quickly and doesn't
      realize it's no longer the producer, it may attempt to produce blocks
      concurrently with the new producer
    Targets all validators with exclude_producer=false to ensure we hit the
    active producer. Two kill cycles to test producer failover twice.
  tags: [applications, targeted-kill, block-producer, leader-kill, operator-error, span-rotation]
  author: DevTools
  version: "0.1.0"
  references:
    - "Jepsen: Targeted Leader/Primary Kill"

spec:
  targets:
    # Target a specific validator — the scenario runner should identify
    # the current block producer via Heimdall API and target it.
    # We target two validators to increase the probability of hitting
    # the active producer in any given span.
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-5-heimdall-v2-bor-validator"
      alias: heimdall_5

  duration: 6m
  warmup: 30s
  cooldown: 3m

  faults:
    # Kill cycle 1 — target producer, immediate restart
    - phase: kill_producer_bor_3
      description: "SIGKILL Bor 3 — targeting likely block producer mid-sprint"
      target: bor_3
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      exclude_producer: false

    - phase: kill_producer_heimdall_3
      description: "SIGKILL Heimdall 3 — consensus layer of targeted producer"
      target: heimdall_3
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      exclude_producer: false

    - phase: kill_producer_bor_5
      description: "SIGKILL Bor 5 — second target for producer coverage"
      target: bor_5
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      exclude_producer: false

    - phase: kill_producer_heimdall_5
      description: "SIGKILL Heimdall 5 — consensus layer of second target"
      target: heimdall_5
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      exclude_producer: false

    # Kill cycle 2 — kill again after recovery to test producer re-election stability
    - phase: kill_producer_bor_3_round2
      description: "Second SIGKILL Bor 3 — kill after recovery, may be re-elected producer"
      target: bor_3
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 45s
      exclude_producer: false

    - phase: kill_producer_heimdall_3_round2
      description: "Second SIGKILL Heimdall 3 — stress span rotation twice"
      target: heimdall_3
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 45s
      exclude_producer: false

  success_criteria:
    - name: block_production_continues
      description: Network continues producing blocks after producer killed — span rotation works
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[124678]-bor-heimdall-v2-validator"}[1m])[6m:1m]))
      threshold: "> 0"
      window: 6m
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances after producer validator killed
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 6m
      critical: true

    - name: killed_validators_recover
      description: Killed producer validators come back online
      type: prometheus
      query: min(up{job=~"l2-el-[35]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: block_sync_resumes
      description: Killed producers resume sync — re-establish chain state
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[35]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: chain_head_converges
      description: No permanent fork from producer kill — chain converges
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: span_rotation_detected
      description: >
        Span rotation fires after producer killed — proves Heimdall detects
        producer absence and rotates correctly
      type: log
      pattern: "(span.*rotat|new.*producer|producer.*change)"
      container_pattern: "heimdall-v2-bor-validator"
      absence: false
      critical: false
      post_fault_only: true

    - name: no_double_sign
      description: No double-signing detected after producer restarts
      type: log
      pattern: "(double.*sign|duplicate.*block|conflicting.*proposal)"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: true
      post_fault_only: true

    - name: span_api_healthy
      description: Span API calls succeed after producer failover
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 6m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - cometbft_p2p_peers
    - up
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - client_requests_span_valid
    - client_requests_span_invalid
