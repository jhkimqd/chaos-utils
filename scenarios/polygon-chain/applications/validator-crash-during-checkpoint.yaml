apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: validator-crash-during-checkpoint
  description: Validator suffers multiple crashes during checkpoint submission - tests checkpoint recovery with subtle degradation metrics
  tags: [crash, restart, checkpoint, edge-case, high-severity, subtle-metrics]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: checkpoint_submitter_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: checkpoint_submitter_bor

  duration: 10m
  warmup: 2m
  cooldown: 3m

  # Multiple validator crashes to stress recovery mechanisms
  # Using container_restart instead of container_kill to avoid Docker filesystem state issues
  # Checkpoint submission happens periodically, so crashes will likely intersect
  faults:
    # First crash - early in test
    - phase: crash_heimdall_1
      description: First crash of Heimdall validator (simulates early crash + recovery)
      target: checkpoint_submitter_heimdall
      type: container_restart
      params:
        grace_period: 0  # Immediate kill (simulates SIGKILL)
        restart_delay: 3  # Reduced from 5s for faster recovery testing
      delay: 2m  # Crash after 2 minutes

    - phase: crash_bor_1
      description: First crash of Bor validator (simulates early crash + recovery)
      target: checkpoint_submitter_bor
      type: container_restart
      params:
        grace_period: 0
        restart_delay: 3
      delay: 2m

    # Second crash - mid test
    - phase: crash_heimdall_2
      description: Second crash of Heimdall validator (stress recovery mechanisms)
      target: checkpoint_submitter_heimdall
      type: container_restart
      params:
        grace_period: 0
        restart_delay: 3
      delay: 5m  # Crash again after recovering from first

    - phase: crash_bor_2
      description: Second crash of Bor validator (stress recovery mechanisms)
      target: checkpoint_submitter_bor
      type: container_restart
      params:
        grace_period: 0
        restart_delay: 3
      delay: 5m

  success_criteria:
    # ========== CRITICAL BASELINE (Must Pass) ==========

    - name: network_survives_crash
      description: CRITICAL - Other validators continue producing blocks without any 1-minute gap
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[134]-bor-heimdall-v2-validator"}[1m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    - name: checkpoints_continue
      description: CRITICAL - Checkpoint API calls continue from other validators
      type: prometheus
      query: sum(rate(heimdallv2_checkpoint_api_calls_total{job!="l2-cl-2-heimdall-v2-bor-validator"}[5m])) or vector(0)
      threshold: "> 0"
      window: 10m
      critical: true

    - name: crashed_validator_recovers
      description: BASELINE - Crashed validators come back online after restarts (both Heimdall and Bor)
      type: prometheus
      query: min(up{job=~"l2-(cl|el)-2-(heimdall-v2-bor|bor-heimdall-v2)-validator"})
      threshold: "== 1"
      window: 10m
      critical: false

    # ========== SUBTLE DEGRADATION METRICS (Detect Stress) ==========

    - name: missed_proposals_during_recovery
      description: Missed proposals under 8/min (crashes cause missed proposal opportunities)
      type: prometheus
      query: sum(rate(panoptichain_heimdall_missed_block_proposal{job="l2-cl-2-heimdall-v2-bor-validator"}[2m])) * 60
      threshold: "< 8"
      window: 10m
      critical: false

    - name: peer_reconnection_after_crash
      description: P2P peers reconnect (minimum 3 peers after recovery)
      type: prometheus
      query: min_over_time(cometbft_p2p_peers{job="l2-cl-2-heimdall-v2-bor-validator"}[2m])
      threshold: ">= 3"
      window: 10m
      critical: false

    - name: late_votes_during_sync
      description: Late votes under 2500/min (crash recovery causes sync delays)
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job="l2-cl-2-heimdall-v2-bor-validator"}[2m])) * 60
      threshold: "< 2500"
      window: 10m
      critical: false

    - name: consensus_height_recovery
      description: Validator syncs back (height increases after crashes) — gap detection on recovery window
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job="l2-cl-2-heimdall-v2-bor-validator"}[3m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: false

    - name: validator_power_maintained
      description: Validator maintains voting power (doesn't get jailed)
      type: prometheus
      query: cometbft_consensus_validator_power{job="l2-cl-2-heimdall-v2-bor-validator"}
      threshold: "> 0"
      window: 10m
      critical: false

    # Fault effectiveness: crashed validator briefly shows missing validators
    - name: crash_causes_missing_validator
      description: Crash causes validator 2 to briefly disappear from consensus
      type: prometheus
      query: max_over_time(cometbft_consensus_missing_validators{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[10m])
      threshold: "> 0"
      window: 10m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 10m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false


  metrics:
    # Basic metrics
    - chain_head_block
    - cometbft_consensus_height
    - heimdallv2_checkpoint_api_calls_total
    - heimdallv2_checkpoint_api_calls_success_total
    - up

    # Subtle degradation metrics
    - panoptichain_heimdall_missed_block_proposal
    - cometbft_p2p_peers
    - cometbft_consensus_late_votes
    - cometbft_consensus_validator_power
    - cometbft_consensus_missing_validators
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
