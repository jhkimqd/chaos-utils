apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: chaindata-wipe-resync
  description: >
    Wipe a validator's chaindata directory and force it to resync from peers —
    simulates total disk failure, accidental "rm -rf chaindata", or deliberate
    data directory cleanup by an operator troubleshooting corruption.
    Jepsen reference: "Single-Node Data Reformatting" — a node's entire data is
    wiped, simulating total disk failure and replacement. After reformatting, the
    cluster can elect a new leader without observing the reformatted node's
    committed operations. If the reformatted node had the only copy of certain
    operations, those operations are permanently lost.
    Specific risks tested:
    - PebbleDB state loss: the validator's entire PebbleDB state (chaindata,
      trie cache, receipts) is deleted. The node must resync everything from
      peers via P2P
    - Sync protocol correctness: the wiped node has no state — it must negotiate
      sync from genesis or from a recent snapshot. Tests whether the P2P sync
      protocol handles a completely empty peer correctly
    - Peer load during resync: the wiped node requests large amounts of data
      from healthy peers, potentially degrading their performance
    - Identity preservation: the node retains its validator keys but has no chain
      state. Tests whether it correctly re-establishes its validator identity
      without the chain history
    - Heimdall state recovery: CometBFT state (validator set, app hash) must
      be reconstructed. If the Heimdall state DB is also wiped, the node must
      state sync from peers
    Uses file_delete fault to remove chaindata before restarting the node.
  tags: [applications, chaindata-wipe, resync, disk-failure, operator-error, data-loss]
  author: DevTools
  version: "0.1.0"
  references:
    - "Jepsen: Single-Node Data Reformatting"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-6-heimdall-v2-bor-validator"
      alias: heimdall_6

  duration: 5m
  warmup: 30s
  # 3m cooldown: full chaindata wipe forces v6 to resync from genesis after
  # restart. Cold start + peer discovery + initial header sync + bulk block
  # download takes well over 1m on an 8-validator devnet. State-root consensus
  # is overridden below to skip v6 (still-resyncing node would mark unreachable).
  cooldown: 3m

  faults:
    # Phase 1: Wipe Bor chaindata while running — PebbleDB loses its
    # data directory underneath it, causing immediate read/write failures
    - phase: wipe_bor_chaindata
      description: "Delete Bor chaindata directory while running — simulate disk failure"
      target: bor_6
      type: file_delete
      params:
        target_path: "/var/lib/bor/bor/chaindata"
        recursive: true

    # Phase 2: Kill and restart both layers to force clean resync from peers
    - phase: kill_restart_bor
      description: "SIGKILL Bor 6 — restart with empty chaindata, must resync"
      target: bor_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 10s

    - phase: kill_restart_heimdall
      description: "SIGKILL Heimdall 6 — restart alongside Bor"
      target: heimdall_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 10s

  success_criteria:
    # Critical: wiped validator comes back online
    - name: wiped_validator_online
      description: Wiped validator process starts and becomes healthy
      type: prometheus
      query: up{job="l2-el-6-bor-heimdall-v2-validator"}
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: heimdall_online
      description: Heimdall comes back online
      type: prometheus
      query: up{job="l2-cl-6-heimdall-v2-bor-validator"}
      threshold: "== 1"
      critical: true
      post_fault_only: true

    # Critical: wiped node begins syncing (block height increasing)
    - name: resync_begins
      description: >
        Wiped Bor node begins syncing from peers — chain head is advancing.
        This proves the P2P sync protocol handles a completely empty peer.
      type: prometheus
      query: rate(chain_head_block{job="l2-el-6-bor-heimdall-v2-validator"}[2m])
      threshold: "> 0"
      critical: true
      post_fault_only: true

    # Critical: other validators unaffected by resync load
    - name: healthy_validators_unaffected
      description: >
        Other 7 validators maintain block production — resync load from
        wiped node doesn't degrade healthy peers
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[123578]-bor-heimdall-v2-validator"}[3m]))
      threshold: "> 0"
      critical: true

    # Critical: consensus continues
    - name: consensus_continues
      description: Heimdall consensus continues with 7/8 validators
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    # Critical: Heimdall validator rejoins consensus
    - name: heimdall_rejoins
      description: Wiped Heimdall validator rejoins consensus
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-6-heimdall-v2-bor-validator"}[2m])
      threshold: "> 0"
      critical: true
      post_fault_only: true

    # Informational: peer connectivity
    - name: wiped_node_finds_peers
      description: Wiped node re-establishes peer connections
      type: prometheus
      query: min(cometbft_p2p_peers{job="l2-cl-6-heimdall-v2-bor-validator"})
      threshold: "> 3"
      critical: false
      post_fault_only: true

    # Informational: no crash during resync
    - name: no_crash_during_resync
      description: Wiped node doesn't crash during resync (stable after wipe)
      type: log
      pattern: "(panic|fatal|SIGSEGV|unexpected.*fault)"
      container_pattern: "l2-el-6-bor-heimdall-v2-validator"
      absence: true
      critical: false
      post_fault_only: true

    - name: no_identity_confusion
      description: No validator identity issues after resync with retained keys
      type: log
      pattern: "(wrong.*validator|invalid.*key|identity.*mismatch)"
      container_pattern: "l2-.*-6-.*-validator"
      absence: true
      critical: false
      post_fault_only: true

    # Override universal state_root_consensus: v6 is being fully resynced from
    # genesis and may still be unreachable / behind when the universal check
    # runs. Without this override the universal check would false-fail on the
    # exact "wiped node still catching up" condition this scenario tests.
    - name: "[universal] state_root_consensus"
      description: All non-wiped validators converge on the same state root after resync (v6 excluded — still resyncing)
      type: state_root_consensus
      container_pattern: "l2-el-[123578]-bor-heimdall-v2-validator"
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - cometbft_p2p_peers
    - up
    - system_cpu_goroutines
    - process_resident_memory_bytes
