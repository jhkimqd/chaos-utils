apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: rapid-restart-flapping
  description: >
    Simulates an operator or automation tool rapidly restarting a validator
    multiple times in quick succession — the classic "it's not working, let me
    restart it again" pattern. Each cycle sends SIGKILL followed by restart
    after only 3s, so the process barely has time to open the database and
    begin syncing before being killed again.
    Uses container_kill (not container_restart) because container_restart
    treats grace_period=0 as 10s default — defeating the "immediate kill"
    intent. container_kill sends the signal directly via Docker API.
    This is particularly dangerous for PebbleDB because:
    - Each startup triggers WAL replay and potentially incomplete compaction
    - Killing during WAL replay can compound the corruption from the prior crash
    - The LOCK file may not be released cleanly between cycles
    - Bor's in-memory caches (header chain, state trie) never populate, so each
      restart does more cold-start I/O than the last
    Also stresses Heimdall's consensus — repeated validator disappearances can
    cause missed proposals and may trigger span rotation if the validator is the
    current block producer.
    Targets 1 validator to test single-node resilience without risking quorum.
  tags: [applications, restart, flapping, operator-error, pebbledb, rapid-cycle]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-6-heimdall-v2-bor-validator"
      alias: heimdall_6

  duration: 2m
  warmup: 30s
  cooldown: 1m

  faults:
    # Restart cycle 1 — first kill, DB was healthy
    - phase: flap_bor_1
      description: "Restart 1/5 — SIGKILL healthy Bor, 3s down"
      target: bor_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3

    - phase: flap_heimdall_1
      description: "Restart 1/5 — SIGKILL Heimdall alongside Bor"
      target: heimdall_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3

    # Restart cycle 2 — kill during WAL replay / cold start
    - phase: flap_bor_2
      description: "Restart 2/5 — SIGKILL Bor during startup/WAL replay"
      target: bor_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3
      delay: 15s

    - phase: flap_heimdall_2
      description: "Restart 2/5 — SIGKILL Heimdall during CometBFT init"
      target: heimdall_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3
      delay: 15s

    # Restart cycle 3 — compounding pressure
    - phase: flap_bor_3
      description: "Restart 3/5 — Bor killed again, DB has seen 2 unclean shutdowns"
      target: bor_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3
      delay: 30s

    - phase: flap_heimdall_3
      description: "Restart 3/5 — Heimdall killed again"
      target: heimdall_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3
      delay: 30s

    # Restart cycle 4 — still hammering
    - phase: flap_bor_6
      description: "Restart 4/5 — repeated crash stress on PebbleDB"
      target: bor_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3
      delay: 45s

    - phase: flap_heimdall_6
      description: "Restart 4/5 — CometBFT state machine stress"
      target: heimdall_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3
      delay: 45s

    # Restart cycle 5 — final crash, then let it recover
    - phase: flap_bor_5
      description: "Restart 5/5 — final SIGKILL, now let Bor recover fully"
      target: bor_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3
      delay: 60s

    - phase: flap_heimdall_5
      description: "Restart 5/5 — final SIGKILL, let Heimdall recover"
      target: heimdall_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 3
      delay: 60s

  success_criteria:
    - name: validator_recovers_after_flapping
      description: Validator comes back online after 5 rapid restart cycles
      type: prometheus
      query: min(up{job=~"l2-el-6-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: block_sync_resumes
      description: Bor resumes block sync — PebbleDB survived 5 unclean shutdowns
      type: prometheus
      query: rate(chain_head_block{job="l2-el-6-bor-heimdall-v2-validator"}[1m])
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: heimdall_rejoins_consensus
      description: Heimdall validator rejoins consensus after flapping
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-6-heimdall-v2-bor-validator"}[1m])
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: peer_count_recovers
      description: Validator reconnects to peers — not permanently jailed
      type: prometheus
      query: min(cometbft_p2p_peers{job="l2-cl-6-heimdall-v2-bor-validator"})
      threshold: "> 3"
      critical: true
      post_fault_only: true

    - name: chain_head_converges
      description: Flapping validator catches up — no permanent fork
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    # F2 fix: widen to 3m, keep min() — every unaffected validator must produce.
    - name: healthy_validators_unaffected
      description: Other 7 validators maintain block production throughout
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[123578]-bor-heimdall-v2-validator"}[3m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances despite flapping validator
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: no_db_corruption_log
      description: No PebbleDB corruption errors despite 5 unclean shutdowns
      type: log
      pattern: "(corruption|MANIFEST.*error|pebble.*panic|LOCK.*held)"
      container_pattern: "l2-el-6-bor-heimdall-v2-validator"
      absence: true
      critical: false
      post_fault_only: true

    - name: goroutine_count_stable
      description: No goroutine leak from repeated startup/shutdown cycles
      type: prometheus
      query: system_cpu_goroutines{job="l2-el-6-bor-heimdall-v2-validator"}
      threshold: "< 5000"
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - system_cpu_goroutines
    - up
