apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: mixed-dependency-failure
  description: Multiple dependencies fail in different ways - some with errors, others with high latency
  tags: [network, dependency, latency, failure, high-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    # L1 RPC node - complete failure
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "el-\\d+-geth-lighthouse"
      alias: l1_rpc_failed

    # RabbitMQ - high latency
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "rabbitmq"
      alias: rabbitmq_slow

  duration: 10m
  warmup: 1m
  cooldown: 1m

  faults:
    # Dependency 1: Complete L1 RPC failure (100% packet loss)
    - phase: l1_rpc_failure
      description: L1 RPC completely unavailable
      target: l1_rpc_failed
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_ports: "8545,8546"
        target_proto: tcp

    # Dependency 2: RabbitMQ with severe latency (10x normal)
    - phase: rabbitmq_latency
      description: RabbitMQ responds with 1000ms latency (10x increase)
      target: rabbitmq_slow
      type: network
      params:
        device: eth0
        latency: 1000
        target_ports: "5672,15672"
        target_proto: tcp

  success_criteria:
    # Critical: L2 block production continues — gap detection
    - name: l2_resilient_to_mixed_failures
      description: L2 continues producing blocks without any 2-minute gap despite mixed dependency failures
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Critical: Consensus continues — gap detection
    - name: consensus_resilient
      description: Heimdall consensus continues without any 2-minute gap despite dependency issues
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Non-critical: Checkpoint API may be degraded but accessible — rate bound
    - name: checkpoint_api_degraded
      description: Checkpoint API still accessible at a meaningful rate despite L1 issues
      type: prometheus
      query: min(min_over_time(rate(heimdallv2_checkpoint_api_calls_total[5m])[10m:3m]))
      threshold: "> 0.1"
      window: 10m
      critical: false

    # Fault effectiveness: L1 failure causes measurable checkpoint success degradation
    - name: checkpoint_success_rate_degrades
      description: L1 packet loss causes checkpoint success rate to drop below 100%
      type: prometheus
      query: increase(heimdallv2_checkpoint_api_calls_total[10m]) - increase(heimdallv2_checkpoint_api_calls_success_total[10m])
      threshold: "> 0"
      window: 10m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 10m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - heimdallv2_checkpoint_api_calls_total
    - heimdallv2_checkpoint_api_calls_success_total
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
