apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: coordinated-full-cluster-crash
  description: >
    SIGKILL all validators simultaneously — unlike simultaneous-validator-restart
    which uses graceful SIGTERM with grace_period=10, this scenario sends SIGKILL
    to every node at the same time, simulating a datacenter power failure or
    coordinated OOM kill event.
    Jepsen reference: "Coordinated Full-Cluster Crash" + "Cold Start Race
    Conditions" — defeats the assumption that "at least one node will have the
    latest data." The 30s dead period ensures all TCP connections fully time
    out, all peer state is purged, and all ephemeral state is gone before
    the cluster attempts to reform from scratch.
    Specific risks tested:
    - Total data loss window: blocks committed to memory but not yet fsynced are
      lost on ALL nodes simultaneously. No surviving replica means these blocks
      are permanently gone
    - PebbleDB WAL recovery on every node: all 8 validators must independently
      recover their PebbleDB state from WAL, with no peer to cross-reference
    - CometBFT consensus restart from zero: all Heimdall validators must
      re-establish consensus from persisted state, test whether they agree on
      the same last committed height
    - Cold start bootstrap race: after 30s dead period, all nodes start P2P
      discovery simultaneously. If bootnodes or seeds are slow, validators may
      fail to find peers and stall. Each validator must decide whether to replay
      from WAL or start fresh
    - Cold start thundering herd: all nodes start simultaneously, all try to
      connect to each other, all replay WAL at the same time — maximum resource
      contention
    - Fork risk: if nodes recover to different heights due to varying fsync
      progress, the network may briefly fork before convergence
  tags: [applications, full-cluster-crash, cold-start, sigkill, power-failure, operator-error, pebbledb]
  author: DevTools
  version: "0.1.0"
  references:
    - "Jepsen: Coordinated Full-Cluster Crash"
    - "Jepsen: Cold Start Race Conditions"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-[1235678]-bor-heimdall-v2-validator"
      alias: all_bor_validators
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-.*-heimdall-v2-bor-validator"
      alias: all_heimdall_validators

  duration: 2m
  warmup: 20s
  cooldown: 3m  # Extended cooldown: all 16 containers (8 Bor + 8 Heimdall) restart
                # simultaneously after SIGKILL. CometBFT cold-start P2P mesh
                # re-establishment + consensus catch-up requires more than 90s.

  faults:
    # SIGKILL all Heimdall validators simultaneously — consensus layer first
    # to ensure no "last commit" messages escape during shutdown
    - phase: crash_all_heimdall
      description: "SIGKILL all Heimdall validators simultaneously — total consensus layer crash"
      target: all_heimdall_validators
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 30

    # SIGKILL all Bor validators simultaneously
    - phase: crash_all_bor
      description: "SIGKILL all Bor validators simultaneously — total execution layer crash"
      target: all_bor_validators
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 30

  success_criteria:
    # Critical: all validators come back online
    - name: all_validators_online
      description: All validators recover from simultaneous SIGKILL
      type: prometheus
      query: count(up{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"} == 1) / scalar(count(up{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}))
      threshold: ">= 1"
      critical: true

    # Critical: block production resumes
    - name: block_production_resumes
      description: >
        Block production resumes after total cluster crash — no permanent halt.
        Uses max() across validators so a single slow cold-start recoverer cannot
        mask cluster-wide progress; a true halt (every validator stuck) still
        drops max to 0. Per-validator lag is covered separately by
        chain_head_converges. [3m] rate window absorbs the cold-start tail.
      type: prometheus
      query: max(rate(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}[3m]))
      threshold: "> 0"
      critical: true

    # Critical: consensus resumes
    - name: consensus_resumes
      description: Heimdall consensus re-establishes from persisted state
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    # Critical: chain converges — no fork from different recovery heights
    - name: chain_head_converges
      description: >
        All validators converge to same chain head — no fork from nodes
        recovering to different heights due to varying fsync progress
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    # Critical: Heimdall validators agree on committed height
    - name: heimdall_height_converges
      description: >
        All Heimdall validators agree on consensus height — tests whether
        CometBFT correctly replays to the same state after simultaneous crash
      type: prometheus
      query: >
        max(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"})
        - min(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"})
      threshold: "< 20"
      critical: true
      post_fault_only: true

    # Critical: peer mesh reforms after cold start
    - name: peer_mesh_reforms
      description: >
        P2P mesh reforms after 30s dead period — all validators find peers.
        Tests bootstrap race when all nodes start simultaneously with no
        existing mesh.
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-.*-heimdall-v2-bor-validator"})
      threshold: "> 3"
      critical: true
      post_fault_only: true

    # Informational: crash was effective (all nodes went down)
    # Instant min(up) is always 1 post-cooldown because every validator has
    # recovered by the time criteria are evaluated. min_over_time with an 8m
    # look-back covers the full timeline (warmup 20s + duration 2m + cooldown
    # 3m ≈ 5.5m) and correctly captures the fault window. Mirrors the pattern
    # documented in simultaneous-validator-restart.yaml (restart_causes_brief_outage).
    - name: crash_was_effective
      description: All nodes went down during fault — proves simultaneous crash occurred
      type: prometheus
      query: max(1 - min_over_time(up{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}[8m]))
      threshold: "> 0"
      critical: false

    # Informational: no DB corruption from unclean crash
    - name: no_db_corruption
      description: No PebbleDB corruption from simultaneous unclean crash
      type: log
      pattern: "(corruption|MANIFEST.*error|pebble.*panic)"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: false
      post_fault_only: true

    - name: no_consensus_divergence
      description: No evidence of consensus disagreement after recovery
      type: log
      pattern: "(conflicting.*block|wrong.*block.*hash|consensus.*diverge)"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: true
      post_fault_only: true

    - name: block_intervals_acceptable
      description: Block intervals normalize after recovery — no persistent slowdown
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - cometbft_consensus_validators
    - cometbft_p2p_peers
    - up
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
