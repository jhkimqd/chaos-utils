apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: rolling-validator-restart
  description: Validators restart one-by-one with delay - proper upgrade procedure
  tags: [restart, upgrade, rolling-update, best-practice]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: validator1_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: validator1_bor

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: validator2_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: validator2_bor

  # NOTE: Validators 3+ are optional; if absent the scenario still runs
  # with the validators that exist. BFT quorum requires >=3 validators
  # for block production to continue during a rolling restart.
  duration: 6m
  warmup: 2m
  cooldown: 2m

  # Rolling restart: 2 minutes between each validator restart
  faults:
    # Validator 1 restart at 0m
    - phase: restart_validator1_heimdall
      target: validator1_heimdall
      type: container_restart
      params:
        grace_period: 10
      delay: 0m

    - phase: restart_validator1_bor
      target: validator1_bor
      type: container_restart
      params:
        grace_period: 10
      delay: 0m

    # Validator 2 restart at 3m
    - phase: restart_validator2_heimdall
      target: validator2_heimdall
      type: container_restart
      params:
        grace_period: 10
      delay: 3m

    - phase: restart_validator2_bor
      target: validator2_bor
      type: container_restart
      params:
        grace_period: 10
      delay: 3m

  success_criteria:
    # Critical: Block production never stops — gap detection
    - name: continuous_block_production
      description: Block production continues without any 1-minute gap throughout rolling restart
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[6m:2m]))
      threshold: "> 0"
      window: 6m
      critical: true

    # Critical: Consensus never halts — gap detection
    - name: continuous_consensus
      description: Consensus continues without any 1-minute gap throughout rolling restart
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[1m])[6m:2m]))
      threshold: "> 0"
      window: 6m
      critical: true

    # Critical: At least 2/3 of validators always active (maintains BFT quorum threshold)
    - name: quorum_maintained
      description: At least 2/3 of validators active at all times (topology-safe ratio check)
      type: prometheus
      query: count(up{job=~"l2-cl-.*-heimdall-v2-bor-validator"} == 1) / scalar(count(up{job=~"l2-cl-.*-heimdall-v2-bor-validator"}))
      threshold: ">= 0.67"
      window: 6m
      critical: true

    # Fault effectiveness: rolling restart causes brief missing validators
    - name: restart_causes_brief_missing_validators
      description: Rolling restart causes at least one validator to briefly disappear from consensus
      type: prometheus
      query: max_over_time(cometbft_consensus_missing_validators{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[6m])
      threshold: "> 0"
      window: 6m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 6m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 6m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 6m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_validators
    - cometbft_consensus_missing_validators
    - up
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
