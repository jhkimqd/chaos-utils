apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: test-single-restart
  description: Single validator restart with rapid recovery - tests restart resilience with subtle degradation metrics
  tags: [test, restart, validation, subtle-metrics]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    # Target a single validator to test restart and recovery
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: test_validator_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: test_validator_bor

  duration: 3m
  warmup: 30s
  cooldown: 30s

  # Rapid restart with minimal delay
  faults:
    - phase: test_restart_heimdall
      description: Rapid restart of heimdall validator (simulates quick crash + recovery)
      target: test_validator_heimdall
      type: container_restart
      params:
        grace_period: 0
        restart_delay: 1  # Very quick restart
      delay: 1m

    - phase: test_restart_bor
      description: Rapid restart of bor validator (simulates quick crash + recovery)
      target: test_validator_bor
      type: container_restart
      params:
        grace_period: 0
        restart_delay: 1  # Very quick restart
      delay: 1m

  success_criteria:
    # ========== CRITICAL BASELINE (Must Pass) ==========

    - name: network_continues
      description: CRITICAL - Healthy validators continue producing blocks without any 1-minute gap during restart
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[134]-bor-heimdall-v2-validator"}[1m])[3m:1m]))
      threshold: "> 0"
      window: 3m
      critical: true

    - name: validator_recovers
      description: BASELINE - Heimdall validator comes back online quickly
      type: prometheus
      query: up{job="l2-cl-2-heimdall-v2-bor-validator"}
      threshold: "== 1"
      window: 3m
      critical: false

    - name: bor_validator_recovers
      description: BASELINE - Bor validator comes back online quickly
      type: prometheus
      query: up{job="l2-el-2-bor-heimdall-v2-validator"}
      threshold: "== 1"
      window: 3m
      critical: false

    # ========== SUBTLE DEGRADATION METRICS (Detect Stress) ==========

    - name: missed_proposals_minimal
      description: Missed proposals under 3 (quick restart minimizes impact)
      type: prometheus
      query: sum(increase(panoptichain_heimdall_missed_block_proposal{job="l2-cl-2-heimdall-v2-bor-validator"}[3m]))
      threshold: "< 3"
      window: 3m
      critical: false

    - name: late_votes_during_recovery
      description: Late votes under 500 total (brief spike during restart)
      type: prometheus
      query: sum(increase(cometbft_consensus_late_votes{job="l2-cl-2-heimdall-v2-bor-validator"}[3m]))
      threshold: "< 500"
      window: 3m
      critical: false

    - name: peer_reconnection_fast
      description: P2P peers reconnect quickly (at least 1 peer, topology-safe)
      type: prometheus
      query: min_over_time(cometbft_p2p_peers{job="l2-cl-2-heimdall-v2-bor-validator"}[1m])
      threshold: ">= 1"
      window: 3m
      critical: false

    - name: consensus_height_resumes
      description: Validator resumes consensus participation after restart
      type: prometheus
      query: increase(cometbft_consensus_height{job="l2-cl-2-heimdall-v2-bor-validator"}[1m])
      threshold: "> 0"
      window: 3m
      critical: false

    - name: bor_block_production_resumes
      description: Bor resumes block production after restart
      type: prometheus
      query: increase(chain_head_block{job="l2-el-2-bor-heimdall-v2-validator"}[1m])
      threshold: "> 0"
      window: 3m
      critical: false

    # Fault effectiveness: healthy validators maintain uninterrupted consensus
    - name: healthy_validators_uninterrupted
      description: Validators 1,3,4 maintain consensus without any gap during v2 restart
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[134]-heimdall-v2-bor-validator"}[1m])[3m:1m]))
      threshold: "> 0"
      window: 3m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 3m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 3m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 3m
      critical: false


  metrics:
    # Basic metrics
    - chain_head_block
    - cometbft_consensus_height
    - up

    # Subtle degradation metrics
    - panoptichain_heimdall_missed_block_proposal
    - cometbft_consensus_late_votes
    - cometbft_p2p_peers
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
