apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: heimdall-rest-failure-during-state-sync
  description: >
    Returns HTTP 500 on the Heimdall REST port (1317) of validators 1 and 2
    so the local bor's CommitStates → StateSyncEvents path hits the error
    branch. Checks that the chain keeps moving under a healthy quorum
    member, that faulted validators resync after the fault lifts, and that
    the target error log line is observed on bor during the fault window.

    Cluster: 3 validators (1,2,3) + 1 RPC (4). Sprint=16, span=128,
    block_time=1s. Duration 3m covers multiple state-sync fetch cycles.

  tags: [state-sync, heimdall, silent-failure, high-severity]
  author: chaos-utils
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: heimdall_1
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2

  duration: 3m
  warmup: 30s
  cooldown: 90s

  faults:
    - phase: http_fault_heimdall_1
      description: "Return HTTP 500 on Heimdall REST port 1317 so bor's CommitStates → StateSyncEvents path hits the error branch."
      target: heimdall_1
      type: http_fault
      params:
        target_port: 1317
        abort_code: 500
        abort_percent: 100

    - phase: http_fault_heimdall_2
      description: >
        Simultaneously fault heimdall-2 on REST port 1317 to exercise
        the same error path on a second validator. Faulting 2/3 leaves
        bor-3 as the quorum producer so the chain still moves while
        bor-1 and bor-2 see REST failures.
      target: heimdall_2
      type: http_fault
      params:
        target_port: 1317
        abort_code: 500
        abort_percent: 100

  success_criteria:
    - name: error_log_emitted
      description: >
        Target log line "Error occurred when fetching state sync events"
        appeared on at least one of the two faulted bor nodes during
        the fault window — confirms bor reached the error branch.
      type: log
      pattern: "Error occurred when fetching state sync events"
      container_pattern: "l2-el-[12]-bor-heimdall-v2-validator"
      absence: false
      critical: true
      post_fault_only: true

    - name: chain_continues
      description: "Healthy validator 3 keeps producing blocks during fault"
      type: prometheus
      query: rate(chain_head_block{job="l2-el-3-bor-heimdall-v2-validator"}[2m])
      threshold: "> 0"
      critical: false

    - name: faulted_validator_catches_up
      description: "After fault lifts, the faulted validator must catch up to within 500 blocks of the cluster head."
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job="l2-el-1-bor-heimdall-v2-validator"})
      threshold: "< 500"
      critical: false
      post_fault_only: true

    - name: no_heimdall_panic
      description: "Heimdall container doesn't panic from the fault injection itself"
      type: log
      pattern: "(panic|fatal|CONSENSUS FAILURE)"
      container_pattern: "l2-cl-1-heimdall-v2-bor-validator"
      absence: true
      critical: true

    - name: no_bor_panic
      description: "Bor doesn't panic under the REST-failure scenario"
      type: log
      pattern: "(panic:|fatal error:|runtime error:)"
      container_pattern: "l2-el-1-bor-heimdall-v2-validator"
      absence: true
      critical: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - up
