apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: pure-stress-baseline
  description: >
    CPU and memory stress on validators WITHOUT any fault injection — a pure
    stress test that establishes whether the system can handle high load on a
    healthy cluster. No kills, no partitions, no crashes — just resource
    contention.
    Jepsen reference: "Concurrent Writes Without Faults (Pure Stress)" — many
    systems fail even without network faults. This baseline test proves whether
    the system is stable under load before layering fault injection on top.
    Specific risks tested:
    - CPU contention: validators share CPU with stress-ng. Block production
      may slow if consensus or block assembly can't get CPU time
    - Memory pressure: stress-ng consumes memory alongside the validator
      processes. Tests whether Go's GC can handle increased heap pressure
      without long GC pauses that cause missed proposals
    - Goroutine scheduling: under CPU contention, goroutine scheduling becomes
      more variable. P2P heartbeats, consensus rounds, and block propagation
      may experience jitter that triggers timeout-based failure detection
    - Baseline performance: establishes block production rate and consensus
      speed under load, which can be compared against fault injection scenarios
  tags: [applications, stress, baseline, cpu, memory, no-faults]
  author: DevTools
  version: "0.1.0"
  references:
    - "Jepsen: Concurrent Writes Without Faults (Pure Stress)"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-7-bor-heimdall-v2-validator"
      alias: bor_7

  duration: 6m
  warmup: 1m
  cooldown: 2m

  faults:
    # CPU stress on 3 validators (moderate — 70% of 2 cores)
    - phase: cpu_stress_bor_3
      description: "CPU stress on Bor 3 — 70% of 2 cores"
      target: bor_3
      type: cpu_stress
      params:
        cpu_percent: 70
        cores: 2
        # duration param is ignored by stress wrapper — runs until TEARDOWN

    - phase: cpu_stress_bor_5
      description: "CPU stress on Bor 5"
      target: bor_5
      type: cpu_stress
      params:
        cpu_percent: 70
        cores: 2
        # duration param is ignored by stress wrapper — runs until TEARDOWN

    - phase: cpu_stress_bor_7
      description: "CPU stress on Bor 7"
      target: bor_7
      type: cpu_stress
      params:
        cpu_percent: 70
        cores: 2
        # duration param is ignored by stress wrapper — runs until TEARDOWN

    # Memory stress on same validators (moderate — 1GB)
    - phase: memory_stress_bor_3
      description: "Memory stress on Bor 3 — consume 1GB"
      target: bor_3
      type: memory_stress
      params:
        memory_mb: 1024
        # duration param is ignored by stress wrapper — runs until TEARDOWN

    - phase: memory_stress_bor_5
      description: "Memory stress on Bor 5 — consume 1GB"
      target: bor_5
      type: memory_stress
      params:
        memory_mb: 1024
        # duration param is ignored by stress wrapper — runs until TEARDOWN

    - phase: memory_stress_bor_7
      description: "Memory stress on Bor 7 — consume 1GB"
      target: bor_7
      type: memory_stress
      params:
        memory_mb: 1024
        # duration param is ignored by stress wrapper — runs until TEARDOWN

  success_criteria:
    # Critical: ALL validators keep producing (no faults should cause failure)
    - name: all_blocks_produced
      description: All validators maintain block production under pure stress
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[6m:1m]))
      threshold: "> 0"
      window: 6m
      critical: true

    - name: consensus_continues
      description: Consensus advances throughout stress test
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 6m
      critical: true

    # Critical: no missing validators (pure stress shouldn't cause this)
    - name: no_missing_validators
      description: No validators drop from consensus under pure stress
      type: prometheus
      query: max(cometbft_consensus_missing_validators{job=~"l2-cl-.*-heimdall-v2-bor-validator"})
      threshold: "== 0"
      window: 6m
      critical: false

    # Informational: performance under stress
    - name: block_intervals_bounded
      description: Block intervals stay bounded under CPU+memory stress
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 6m
      critical: false

    - name: goroutines_stable
      description: Goroutine count stays stable under stress (no leak from scheduling pressure)
      type: prometheus
      query: max(go_goroutines{job=~"l2-el-[357]-bor-heimdall-v2-validator"})
      threshold: "< 5000"
      critical: false

    - name: chain_head_converges
      description: All validators stay converged throughout (no stress-induced lag)
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 30"
      critical: true

    - name: span_api_healthy
      description: Span API remains healthy under stress
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.9"
      window: 6m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - cometbft_p2p_peers
    - go_goroutines
    - process_resident_memory_bytes
    - go_memstats_heap_inuse_bytes
    - up
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
