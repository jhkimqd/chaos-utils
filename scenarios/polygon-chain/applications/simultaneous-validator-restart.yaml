apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: simultaneous-validator-restart
  description: All validators restart simultaneously - simulates upgrade scenario that caught production bug
  tags: [restart, upgrade, high-severity, real-world-bug]
  author: DevTools
  version: "0.0.1"
  references:
    - "Production incident: Block production stopped after simultaneous validator restart during upgrade"

spec:
  targets:
    # All 4 validators (Heimdall consensus layer)
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-.*-heimdall-v2-bor-validator"
      alias: all_validators_heimdall

    # All 4 validators (Bor execution layer)
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-.*-bor-heimdall-v2-validator"
      alias: all_validators_bor

  duration: 2m
  warmup: 20s  # Ensure clean state before restart
  cooldown: 3m  # Extended cooldown: all 8 validators restart simultaneously so peer
                # re-discovery and consensus re-establishment takes longer than a single-node restart

  # Restart all validators simultaneously
  faults:
    - phase: simultaneous_restart_heimdall
      description: Restart all Heimdall validators at once (upgrade scenario)
      target: all_validators_heimdall
      type: container_restart
      params:
        grace_period: 10  # Allow graceful shutdown
        restart_delay: 0  # Immediate restart
        stagger: 0  # No stagger = simultaneous

    - phase: simultaneous_restart_bor
      description: Restart all Bor validators at once (upgrade scenario)
      target: all_validators_bor
      type: container_restart
      params:
        grace_period: 10
        restart_delay: 0
        stagger: 0

  success_criteria:
    # Critical: Block production must resume after restart — shorter inner rate window for restart scenario
    - name: block_production_resumes
      description: Block production resumes and sustains after restart (gap detection with 1m inner window tolerates brief restart pause)
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    # Critical: Consensus must resume after restart — shorter inner rate window
    - name: consensus_resumes
      description: Consensus resumes and sustains after restart (gap detection with 1m inner window tolerates brief restart pause)
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    # Critical: All validators must come back online
    - name: all_validators_online
      description: All validators return to service (topology-safe ratio check)
      type: prometheus
      query: count(up{job=~"l2-cl-.*-heimdall-v2-bor-validator"} == 1) / scalar(count(up{job=~"l2-cl-.*-heimdall-v2-bor-validator"}))
      threshold: ">= 1"
      critical: true

    # Expected: No missing validators after recovery
    - name: no_missing_validators_after_recovery
      description: All validators should be participating after coming back online
      type: prometheus
      query: cometbft_consensus_missing_validators
      threshold: "== 0"
      critical: false

    # Fault effectiveness: restart causes validators to briefly go offline
    # Uses the Prometheus-generated `up` metric (set to 0 on failed scrapes) rather than
    # cometbft_consensus_missing_validators, which requires a *running* Heimdall instance to
    # report. When all validators restart simultaneously no surviving instance can emit that
    # metric, so max_over_time always returns 0. `up` is recorded by the Prometheus server
    # itself and correctly captures the downtime window even during a full simultaneous outage.
    # The 8m look-back covers the full test timeline: warmup(20s) + inject(~90s) + monitor(2m)
    # + cooldown(3m) ≈ 6.5 min, so 8m safely reaches back to the start of the restart.
    - name: restart_causes_brief_outage
      description: Simultaneous restart causes all validators to briefly go offline (captured via Prometheus scrape failures)
      type: prometheus
      query: max(1 - min_over_time(up{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[8m]))
      threshold: "> 0"
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_validators
    - cometbft_consensus_missing_validators
    - panoptichain_heimdall_missed_block_proposal
    - up
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
