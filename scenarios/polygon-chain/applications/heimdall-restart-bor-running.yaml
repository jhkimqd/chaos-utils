apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: heimdall-restart-bor-running
  description: >
    Operator restarts Heimdall without restarting Bor — the most common
    mis-sequenced upgrade mistake. Bor is left running while its paired
    Heimdall is killed and restarted (5s delay). Bor must survive the
    Heimdall outage window and reconnect cleanly.

    Specific risks tested:
    - Bor websocket reconnect to Heimdall after restart: bor.go watches
      Heimdall events via websocket; if Heimdall is down, Bor must
      reconnect without stalling block production
    - Span fetch during Heimdall restart window: if Bor hits a span boundary
      while Heimdall is restarting, waitUntilHeimdallIsSynced may block
    - State sync retry loop: CommitStates() retries on Heimdall error;
      a restart causes temporary 503s that Bor must recover from
    - Milestone websocket event backlog: after Heimdall restarts, it may
      emit a burst of buffered milestone events that Bor must handle without
      logging "chain out of sync" indefinitely

    This test runs on 2 validators (1 and 3) to verify the majority
    continues producing blocks while both recover.

    Network: 4 validators, sprint=16, span=128, block_time=1s
  tags: [applications, operator-error, upgrade, heimdall-restart, websocket]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: heimdall_1
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3

  duration: 2m
  warmup: 20s
  cooldown: 1m

  faults:
    - phase: restart_heimdall_1
      description: "Operator restarts Heimdall 1 — Bor 1 keeps running"
      target: heimdall_1
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5

    - phase: restart_heimdall_3
      description: "Operator restarts Heimdall 3 at t+30s (overlapping recovery)"
      target: heimdall_3
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 30s

  success_criteria:
    - name: bor_block_production_unaffected
      description: "Bor validators 2 and 5 (unaffected) continue producing blocks"
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[25]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: restarted_validators_recover
      description: "Bor validators 1 and 3 resume block production after Heimdall restarts"
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[13]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: heimdall_consensus_survives
      description: "Heimdall consensus continues — killing 2/4 still leaves quorum"
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: chain_head_converges
      description: "Validators 1-3 converge after Heimdall restarts complete (4 excluded: known flaky)"
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: no_heimdall_panic_on_restart
      description: "Heimdall does not panic during restart (scans fault-target CL containers)"
      type: log
      pattern: "(panic|fatal|CONSENSUS FAILURE)"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true

    - name: heimdall_websocket_reconnects
      description: "Bor logs WS reconnect to Heimdall — non-critical: log scanner can only reach fault-target Heimdall containers, not Bor containers"
      type: log
      pattern: "(connection lost.*heimdall|will attempt to reconnect|heimdall.*reconnect|service unavailable.*503)"
      container_pattern: "heimdall-v2-bor-validator"
      absence: false
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
