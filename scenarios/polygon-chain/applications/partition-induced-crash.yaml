apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: partition-induced-crash
  description: >
    Simulates a node that crashes in response to losing network connectivity —
    for example, a process that calls os.Exit() when its connection to the
    coordination layer is lost, or a container that fails its health check
    and gets killed by the orchestrator.
    Jepsen reference: "Partition-Induced Process Crash" — some systems crash on
    partition to prevent split-brain. If the packaging doesn't include a process
    supervisor, the process stays dead. Even with restarts, the system may
    re-register as a new entity.
    Implementation: first inject network partition (connection_drop), then after
    a delay (simulating health check timeout), kill the container. This models
    the real-world sequence of: network failure → health check failure →
    container restart by orchestrator.
    Specific risks tested:
    - Double fault: the node experiences both network loss AND process crash.
      Recovery requires re-establishing both network connectivity and process
      state simultaneously
    - Orchestrator restart race: the container is restarted while the network
      partition is still active. The restarted process immediately fails health
      checks again, potentially entering a crash loop
    - State divergence during partition-before-crash: between partition onset
      and crash, the node may have accumulated stale state that persists to disk
  tags: [applications, partition-crash, health-check, orchestrator, operator-error]
  author: DevTools
  version: "0.1.0"
  references:
    - "Jepsen: Partition-Induced Process Crash"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-4-heimdall-v2-bor-validator"
      alias: heimdall_4

  duration: 2m
  warmup: 30s
  cooldown: 1m

  faults:
    # Phase 1: Kill after 30s (simulates health check failure → orchestrator kill)
    # Listed BEFORE connection_drop so that connection_drop is the last tracked
    # fault type per container in injectedFaults map — ensures iptables rules
    # are cleaned up at TEARDOWN (orchestrator only tracks one type per container)
    - phase: crash_bor_4
      description: "SIGKILL Bor 4 — orchestrator kills after health check timeout"
      target: bor_4
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 10
      delay: 30s

    - phase: crash_heimdall_4
      description: "SIGKILL Heimdall 4 — orchestrator kills after health check timeout"
      target: heimdall_4
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 10
      delay: 30s

    # Phase 2: Network partition (simulates connectivity loss)
    # Listed AFTER container_kill so connection_drop is the LAST tracked fault
    # type for these containers — iptables rules will be removed at TEARDOWN
    - phase: partition_bor_4
      description: "Partition Bor 4 — lose P2P connectivity"
      target: bor_4
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "30303"
        target_proto: tcp
        probability: 1.0

    - phase: partition_heimdall_4
      description: "Partition Heimdall 4 — lose consensus connectivity"
      target: heimdall_4
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "26656"
        target_proto: tcp
        probability: 1.0

  success_criteria:
    - name: healthy_validators_unaffected
      description: Other 7 validators maintain block production
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus continues with 7/8 validators
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: crashed_validator_recovers
      description: Partition-crashed validator comes back online after network heals
      type: prometheus
      query: up{job="l2-el-4-bor-heimdall-v2-validator"}
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: block_sync_resumes
      description: Validator resumes block sync — recovers from both partition and crash
      type: prometheus
      query: rate(chain_head_block{job="l2-el-4-bor-heimdall-v2-validator"}[1m])
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: chain_head_converges
      description: Crashed validator catches up to network
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: no_crash_loop
      description: Validator doesn't enter crash loop after restart during partition
      type: log
      pattern: "(restart.*loop|repeated.*crash|back-off.*restart)"
      container_pattern: "l2-.*-4-.*-validator"
      absence: true
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
