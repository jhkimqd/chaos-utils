apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: cascading-failure-storm
  description: Progressive validator failures with network degradation - simulates worst-case cascade
  tags: [extreme, cascading, progressive, multi-fault]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: validator_1

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: validator_2

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: validator_3

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-.*-heimdall-v2-bor-validator"
      alias: all_validators

  duration: 15m
  warmup: 2m
  cooldown: 3m

  # Cascading failures over time
  faults:
    # T+0: Validator 1 gets extreme latency
    - phase: cascade_stage_1
      description: Validator 1 - 3 second latency (isolation begins)
      target: validator_1
      type: network
      params:
        device: eth0
        latency: 3000
        target_proto: tcp
      duration: 15m

    # T+3min: Validator 2 crashes
    - phase: cascade_stage_2
      description: Validator 2 - Hard crash
      target: validator_2
      type: container_restart
      params:
        grace_period: 0
        restart_delay: 15
      delay: 3m

    # T+6min: All validators hit with packet loss
    - phase: cascade_stage_3
      description: All validators - 40% packet loss (network degradation)
      target: all_validators
      type: network
      params:
        device: eth0
        packet_loss: 40
        target_proto: tcp,udp
      duration: 7m
      delay: 6m

    # T+9min: Validator 3 gets CPU starved
    - phase: cascade_stage_4
      description: Validator 3 - CPU starvation
      target: validator_3
      type: cpu
      params:
        cpu_percent: 90
      duration: 4m
      delay: 9m

  success_criteria:
    # Network must survive the cascade — gap detection
    - name: network_survives_cascade
      description: Network maintains block production without any 1-minute gap throughout cascade
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[15m:5m]))
      threshold: "> 0"
      window: 15m
      critical: true

    # At least 2 validators maintain consensus
    - name: minimum_quorum_maintained
      description: At least 2 validators active throughout
      type: prometheus
      query: count(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[1m]) > 0)
      threshold: ">= 2"
      window: 15m
      critical: true

    # All validators eventually recover
    - name: full_recovery
      description: All 4 validators online by end of test
      type: prometheus
      query: count(up{job=~"l2-cl-.*-heimdall-v2-bor-validator"} == 1)
      threshold: "== 4"
      window: 15m
      critical: false

    # Fault effectiveness: cascade causes missing validators during fault window
    - name: cascade_causes_missing_validators
      description: Cascading faults cause measurable missing validators during the storm
      type: prometheus
      query: max_over_time(cometbft_consensus_missing_validators{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[15m])
      threshold: "> 0"
      window: 15m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 15m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 15m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 15m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - cometbft_consensus_rounds
    - up
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
