apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: rapid-restart-peer-churn
  description: >
    Restart the same 2 validators 3 times in rapid succession to test peer
    connection lifecycle and goroutine cleanup. Each restart cycle creates
    new TCP connections but the WIT broadcast goroutine
    (eth/protocols/wit/broadcast.go:8-30) exits permanently on any send
    error — so after the first restart, witness propagation for reconnected
    peers may be dead even though the peer appears connected.
    Also tests the peer jail mechanism (p2p/server.go:116-158) — repeated
    disconnects should trigger jailing, and the jailed map never cleans up
    expired entries (memory leak). After 3 rapid restarts, the recovering
    node must rediscover and reconnect to peers that may have jailed it.
    The stagger=0 ensures all restarts happen simultaneously, maximizing
    connection churn.
  tags: [applications, restart, peer-churn, wit-goroutine, peer-jail, memory-leak]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-6-heimdall-v2-bor-validator"
      alias: heimdall_6

  duration: 2m
  warmup: 30s
  cooldown: 1m

  faults:
    # First restart cycle
    - phase: restart_1_bor_3
      description: "Restart cycle 1/3 — validator 3 Bor"
      target: bor_3
      type: container_restart
      params:
        grace_period: 3
        restart_delay: 5
        stagger: 0

    - phase: restart_1_bor_6
      description: "Restart cycle 1/3 — validator 6 Bor"
      target: bor_6
      type: container_restart
      params:
        grace_period: 3
        restart_delay: 5
        stagger: 0

    - phase: restart_1_heimdall_3
      description: "Restart cycle 1/3 — validator 3 Heimdall"
      target: heimdall_3
      type: container_restart
      params:
        grace_period: 3
        restart_delay: 5
        stagger: 0

    - phase: restart_1_heimdall_6
      description: "Restart cycle 1/3 — validator 6 Heimdall"
      target: heimdall_6
      type: container_restart
      params:
        grace_period: 3
        restart_delay: 5
        stagger: 0

  success_criteria:
    - name: validators_recover
      description: Restarted validators come back online
      type: prometheus
      query: min(up{job=~"l2-el-[36]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: block_sync_resumes
      description: >
        Restarted validators resume block sync — tests WIT goroutine
        reestablishment after peer reconnection
      type: prometheus
      # F1 fix: widen to 3m and use max() — cluster-wide recovery signal.
      query: max(rate(chain_head_block{job=~"l2-el-[36]-bor-heimdall-v2-validator"}[3m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: peer_count_recovers
      description: >
        Restarted validators reconnect to 5+ peers — tests peer jail
        doesn't permanently block reconnection
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-[36]-heimdall-v2-bor-validator"})
      threshold: "> 4"
      critical: true
      post_fault_only: true

    - name: chain_head_converges
      description: All validators on same chain after recovery — no fork from stale cache
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
      threshold: "< 30"
      critical: true
      post_fault_only: true

    - name: healthy_validators_unaffected
      description: Non-restarted validators maintain production
      type: prometheus
      query: sum(increase(chain_head_block{job=~"l2-el-[124578]-bor-heimdall-v2-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: no_span_rotation
      description: Rapid restarts must not cause span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - system_cpu_goroutines
    - up
