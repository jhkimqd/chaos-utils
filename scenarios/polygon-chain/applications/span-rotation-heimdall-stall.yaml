apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: span-rotation-heimdall-stall
  description: >
    Block Heimdall P2P consensus traffic on validator 1 to prevent span commitment —
    tests Bor span-cache recovery and network resilience when a span rotation cannot
    complete on time.
    SCOPE: Targets the Heimdall consensus layer, NOT the Bor→Heimdall REST link.
    Partitioning validator 1 Heimdall from peers means it cannot vote on span proposals,
    but validators 2/3/4 (75% > 67% BFT threshold) can still commit spans without it.
    This SHOULD PASS and proves BFT tolerance of one offline validator.
    FOR THE REAL STALL: To reproduce Bor falling behind because waitForNewSpan cannot
    complete, combine this with bor-heimdall-link-isolation.yaml on a short-span devnet
    so that: (1) the span window expires, (2) Heimdall cannot commit the next span
    because quorum is missing, AND (3) Bor cannot fetch it over REST. This compound
    scenario requires all validators partitioned, which causes consensus to halt.
  tags: [network, partition, span, rotation, consensus, edge-case]
  author: DevTools
  version: "0.0.2"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: validator1_heimdall

  duration: 10m
  warmup: 2m
  cooldown: 2m

  # Partition validator 1's Heimdall from consensus peers so it cannot vote on
  # or broadcast a span proposal. The remaining 3 validators (75%) exceed the
  # 67% BFT threshold and can still commit spans — but only if the proposer
  # is not validator 1. This tests the case where the normal span proposer is
  # partitioned and the network must elect a different proposer.
  faults:
    - phase: heimdall_consensus_partition
      description: Drop all P2P and CometBFT RPC traffic on validator 1 Heimdall — prevents span proposal from reaching quorum and tests span proposer election
      target: validator1_heimdall
      type: network
      params:
        packet_loss: 100
        target_ports: "26656,26657"
        target_proto: tcp,udp
        device: eth0

  success_criteria:
    # ========== CRITICAL: Network must survive without validator 1 ==========

    - name: other_validators_produce_blocks
      description: CRITICAL — Bor validators 2, 3, 4 continue block production despite validator 1 Heimdall stall. Expected to PASS — 3 validators exceed BFT threshold.
      type: prometheus
      query: sum(increase(chain_head_block{job=~"l2-el-[234]-bor-heimdall-v2-validator"}[5m])) or vector(0)
      threshold: "> 0"
      window: 10m
      critical: true

    - name: other_validators_uninterrupted
      description: CRITICAL — Block production on validators 2/3/4 must not stall for any 2-minute window. FAILS if the partition of validator 1 causes a leader election delay or span proposal delay that freezes the full chain.
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[234]-bor-heimdall-v2-validator"}[2m])[9m:1m]))
      threshold: "> 0"
      window: 10m
      critical: true

    - name: consensus_continues_without_v1
      description: CRITICAL — Remaining validators maintain Heimdall consensus height
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-[234]-heimdall-v2-bor-validator"}[5m])) or vector(0)
      threshold: "> 0"
      window: 10m
      critical: true

    # ========== NON-CRITICAL: Recovery indicators ==========

    - name: validator1_rejoins_peers
      description: Validator 1 Heimdall re-establishes P2P connections after partition is lifted — directly measures network reconnection after the fault
      type: prometheus
      query: cometbft_p2p_peers{job="l2-cl-1-heimdall-v2-bor-validator"}
      threshold: "> 0"
      window: 10m
      critical: false

    - name: checkpoint_not_permanently_halted
      description: Checkpoint submission resumes after validator 1 reconnects
      type: prometheus
      query: sum(increase(heimdallv2_checkpoint_api_calls_total[10m]))
      threshold: "> 0"
      window: 10m
      critical: false

    - name: validator1_consensus_recovers
      description: Validator 1 Heimdall consensus height advances after isolation is removed
      type: prometheus
      query: increase(cometbft_consensus_height{job="l2-cl-1-heimdall-v2-bor-validator"}[3m])
      threshold: "> 0"
      window: 10m
      critical: false

    - name: validator1_not_jailed
      description: Validator 1 is not jailed after extended consensus isolation
      type: prometheus
      query: cometbft_consensus_validator_power{job="l2-cl-1-heimdall-v2-bor-validator"}
      threshold: "> 0"
      window: 10m
      critical: false

    - name: bft_quorum_maintained
      description: At least 2/3 of validators remain online throughout (BFT tolerates one partitioned validator)
      type: prometheus
      query: count(up{job=~"l2-cl-.*-heimdall-v2-bor-validator"} == 1) / scalar(count(up{job=~"l2-cl-.*-heimdall-v2-bor-validator"}))
      threshold: ">= 0.67"
      window: 10m
      critical: false

    # Fault effectiveness: paused validator actually stalls during pause window
    - name: validator1_stalls_during_pause
      description: Validator 1 consensus height does NOT advance during the 6m pause — verifies the fault is effective
      type: prometheus
      query: max_over_time(cometbft_consensus_missing_validators{job=~"l2-cl-[234]-heimdall-v2-bor-validator"}[10m])
      threshold: "> 0"
      window: 10m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - heimdallv2_checkpoint_api_calls_total
    - cometbft_consensus_validator_power
    - cometbft_consensus_missing_validators
    - cometbft_p2p_peers
    - up
