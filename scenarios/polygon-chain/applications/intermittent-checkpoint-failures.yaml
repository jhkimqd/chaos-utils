apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: intermittent-checkpoint-failures
  description: Checkpoint submission experiences intermittent failures to test retry and recovery logic
  tags: [network, checkpoint, intermittent, data-integrity, medium-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: validator_with_flaky_checkpoint

  duration: 12m
  warmup: 30s
  cooldown: 1m

  # Simulate intermittent checkpoint failures with varying packet loss
  faults:
    # Phase 1: Light intermittent failures (20% packet loss)
    - phase: light_intermittent
      description: 20% packet loss on checkpoint submission ports
      target: validator_with_flaky_checkpoint
      type: network
      params:
        device: eth0
        packet_loss: 20
        target_ports: "1317,26657"
        target_proto: tcp
      duration: 4m

    # Phase 2: Moderate intermittent failures (50% packet loss)
    - phase: moderate_intermittent
      description: 50% packet loss on checkpoint submission ports
      target: validator_with_flaky_checkpoint
      type: network
      params:
        device: eth0
        packet_loss: 50
        target_ports: "1317,26657"
        target_proto: tcp
      duration: 4m
      delay: 4m

    # Phase 3: Heavy intermittent failures (80% packet loss)
    - phase: heavy_intermittent
      description: 80% packet loss on checkpoint submission ports
      target: validator_with_flaky_checkpoint
      type: network
      params:
        device: eth0
        packet_loss: 80
        target_ports: "1317,26657"
        target_proto: tcp
      duration: 4m
      delay: 8m

  success_criteria:
    # Critical: Block production continues — gap detection catches mid-test stalls
    - name: block_production_continues
      description: Block production continues without any 2-minute gap despite checkpoint issues
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[12m:4m]))
      threshold: "> 0"
      window: 12m
      critical: true

    # Critical: Consensus continues — gap detection
    - name: consensus_continues
      description: Consensus continues without any 2-minute gap despite intermittent failures
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])[12m:4m]))
      threshold: "> 0"
      window: 12m
      critical: true

    # Non-critical: Some checkpoints still succeed — rate bound instead of bare > 0
    - name: checkpoint_retry_succeeds
      description: Checkpoint submission retries eventually succeed at a meaningful rate
      type: prometheus
      query: min(min_over_time(rate(heimdallv2_checkpoint_api_calls_success_total[5m])[12m:4m]))
      threshold: "> 0.1"
      window: 12m
      critical: false

    # Fault effectiveness: packet loss causes measurable checkpoint failure increase
    - name: checkpoint_failures_from_packet_loss
      description: Packet loss on checkpoint ports causes measurable checkpoint API failures
      type: prometheus
      query: increase(heimdallv2_checkpoint_api_calls_total[12m]) - increase(heimdallv2_checkpoint_api_calls_success_total[12m])
      threshold: "> 0"
      window: 12m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 12m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 12m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 12m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - heimdallv2_checkpoint_api_calls_total
    - heimdallv2_checkpoint_api_calls_success_total
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
