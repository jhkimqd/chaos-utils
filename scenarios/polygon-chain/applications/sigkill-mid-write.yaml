apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: sigkill-mid-write
  description: >
    Sends SIGKILL to Bor containers during active block production, then
    immediately restarts them. This is the exact sequence that happens when
    the OOM killer fires or an operator runs "kill -9" — the process dies
    instantly with no chance to flush WAL or close the database cleanly.
    PebbleDB in NoSync mode (Bor's default) relies on the OS page cache for
    durability between explicit flushes. SIGKILL during a memtable flush or
    compaction can leave partially written SST files. On restart, PebbleDB must
    detect and recover from this state using its WAL replay mechanism.
    Note on timing: the kill is not synchronized to a specific I/O operation.
    PebbleDB's continuous background I/O (memtable flushes, compaction) makes
    it statistically likely — but not guaranteed — that each kill interrupts an
    active write. Tests 2 validators to increase the probability of hitting the
    corruption window. Two kill cycles increase coverage of the write state space.
    Uses container_kill (not process_kill) because Kurtosis containers have
    restart policy "no" — process_kill would leave the container exited with
    no auto-restart. container_kill explicitly restarts after killing.
  tags: [applications, sigkill, crash-recovery, pebbledb, operator-error]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5

  duration: 2m
  warmup: 30s
  cooldown: 1m

  faults:
    # SIGKILL + immediate restart — simulates OOM kill or operator kill -9
    - phase: sigkill_bor_2
      description: "SIGKILL Bor 2 mid-write + restart"
      target: bor_2
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 2

    - phase: sigkill_bor_5
      description: "SIGKILL Bor 5 mid-write + restart"
      target: bor_5
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 2

  success_criteria:
    - name: killed_processes_recover
      description: Bor processes restart via container supervisor after SIGKILL
      type: prometheus
      query: min(up{job=~"l2-el-[25]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: db_opens_cleanly
      description: Bor resumes block sync — PebbleDB WAL replay succeeded
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[25]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: no_db_corruption_log
      description: No "corruption" or "panic" in Bor logs after restart
      type: log
      pattern: "(corruption|MANIFEST.*error|pebble.*panic)"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: false
      post_fault_only: true

    - name: chain_head_converges
      description: All validators on same chain — no fork from crash
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: healthy_validators_unaffected
      description: Non-killed validators maintain block production
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[134678]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus unaffected by Bor process kills
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
