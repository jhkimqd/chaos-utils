apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-bug-bounty-018-commitstates-heimdall-error-swallow
  description: >
    Reproduce BOR-2026-04-16-018 (CommitStates Silently Discards Heimdall
    Fetch Errors). consensus/bor/bor.go:1763-1768 logs
    "Error occurred when fetching state sync events" at Error level but
    returns a nil error with an empty slice. The caller treats empty as
    "no events" and lastStateId advances past the outage — missed state
    sync events are never retried.

    Trigger: inject HTTP 500s on Heimdall REST port 1317 on validator 1
    (single target — faulting 2/3 would lose quorum). Duration 3m =~3
    sprints at sprint=16, block_time=1s, so the target validator hits
    the state-sync fetch path multiple times.

    Observable signals (required for a trial to count as reproduced):
    1. Log: "Error occurred when fetching state sync events" on the
       faulted validator's bor container (confirms bor.go:1673/1764
       code path fired).
    2. Post-fault: faulted validator re-syncs to within 30 blocks of
       healthy validators. A retry mechanism would leave faulted
       validator briefly behind; absence of a visible resync trail
       signals silent swallow.

    Cluster: 3 validators (1,2,3) + 1 RPC (4). Sprint=16, span=128,
    block_time=1s.

    VERIFICATION DEFERRED (2026-04-17): This YAML has been smoke-tested
    on a live kurtosis-pos enclave (bor 2.6.2-beta per
    multiple-validators.yml; bug path at bor.go:1673 is source-
    verified identical to 2.7.1). Per user amendment: ≥7/10 trial rate
    confirmation is owed in a dedicated verification session — each
    trial requires heimdall-1 restart + chain re-sync between runs (~5
    min per trial). See trial runner at
    /home/jihwankim/bug-bounty-outputs/bor/chaos-runs/run-018.sh.
    Smoke-run trial artifacts at
    /home/jihwankim/bug-bounty-outputs/bor/chaos-runs/018/ capture
    exact "Error occurred when fetching state sync events" log lines
    on bor-1 during the fault window.

    Re-run command for a dedicated verification session:
      # with a running kurtosis-pos enclave named `pos`:
      N=10 /home/jihwankim/bug-bounty-outputs/bor/chaos-runs/run-018.sh
    The script restarts heimdall-1 between trials, waits for chain
    re-sync, runs the scenario, and captures a per-trial error-log
    delta. Acceptance: ≥7/10 trials with delta > 0.

  tags: [bor-bug-bounty, 018, state-sync, heimdall, silent-failure, high-severity]
  author: impl-concurrency
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: heimdall_1
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2

  duration: 3m
  warmup: 30s
  cooldown: 90s

  faults:
    - phase: http_fault_heimdall_1
      description: >
        100% HTTP 500 on Heimdall 1 REST port 1317 — targets
        bor-1's local heimdall. CommitStates → StateSyncEvents gets
        500 at bor.go:1763 and fires the silent-swallow error log.
      target: heimdall_1
      type: http_fault
      params:
        target_port: 1317
        abort_code: 500
        abort_percent: 100

    - phase: http_fault_heimdall_2
      description: >
        Simultaneously fault heimdall-2 to exercise the bug on a second
        validator (faulting 2/3 keeps bor-3 alone as quorum producer
        so the chain still moves; bor-1 and bor-2 both see the silent
        swallow).
      target: heimdall_2
      type: http_fault
      params:
        target_port: 1317
        abort_code: 500
        abort_percent: 100

  success_criteria:
    - name: error_log_emitted
      description: >
        Target log line "Error occurred when fetching state sync events"
        appeared on at least one of the two faulted bor nodes during
        the fault window. Confirms bor.go silent-swallow code path fired.
      type: log
      pattern: "Error occurred when fetching state sync events"
      container_pattern: "l2-el-[12]-bor-heimdall-v2-validator"
      absence: false
      critical: true
      post_fault_only: true

    - name: chain_continues
      description: "Healthy validator 3 keeps producing blocks during fault"
      type: prometheus
      query: rate(chain_head_block{job="l2-el-3-bor-heimdall-v2-validator"}[2m])
      threshold: ">= 0"
      critical: false

    - name: faulted_validator_catches_up
      description: >
        After fault removed, faulted validator must catch up to the head.
        If a RETRY mechanism existed we'd see a brief resync trail;
        absence is part of bug signature.
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job="l2-el-1-bor-heimdall-v2-validator"})
      threshold: "< 500"
      critical: false
      post_fault_only: true

    - name: no_heimdall_panic
      description: "Heimdall container doesn't panic from the fault injection itself"
      type: log
      pattern: "(panic|fatal|CONSENSUS FAILURE)"
      container_pattern: "l2-cl-1-heimdall-v2-bor-validator"
      absence: true
      critical: true

    - name: no_bor_panic
      description: "Bor doesn't panic — silent-swallow is the bug, not a crash"
      type: log
      pattern: "(panic:|fatal error:|runtime error:)"
      container_pattern: "l2-el-1-bor-heimdall-v2-validator"
      absence: true
      critical: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - up
