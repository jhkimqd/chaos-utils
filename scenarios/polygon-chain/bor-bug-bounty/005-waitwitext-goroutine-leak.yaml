apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-bug-bounty-005-waitwitext-goroutine-leak
  description: >
    Best-effort reproduction of BOR-2026-04-16-005 (waitWitExtension
    missing duplicate check → goroutine leak). eth/peerset.go:200-238
    does NOT guard `ps.witWait[id] = wait` against a pre-existing entry,
    unlike its sibling `waitSnapExtension`. If two code paths both enter
    `waitWitExtension` for the same peer ID concurrently, the second
    overwrites the channel and the first goroutine blocks forever.

    CAVEAT — trigger probability is LOW without a bespoke chaos-peer
    primitive. The strict race requires two concurrent RLPx connections
    from the same node-ID. Real-peer churn (restart / partition flap)
    normally reuses the same nodekey but the incoming-connection check
    at ps.peers[id] rejects the second before it reaches
    waitWitExtension — so most churn does not race.

    This scenario injects aggressive P2P latency on validators 2+3 to
    force reconnect churn. If probability is < 5/10 over 10 trials we
    report honestly and flag for chaos-peer extension.

    Observable signals:
    1. Host-side pprof diff (`debug/pprof/goroutine?debug=1`) pre/post
       fault on each faulted validator. `waitWitExtension` frame count
       post-fault MUST be strictly greater than pre-fault for the trial
       to count as reproduced. Runner harness computes this; chaos-utils
       Prometheus scrape is not fine-grained enough.
    2. Node-layer `go_goroutines` growth bounded — fallback signal.

    Cluster: 3 validators (1,2,3) + 1 RPC (4). Fault 2 of 3 validators
    with latency so the healthy one (1) maintains progress.

    STATUS: DOCUMENTED-ONLY (2026-04-17). Reclassified by user; no
    trial run was executed. The reliable trigger requires a custom
    chaos-peer primitive (concurrent dial from two peers sharing a
    private key) that does not yet exist. Finding is already
    cross-validated 3/3 via code review. This YAML is retained as a
    reference for future chaos-peer extension work.

  tags: [bor-bug-bounty, 005, wit, goroutine-leak, concurrency, best-effort]
  author: impl-concurrency
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3

  duration: 3m
  warmup: 30s
  cooldown: 90s

  faults:
    - phase: flap_bor_2
      description: "20s latency hits frameWriteTimeout, forces reconnect storm — may race into waitWitExtension"
      target: bor_2
      type: network
      params:
        latency: 20000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: flap_bor_3
      target: bor_3
      type: network
      params:
        latency: 20000
        target_ports: "30303"
        target_proto: tcp,udp

  success_criteria:
    - name: faulted_validators_recover
      description: "Post-fault, faulted validators resume block sync"
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[23]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: goroutine_count_bounded
      description: >
        system_cpu_goroutines on faulted Bor validators must be < 5000 post-
        fault. Hard ceiling — if waitWitExtension leaks per-reconnect, this
        catches runaway growth. Non-critical because the real signal comes
        from host-side pprof diff. Note: Bor (go-ethereum metrics) exports
        `system_cpu_goroutines`, not `go_goroutines` (which is a
        client_golang default collector only present on Heimdall CL).
      type: prometheus
      query: max(system_cpu_goroutines{job=~"l2-el-[23]-bor-heimdall-v2-validator"})
      threshold: "< 5000"
      critical: false
      post_fault_only: true

    - name: no_panic_during_churn
      description: "Churn must not panic bor — 005 is leak, not crash"
      type: log
      pattern: "(panic:|fatal error:|runtime error:)"
      container_pattern: "l2-el-[23]-bor-heimdall-v2-validator"
      absence: true
      critical: true

  metrics:
    - chain_head_block
    - system_cpu_goroutines
    - cometbft_p2p_peers
    - up
