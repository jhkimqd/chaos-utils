apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: p2p-malformed-blocks
  description: >
    Phase 3 P2P fault injection: a chaos peer connects directly to Validator 5's
    Bor devp2p port (30303) and sends 50 NewBlockPacket messages with valid-looking
    headers but poisoned state roots (all 0xff bytes). Because the messages arrive
    over the authenticated RLPx transport, Bor's block fetcher receives them before
    any block-level validation. This tests:
    (1) whether Bor's insertBlock path panics on obviously invalid state roots,
    (2) whether the block fetcher queue drains correctly after rejections,
    (3) whether the validator disconnects the malicious peer within a reasonable time.
    Unlike HTTP-layer corruption, this bypasses Envoy and reaches Bor's
    internal eth protocol handler directly.
  tags: [p2p, semantic, devp2p, rlpx, malformed-block, phase3, high-severity]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5

  duration: 2m
  warmup: 30s
  cooldown: 90s

  faults:
    - phase: malformed_block_flood
      description: >
        Inject 50 NewBlock messages with poisoned state roots into Validator 5's
        devp2p port. The chaos peer discovers the enode URL via admin_nodeInfo,
        completes the full RLPx + eth/69 handshake, then sends malformed blocks
        at one per second. Bor should log validation errors and disconnect the peer.
      target: bor_5
      type: p2p_attack
      params:
        attack: malformed-block
        count: 50

  success_criteria:
    - name: block_production_continues
      description: CRITICAL - Healthy validators continue producing blocks
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[^5]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: target_validator_survives
      description: CRITICAL - Validator 5 Bor process must not crash
      type: prometheus
      query: up{job="l2-el-5-bor-heimdall-v2-validator"}
      threshold: "== 1"
      critical: true

    - name: consensus_continues
      description: CRITICAL - Heimdall consensus unaffected by P2P attack
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: no_panic_logs
      description: No panic in Bor logs during malformed block injection
      type: log
      pattern: "panic|runtime error|fatal error"
      container_pattern: "l2-el-5-bor-heimdall-v2-validator"
      absence: true
      critical: true

    - name: chain_not_stalled
      description: Validator 5 chain head must not fall more than 30 blocks behind others
      type: prometheus
      query: max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}) - chain_head_block{job="l2-el-5-bor-heimdall-v2-validator"}
      threshold: "< 30"
      critical: false

    - name: peer_count_recovers
      description: Validator 5 peer count recovers after disconnecting the chaos peer
      type: prometheus
      query: p2p_peers{job="l2-el-5-bor-heimdall-v2-validator"}
      threshold: ">= 2"
      critical: false
      post_fault_only: true

    - name: recovery_sync
      description: Validator 5 re-syncs to within 5 blocks of the chain head post-attack
      type: prometheus
      query: max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}) - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 5"
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - p2p_peers
    - cometbft_consensus_height
    - up
