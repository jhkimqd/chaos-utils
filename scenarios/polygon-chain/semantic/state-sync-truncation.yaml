apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: state-sync-truncation
  description: >
    Semantic HTTP corruption: Go corruption proxy empties the event_records array
    in Heimdall's /clerk/time state sync responses. This exploits a known
    silent-failure pattern in Bor (bor.go:1764-1768) where errors or empty
    results from state sync fetches are silently swallowed, returning an empty
    list. If only some validators receive truncated events while others get
    the full list, validators may diverge on which state sync events to apply,
    potentially causing consensus splits or state inconsistencies.
  tags: [semantic, http, state-sync, truncation, divergence, application-level, critical-severity]
  author: DevTools
  version: "0.2.0"

spec:
  targets:
    # Target a minority of validators to create divergent state sync views
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-5-heimdall-v2-bor-validator"
      alias: heimdall_5

  duration: 4m
  warmup: 30s
  cooldown: 2m

  faults:
    - phase: truncate_events_heimdall_2
      description: Empty state sync event_records from Heimdall 2
      target: heimdall_2
      type: corruption_proxy
      params:
        target_port: 1317
        rules_yaml: |
          - name: state-sync-truncate
            path_pattern: "/clerk/time"
            operations:
              - type: truncate_array
                field: "result.event_records"
                value: 0

    - phase: truncate_events_heimdall_5
      description: Empty state sync event_records from Heimdall 5
      target: heimdall_5
      type: corruption_proxy
      params:
        target_port: 1317
        rules_yaml: |
          - name: state-sync-truncate
            path_pattern: "/clerk/time"
            operations:
              - type: truncate_array
                field: "result.event_records"
                value: 0

  success_criteria:
    - name: block_production_continues
      description: CRITICAL - Chain must continue despite state sync divergence
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: CRITICAL - Heimdall consensus layer unaffected
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: validators_stay_online
      description: CRITICAL - No crashes from empty state sync data
      type: prometheus
      query: min(up{job=~"l2-(cl|el)-.*-(heimdall-v2-bor|bor-heimdall-v2)-validator"})
      threshold: "== 1"
      critical: true

    # Divergence detection — the key finding this test is designed to surface
    - name: block_heights_converge
      description: All validators should be within 5 blocks of each other (detects divergence)
      type: prometheus
      query: max(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}) - min(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
      threshold: "< 5"
      critical: false

    - name: no_reorgs_from_divergence
      description: No chain reorgs triggered by state sync divergence
      type: log
      pattern: "chain reorg detected"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: false

    - name: recovery_convergence
      description: Validators converge after fault removal
      type: prometheus
      query: max(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}) - min(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
      threshold: "< 3"
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
