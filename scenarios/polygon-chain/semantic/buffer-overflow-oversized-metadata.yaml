apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: buffer-overflow-oversized-metadata
  description: >
    Buffer overflow attack simulation: Injects oversized metadata into
    Heimdall REST API responses to test input validation boundaries.
    Targets three vectors simultaneously on different validators:

    1. Oversized hex strings (2KB) in hash/address fields -- tests
       common.HexToAddress/HexToHash overflow handling in state sync parsing
    2. Oversized event data (~64KB base64) in state sync Data field -- tests
       memory allocation bounds during event deserialization
    3. Oversized producers array (100 entries) in span responses -- tests
       O(n) vs O(n^2) behavior in span processing (use rules/oversized-producers-array.yaml
       for the full 5000-entry stress test)

    These are realistic attack vectors: a compromised Heimdall node could
    return oversized fields to connected Bor nodes, potentially causing
    panics, OOM, or resource exhaustion.
  tags: [semantic, buffer-overflow, oversized, security, memory, application-level, critical-severity]
  author: DevTools
  version: "0.2.0"

spec:
  targets:
    # Each validator gets a different overflow vector
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-5-heimdall-v2-bor-validator"
      alias: heimdall_5

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-7-heimdall-v2-bor-validator"
      alias: heimdall_7

  duration: 3m
  warmup: 30s
  cooldown: 2m

  faults:
    - phase: oversized_hashes
      description: 2KB hex strings in hash/address fields on Heimdall 2
      target: heimdall_2
      type: corruption_proxy
      params:
        target_port: 1317
        rules_yaml: |
          - name: oversized-hash
            path_pattern: "/clerk/time"
            operations:
              - type: set_field
                field: "result.event_records.0.contract"
                value: ""
              - type: set_field
                field: "result.event_records.0.tx_hash"
                value: ""

    - phase: oversized_event_data
      description: ~64KB base64 event data payloads on Heimdall 5
      target: heimdall_5
      type: corruption_proxy
      params:
        target_port: 1317
        rules_yaml: |
          - name: oversized-event-data
            path_pattern: "/clerk/time"
            operations:
              - type: set_field
                field: "result.event_records.0.data"
                value: ""

    - phase: oversized_producers
      description: 100-entry producers array on Heimdall 7 (use rules/oversized-producers-array.yaml for 5000 entries)
      target: heimdall_7
      type: corruption_proxy
      params:
        target_port: 1317
        rules_yaml: |
          - name: oversized-producers-array
            path_pattern: "/bor/spans/"
            operations:
              - type: set_field
                field: "result.span.selected_producers"
                value:
              - {"id":0,"startEpoch":0,"endEpoch":0,"nonce":0,"power":10000,"pubKey":"0x04deadbeef","signer":"0xdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef","last_updated":"0","jailed":false,"accum":0}
              - {"id":0,"startEpoch":0,"endEpoch":0,"nonce":0,"power":10000,"pubKey":"0x04deadbeef","signer":"0xdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef","last_updated":"0","jailed":false,"accum":0}
              - {"id":0,"startEpoch":0,"endEpoch":0,"nonce":0,"power":10000,"pubKey":"0x04deadbeef","signer":"0xdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef","last_updated":"0","jailed":false,"accum":0}
              - {"id":0,"startEpoch":0,"endEpoch":0,"nonce":0,"power":10000,"pubKey":"0x04deadbeef","signer":"0xdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef","last_updated":"0","jailed":false,"accum":0}
