  success_criteria:
    - name: no_crashes
      description: CRITICAL - Oversized metadata must not crash any validator
      type: prometheus
      query: min(up{job=~"l2-(cl|el)-.*-(heimdall-v2-bor|bor-heimdall-v2)-validator"})
      threshold: "== 1"
      critical: true

    - name: no_panics_heimdall
      description: CRITICAL - No panics from oversized input parsing in Heimdall
      type: log
      pattern: "panic|runtime error|fatal error|out of memory"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true

    - name: no_panics_bor
      description: CRITICAL - No panics from oversized input parsing in Bor
      type: log
      pattern: "panic|runtime error|fatal error|out of memory"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: true

    - name: block_production_continues
      description: CRITICAL - Block production continues despite oversized responses
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: CRITICAL - Heimdall consensus advances
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    # Memory monitoring -- detect resource exhaustion
    - name: heimdall_heap_bounded
      description: >
        Heimdall heap memory should not spike above 4GB from oversized
        payloads. go_memstats_* only exists on Heimdall (CL) via
        client_golang default collectors; Bor (EL) uses go-ethereum metrics
        and does not export heap_inuse_bytes.
      type: prometheus
      query: max(go_memstats_heap_inuse_bytes{job=~"l2-cl-[1235678]-heimdall-v2-bor-validator"}) / 1073741824
      threshold: "< 4"
      critical: false
      during_fault: true

    - name: heimdall_goroutine_count_stable
      description: >
        Heimdall goroutine count should not spike. go_goroutines only
        exists on Heimdall (CL). For Bor goroutine counts use
        system_cpu_goroutines in a separate criterion.
      type: prometheus
      query: max(go_goroutines{job=~"l2-cl-[1235678]-heimdall-v2-bor-validator"})
      threshold: "< 5000"
      critical: false

    - name: bor_goroutine_count_stable
      description: >
        Bor goroutine count should not spike from retries under oversized-
        metadata load. Bor (go-ethereum metrics) exports
        `system_cpu_goroutines`, not `go_goroutines`.
      type: prometheus
      query: max(system_cpu_goroutines{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
      threshold: "< 5000"
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - go_memstats_heap_inuse_bytes
    - go_goroutines
    - process_resident_memory_bytes
    - up
