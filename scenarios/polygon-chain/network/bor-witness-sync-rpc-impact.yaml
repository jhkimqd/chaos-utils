apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-witness-sync-rpc-impact
  description: >
    Test downstream impact on witness-sync RPC nodes when validators have P2P
    latency. The devnet has a witness-sync RPC node (l2-el-7) configured with
    el_bor_sync_with_witness=true that fetches witnesses from validators.
    All existing chaos tests only assert validator health — this tests the
    RPC layer that end users and services depend on.
    Injects 5s P2P latency on 4 validators. The hypothesis: witness-sync RPC
    falls behind validators because witness delivery is delayed, even though
    validators themselves tolerate the latency. This would cause stale RPC
    responses for users during network degradation.
  tags: [network, bor, rpc, witness-sync, downstream, p2p]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6

  duration: 2m
  warmup: 30s
  cooldown: 1m

  faults:
    - phase: validator_latency_2
      description: 5s P2P latency on validator — degrades witness delivery to RPC
      target: bor_2
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: validator_latency_3
      target: bor_3
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: validator_latency_5
      target: bor_5
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: validator_latency_6
      target: bor_6
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

  success_criteria:
    # Validators should tolerate 5s latency (proven by bor-witness-protocol-stall)
    - name: validator_block_production
      description: Validators keep producing blocks
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: no_span_rotation
      description: No span rotation from validator P2P latency
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true
      post_fault_only: true

    # RPC node health — the key new assertions
    - name: rpc_node_syncing
      description: Witness-sync RPC node (el-7) continues advancing chain head
      type: prometheus
      query: rate(chain_head_block{job=~"l2-el-7-bor-.*"}[2m])
      threshold: "> 0"
      critical: true

    - name: rpc_node_not_too_far_behind
      description: >
        RPC node block height stays within 30 blocks of best validator —
        measures witness delivery lag
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - on() chain_head_block{job=~"l2-el-7-bor-.*"}
      threshold: "< 30"
      critical: false
      during_fault: true

    - name: rpc_peers_stable
      description: RPC node maintains peer connections despite validator latency
      type: prometheus
      query: cometbft_p2p_peers{job=~"l2-cl-7-.*"}
      threshold: "> 2"
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - up
