apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: cascading-latency-spike
  description: Cascading latency starting from L1 RPC propagating through the system
  tags: [network, latency, cascading, service-degradation, high-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    # L1 RPC node (matches any L1 execution client)
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "el-\\d+-geth-lighthouse"
      alias: l1_rpc_slow

    # L2 RPC node (matches any L2 RPC node)
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-\\d+-bor-heimdall-v2-rpc"
      alias: l2_rpc_slow

    # Validator (matches validator 3)
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: validator_slow

  duration: 15m
  warmup: 1m
  cooldown: 1m

  faults:
    # Phase 1: L1 RPC latency starts (0-5min)
    - phase: l1_latency_starts
      description: L1 RPC experiences 300ms latency
      target: l1_rpc_slow
      type: network
      params:
        device: eth0
        latency: 300
        target_ports: "8545,8546"
        target_proto: tcp
      duration: 13m

    # Phase 2: L2 RPC affected (5-10min)
    - phase: l2_rpc_cascades
      description: L2 RPC latency increases to 400ms due to L1 dependency
      target: l2_rpc_slow
      type: network
      params:
        device: eth0
        latency: 400
        target_ports: "8545,8546"
        target_proto: tcp
      duration: 8m
      delay: 5m

    # Phase 3: Validator affected (10-15min)
    - phase: validator_cascades
      description: Validator experiences 200ms latency due to cascading effect
      target: validator_slow
      type: network
      params:
        device: eth0
        latency: 200
        target_proto: tcp,udp
      duration: 3m
      delay: 10m

  success_criteria:
    # Critical: Block production never stalls — catches mid-test gaps that a
    # simple "increase > 0" would miss.
    - name: block_production_no_gaps
      description: Block production rate never drops to zero during fault window
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[15m:1m]))
      threshold: "> 0"
      window: 15m
      critical: true

    # Critical: Consensus never stalls — same gap-detection pattern.
    - name: consensus_no_gaps
      description: Consensus height keeps advancing in every 2m window
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])[15m:1m]))
      threshold: "> 0"
      window: 15m
      critical: true

    # Critical: Block interval stays within a degraded-but-tolerable range.
    # Normal Bor block time is ~2s; under 300-400ms latency cascading through
    # the stack we expect measurable degradation but not a halt.
    - name: block_interval_bounded
      description: Average block interval stays under 10s despite latency cascade
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[5m]))
      threshold: "> 0.1"
      window: 15m
      critical: true

    # Non-critical: Late votes SHOULD increase under latency. If they don't,
    # the fault may not be impacting consensus at all.
    - name: latency_causes_late_votes
      description: Latency injects measurable consensus impact (late votes increase)
      type: prometheus
      query: rate(cometbft_consensus_late_votes{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[5m]) * 60
      threshold: "> 1"
      window: 15m
      critical: false

    # Non-critical: Consensus round duration should increase under latency.
    - name: consensus_round_duration_impacted
      description: Consensus round duration increases under cascading latency (degradation detection)
      type: prometheus
      query: avg(rate(cometbft_consensus_round_duration_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[5m]) / rate(cometbft_consensus_round_duration_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[5m]))
      threshold: "> 0.5"
      window: 15m
      critical: false

    # Non-critical: Checkpoints continue during latency cascade.
    - name: checkpoint_activity_continues
      description: Checkpoint API calls continue despite cascading latency
      type: prometheus
      query: increase(heimdallv2_checkpoint_api_calls_total[5m])
      threshold: "> 0"
      window: 15m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 15m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 15m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_late_votes
    - cometbft_consensus_round_duration_seconds_sum
    - cometbft_consensus_round_duration_seconds_count
    - heimdallv2_checkpoint_api_calls_total
    - rpc_duration_eth_blockNumber_success
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    # Slow block & span rotation detection
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
