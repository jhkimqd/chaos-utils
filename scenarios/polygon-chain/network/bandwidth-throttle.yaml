apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bandwidth-throttle-validator
  description: Throttle network bandwidth for a validator to simulate congested network
  tags: [network, bandwidth, performance, medium-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: throttled_validator_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: throttled_validator_bor

  duration: 6m
  warmup: 30s
  cooldown: 30s

  faults:
    - phase: bandwidth_limit_heimdall
      description: Limit Heimdall bandwidth to 1 Mbps
      target: throttled_validator_heimdall
      type: network
      params:
        device: eth0
        bandwidth: 1000  # 1 Mbps in kbps
        target_proto: tcp,udp

    - phase: bandwidth_limit_bor
      description: Limit Bor bandwidth to 1 Mbps
      target: throttled_validator_bor
      type: network
      params:
        device: eth0
        bandwidth: 1000  # 1 Mbps in kbps
        target_proto: tcp,udp

  success_criteria:
    # Critical: Block production must continue (gap detection)
    - name: block_production_continues
      description: Network continues producing blocks - no mid-test stalls
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[6m:3m])) > 0
      threshold: "> 0"
      window: 6m
      critical: true

    # Critical: Consensus continues (gap detection)
    - name: consensus_continues
      description: Consensus layer continues operating - no mid-test stalls
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[1m])[6m:3m])) > 0
      threshold: "> 0"
      window: 6m
      critical: true

    # Non-critical: Checkpoint API accessible (gap detection)
    - name: checkpoint_api_accessible
      description: Checkpoint API continues to respond throughout test
      type: prometheus
      query: min(min_over_time(rate(heimdallv2_checkpoint_api_calls_total[2m])[6m:3m]))
      threshold: "> 0"
      window: 6m
      critical: false

    # Fault effectiveness: Throttled validator's consensus rate degrades
    - name: throttled_validator_rate_degrades
      description: Throttled validator 1 shows lower consensus rate than healthy validators
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-1-heimdall-v2-bor-validator"}[2m]) / clamp_min(avg(rate(cometbft_consensus_height{job=~"l2-cl-[2-4]-heimdall-v2-bor-validator"}[2m])), 0.001)
      threshold: "< 0.9"
      window: 6m
      critical: false

    # Peer count stays stable for healthy validators
    - name: healthy_peers_stable
      description: Healthy validators maintain peer connections
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-[2-4]-heimdall-v2-bor-validator"})
      threshold: ">= 2"
      window: 6m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - heimdallv2_checkpoint_api_calls_total
    - cometbft_p2p_peers
