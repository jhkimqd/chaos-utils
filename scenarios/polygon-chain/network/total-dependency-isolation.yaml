apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: total-dependency-isolation
  description: Complete isolation from all external dependencies - L1 RPC and messaging infrastructure
  tags: [network, dependency, isolation, extreme, high-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    # L1 RPC node
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "el-\\d+-geth-lighthouse"
      alias: l1_rpc

    # RabbitMQ messaging
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "rabbitmq"
      alias: rabbitmq

  duration: 10m
  warmup: 1m
  cooldown: 1m

  # Complete isolation of all external dependencies
  faults:
    - phase: l1_complete_isolation
      description: Complete L1 RPC isolation
      target: l1_rpc
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp

    - phase: rabbitmq_complete_isolation
      description: Complete RabbitMQ isolation
      target: rabbitmq
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp

  success_criteria:
    # Gap detection: L2 block production must never stall during isolation
    - name: l2_operates_independently
      description: L2 block production continues without gaps during L1 isolation
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Gap detection: L2 consensus must never stall
    - name: internal_consensus_independent
      description: L2 consensus continues without gaps during isolation
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Fault effectiveness (expected failure): checkpoint submission must fail
    - name: checkpoint_submission_fails
      description: Checkpoint submission expected to fail without L1
      type: prometheus
      query: increase(heimdallv2_checkpoint_api_calls_success_total[5m])
      threshold: "== 0"
      window: 10m
      critical: false

    # Bounded degradation: checkpoint retries at a reasonable rate
    - name: checkpoint_retries_continue
      description: System continues attempting checkpoint submissions
      type: prometheus
      query: rate(heimdallv2_checkpoint_api_calls_total[5m])
      threshold: "> 0.1"
      window: 10m
      critical: false

    # L2 peers remain stable despite L1 isolation
    - name: l2_peer_connections_stable
      description: L2 validator peer connections remain stable during isolation
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-.*-heimdall-v2-bor-validator"})
      threshold: ">= 3"
      window: 10m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 10m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - heimdallv2_checkpoint_api_calls_total
    - heimdallv2_checkpoint_api_calls_success_total
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
