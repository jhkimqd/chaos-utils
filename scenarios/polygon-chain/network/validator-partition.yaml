apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: validator-network-partition
  description: Simulate network partition isolating a validator from the Heimdall consensus network
  tags: [network, partition, high-severity, consensus]
  author: DevTools
  version: "0.0.1"

spec:
  # Target a specific validator node (both consensus and execution layers)
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: victim_validator_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: victim_validator_bor

  # Test runs for 5 minutes
  duration: 5m
  warmup: 30s
  cooldown: 30s

  # Network fault: 100% packet loss on Heimdall consensus ports
  faults:
    - phase: partition_consensus_heimdall
      description: Block all Heimdall consensus communication (Tendermint P2P)
      target: victim_validator_heimdall
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_ports: "26656,26657"
        target_proto: tcp,udp

    - phase: partition_execution_bor
      description: Block all Bor execution layer communication
      target: victim_validator_bor
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp

  # Success criteria: remaining validators MUST continue, partitioned one MUST stop
  success_criteria:
    # Critical: Healthy validators never stall (gap detection, not just sum > 0)
    - name: healthy_validators_no_gaps
      description: Validators 2-4 consensus height advances in every 1m window
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[2-4]-heimdall-v2-bor-validator"}[1m])[5m:30s]))
      threshold: "> 0"
      window: 5m
      critical: true

    # Critical: Bor blocks never stall
    - name: bor_chain_no_gaps
      description: Bor block production rate never drops to zero
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[5m:30s]))
      threshold: "> 0"
      window: 5m
      critical: true

    # Critical: Partitioned validator STOPS progressing — proves the fault works.
    # If this passes (height still advancing), the partition is not effective.
    - name: partitioned_validator_stalls
      description: Validator 1 consensus height stops advancing (proves partition is effective)
      type: prometheus
      query: increase(cometbft_consensus_height{job="l2-cl-1-heimdall-v2-bor-validator"}[3m])
      threshold: "== 0"
      window: 5m
      critical: true
      during_fault: true

    # Non-critical: Peer count for victim drops to zero
    - name: partitioned_validator_loses_peers
      description: Partitioned validator loses all peer connections
      type: prometheus
      query: cometbft_p2p_peers{job="l2-cl-1-heimdall-v2-bor-validator"}
      threshold: "== 0"
      window: 5m
      critical: false
      during_fault: true

    # Non-critical: Healthy validators maintain peers
    - name: healthy_peers_stable
      description: Healthy validators maintain at least 2 peer connections
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-[2-4]-heimdall-v2-bor-validator"})
      threshold: ">= 2"
      window: 5m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 5m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false


  metrics:
    - cometbft_consensus_height
    - chain_head_block
    - cometbft_p2p_peers
    - cometbft_consensus_validators
    - chain_checkpoint_latest
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
