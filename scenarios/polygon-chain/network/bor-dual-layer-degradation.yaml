apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-dual-layer-degradation
  description: >
    Degrade both Bor P2P and Heimdall consensus simultaneously on the same 4
    validators. In production, network issues affect ALL ports on a machine — not
    just one layer. This tests whether execution and consensus layer degradation
    amplifies each other.
    Fault: 3s latency on Bor P2P (30303) AND 1s latency on Heimdall P2P (26656)
    on 4 of 8 validators, without excluding the producer.
    The amplification theory: Bor blocks propagate slowly (3s late) → milestones
    are delayed → Heimdall rounds also slow (1s vote latency) → milestone
    commitment takes even longer → the 10-Heimdall-block rotation threshold
    (helper/config.go:701) is approached from BOTH sides: fewer Heimdall blocks
    per unit time AND slower milestone input from Bor.
    With 4/8 validators faulted and no producer exclusion, there's a ~50% chance
    per sprint the producer is affected. When it IS, the compound latency (3s Bor
    + slow Heimdall milestone commit) creates maximum pressure on the rotation
    threshold. When it ISN'T, the producer is healthy but half its peers can't
    receive blocks quickly, still degrading milestone flow.
  tags: [network, bor, heimdall, dual-layer, compound, realistic, span-rotation]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: bor_1
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: heimdall_1
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-4-heimdall-v2-bor-validator"
      alias: heimdall_4

  duration: 5m
  warmup: 30s
  cooldown: 30s

  faults:
    # Bor P2P: 3s latency — blocks arrive 3s late
    - phase: bor_latency_1
      description: 3s Bor P2P latency
      target: bor_1
      type: network
      params:
        latency: 3000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: bor_latency_2
      target: bor_2
      type: network
      params:
        latency: 3000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: bor_latency_3
      target: bor_3
      type: network
      params:
        latency: 3000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: bor_latency_4
      target: bor_4
      type: network
      params:
        latency: 3000
        target_ports: "30303"
        target_proto: tcp,udp

    # Heimdall P2P: 1s latency — votes arrive at timeout boundary
    - phase: heimdall_latency_1
      description: 1s Heimdall P2P latency
      target: heimdall_1
      type: network
      params:
        latency: 1000
        target_ports: "26656"
        target_proto: tcp

    - phase: heimdall_latency_2
      target: heimdall_2
      type: network
      params:
        latency: 1000
        target_ports: "26656"
        target_proto: tcp

    - phase: heimdall_latency_3
      target: heimdall_3
      type: network
      params:
        latency: 1000
        target_ports: "26656"
        target_proto: tcp

    - phase: heimdall_latency_4
      target: heimdall_4
      type: network
      params:
        latency: 1000
        target_ports: "26656"
        target_proto: tcp

  success_criteria:
    # ========== PRIMARY ==========

    - name: no_span_rotation
      description: Dual-layer degradation must not trigger span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true

    - name: block_production_continues
      description: Block production never fully stalls
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[5m:1m]))
      threshold: "> 0"
      window: 5m
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances despite latency on 5/8
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[3m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    # ========== Amplification indicators ==========

    - name: heimdall_block_interval
      description: Heimdall block intervals — measures consensus slowdown from vote latency
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 15.0"
      window: 5m
      critical: false

    - name: span_api_success_rate
      description: Span API success rate
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[2m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[2m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false

    - name: late_votes_bounded
      description: Late votes from dual degradation
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job=~"l2-cl-.*-validator"}[2m])) * 60
      threshold: "< 50000"
      window: 5m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - cometbft_consensus_round_duration_seconds_sum
    - cometbft_consensus_round_duration_seconds_count
    - cometbft_consensus_late_votes
    - cometbft_consensus_rounds
    - cometbft_p2p_peers
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - client_requests_span_valid
    - client_requests_span_invalid
    - up
