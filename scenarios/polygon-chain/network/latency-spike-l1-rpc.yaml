apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: latency-spike-l1-rpc
  description: Simulate latency spike on L1 RPC communication
  tags: [network, latency, dependency, l1]
  author: DevTools
  version: "0.0.1"

spec:
  # Target the L1 Geth RPC node
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "el-\\d+-geth"
      alias: l1_rpc_node

  duration: 10m
  warmup: 1m
  cooldown: 1m

  # Add 500ms latency to all RPC traffic
  faults:
    - phase: slow_l1_rpc
      description: Add significant latency to L1 RPC responses
      target: l1_rpc_node
      type: network
      params:
        device: eth0
        latency: 500
        target_ports: "8545,8546"
        target_proto: tcp

  success_criteria:
    # Critical: Bor block production never stalls (gap detection)
    - name: bor_no_production_gaps
      description: Bor block rate never drops to zero during L1 latency
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[10m:1m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Critical: Heimdall consensus never stalls
    - name: heimdall_no_consensus_gaps
      description: Heimdall consensus rate never drops to zero
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])[10m:1m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Critical: L2 block interval stays bounded — 500ms L1 latency should
    # degrade L2 but not catastrophically.
    - name: block_interval_bounded
      description: L2 block production rate stays above 0.1 blocks/sec (10s interval max)
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[5m]))
      threshold: "> 0.1"
      window: 10m
      critical: false

    # Non-critical: Checkpoint calls continue (L1 dependency under stress)
    - name: checkpoint_api_accessible
      description: Checkpoint API calls still occurring despite L1 latency
      type: prometheus
      query: increase(heimdallv2_checkpoint_api_calls_total[5m])
      threshold: "> 0"
      window: 10m
      critical: false

    # Non-critical: Peer connections remain stable
    - name: peer_connections_stable
      description: Validators maintain healthy peer counts under L1 stress
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-.*-heimdall-v2-bor-validator"})
      threshold: ">= 2"
      window: 10m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - heimdallv2_checkpoint_api_calls_total
    - rpc_duration_eth_blockNumber_success
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    # Slow block & span rotation detection
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
