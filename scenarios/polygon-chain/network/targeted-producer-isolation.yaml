apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: targeted-producer-isolation
  description: >
    Network-partitions the current block producer away from the cluster, rather
    than killing it. The producer's process stays running but cannot communicate.
    This is more dangerous than killing the producer because the isolated node
    continues running its consensus state machine with stale view of the network.
    Jepsen reference: "Targeted Primary/Leader Isolation" — directly targets the
    most dangerous failure scenario: a leader that continues accepting writes
    while cut off from its followers.
    Specific risks tested:
    - Isolated producer continues block assembly: the producer's Bor instance
      keeps building blocks but cannot propagate them. These orphan blocks may
      conflict with blocks produced by the new producer
    - Heimdall span rotation timing: how long does it take Heimdall to detect
      the producer's absence and rotate to the next validator?
    - Stale producer reconnection: when the partition heals, the isolated
      producer has a divergent block history. Tests whether it correctly
      discards its locally-produced blocks and resyncs
    - Split-brain window: between isolation and detection, both the old producer
      and new producer may create blocks at the same height
    Targets 2 validators to increase probability of hitting the active producer.
  tags: [network, partition, targeted, producer-isolation, leader-isolation, iptables]
  author: DevTools
  version: "0.1.0"
  references:
    - "Jepsen: Targeted Primary/Leader Isolation"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-5-heimdall-v2-bor-validator"
      alias: heimdall_5

  duration: 4m
  warmup: 30s
  cooldown: 3m

  faults:
    # Isolate both target validators — partition, not kill
    - phase: isolate_bor_3
      description: "Partition Bor 3 — producer continues running but isolated"
      target: bor_3
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "30303"
        target_proto: tcp
        probability: 1.0
      exclude_producer: false

    - phase: isolate_heimdall_3
      description: "Partition Heimdall 3"
      target: heimdall_3
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "26656"
        target_proto: tcp
        probability: 1.0
      exclude_producer: false

    - phase: isolate_bor_5
      description: "Partition Bor 5 — second target for producer coverage"
      target: bor_5
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "30303"
        target_proto: tcp
        probability: 1.0
      exclude_producer: false

    - phase: isolate_heimdall_5
      description: "Partition Heimdall 5"
      target: heimdall_5
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "26656"
        target_proto: tcp
        probability: 1.0
      exclude_producer: false

  success_criteria:
    # Critical: remaining validators continue
    - name: majority_continues
      description: 6/8 non-isolated validators maintain block production
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[12467]-bor-heimdall-v2-validator"}[1m])[4m:1m]))
      threshold: "> 0"
      window: 4m
      critical: true

    - name: consensus_continues
      description: Heimdall consensus continues with 6/8 validators
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 4m
      critical: true

    # Critical: convergence after partition heals
    - name: chain_head_converges
      description: >
        All validators converge after partition heals — isolated producer
        discards orphan blocks and resyncs with majority chain
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: isolated_validators_resync
      description: Isolated validators resume syncing after partition heals
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[35]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: heimdall_rejoins
      description: Isolated Heimdall validators rejoin consensus
      type: prometheus
      query: min(rate(cometbft_consensus_height{job=~"l2-cl-[35]-heimdall-v2-bor-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    # Informational: detect orphan blocks
    - name: no_permanent_fork
      description: No permanent fork from isolated producer's orphan blocks
      type: log
      pattern: "(fork.*detected|conflicting.*chain|reorgani)"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: true
      post_fault_only: true

    - name: peer_count_recovers
      description: Isolated validators reconnect peers
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-[35]-heimdall-v2-bor-validator"})
      threshold: "> 3"
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - cometbft_p2p_peers
    - up
