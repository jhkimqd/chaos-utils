apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: rpc-node-degradation
  description: RPC node experiences high load causing service degradation while staying within SLOs
  tags: [network, latency, rpc, service-level, medium-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-\\d+-bor-heimdall-v2-rpc"
      alias: degraded_rpc_bor

  duration: 8m
  warmup: 1m
  cooldown: 1m

  # Simulate high traffic load by adding latency to RPC responses
  faults:
    - phase: rpc_service_degradation
      description: Add 250ms latency to simulate RPC node under heavy load
      target: degraded_rpc_bor
      type: network
      params:
        device: eth0
        latency: 250
        target_ports: "8545,8546"
        target_proto: tcp

  success_criteria:
    # Critical: Validators continue producing blocks (gap detection + rate bound)
    - name: validators_unaffected
      description: Validators maintain steady block production - rate stays high
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[8m:4m]))
      threshold: "> 0.1"
      window: 8m
      critical: false

    # Critical: Consensus continues (gap detection + rate bound)
    - name: consensus_unaffected
      description: Consensus maintains steady rate despite RPC degradation
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])[8m:4m]))
      threshold: "> 0.1"
      window: 8m
      critical: false

    # Non-critical: RPC still responds (gap detection)
    - name: rpc_within_slo
      description: RPC remains functional throughout test
      type: prometheus
      query: min(min_over_time(rate(heimdallv2_checkpoint_api_calls_total[3m])[8m:4m]))
      threshold: "> 0"
      window: 8m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 8m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 8m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 8m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - heimdallv2_checkpoint_api_calls_total
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
