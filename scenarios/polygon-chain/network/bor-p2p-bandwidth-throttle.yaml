apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-p2p-bandwidth-throttle
  description: >
    Restrict P2P bandwidth to 100 kbit/s on 4/8 validators to selectively
    degrade large message delivery. Unlike latency (which delays all messages
    equally), bandwidth throttling disproportionately affects large payloads:
    block bodies (~100KB+ take 8+ seconds at 100kbit), witnesses, and state
    sync packets — while small messages like tx hashes and headers pass in
    milliseconds.
    This targets the download capacity calculation in eth/downloader/peer.go:
    118-121 where HeaderCapacity() uses targetRTT. With throttled bandwidth,
    effective RTT for large messages explodes, causing the downloader to
    reduce peer capacity toward zero — starving block distribution while the
    connection appears "alive" (small keepalive packets still work).
    Also tests WIT broadcast queue (10-item buffer, peer.go:19-26) — slow
    bandwidth means sendNewWitness() blocks longer, filling the queue faster
    and dropping witnesses silently.
  tags: [network, bor, p2p, bandwidth, throttle, download-capacity, wit-queue]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: bor_1
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-7-bor-heimdall-v2-validator"
      alias: bor_7

  duration: 2m
  warmup: 30s
  cooldown: 1m

  faults:
    - phase: throttle_1
      description: 100 kbit/s bandwidth limit on Bor P2P
      target: bor_1
      type: network
      params:
        bandwidth: 100
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: throttle_3
      target: bor_3
      type: network
      params:
        bandwidth: 100
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: throttle_5
      target: bor_5
      type: network
      params:
        bandwidth: 100
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: throttle_7
      target: bor_7
      type: network
      params:
        bandwidth: 100
        target_ports: "30303"
        target_proto: tcp,udp

  success_criteria:
    - name: block_production_no_gaps
      description: Block production never fully stalls despite throttled peers
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances (not bandwidth-limited)
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: no_span_rotation
      description: Bandwidth throttle must not trigger span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true
      post_fault_only: true

    # Degradation measurement
    - name: throttled_nodes_sync_rate
      description: >
        Throttled validators' sync rate — measures how much bandwidth limit
        degrades block reception vs unthrottled peers
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-[1357]-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0.3"
      critical: false
      during_fault: true

    - name: unthrottled_nodes_unaffected
      description: Unthrottled validators maintain near-normal sync rate
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-[2468]-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0.8"
      critical: false
      during_fault: true

    - name: span_api_success_rate
      description: Span API healthy (different port, not throttled)
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[2m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[2m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - system_cpu_goroutines
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - up
