apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-partition-recovery-speed
  description: >
    Test how fast the network recovers after a full partition heals. The P2P
    dial system in p2p/dial.go:50-51 uses exponential backoff for peer
    resolution: initialResolveDelay=60s, maxResolveDelay=1hour. After a
    sustained partition, peers back off reconnection attempts exponentially.
    This creates a scenario where the fault is REMOVED but the network stays
    degraded for much longer than necessary.
    Injects 100% packet loss on 3/8 validators for 3 minutes, then removes
    the fault. The critical assertion is on RECOVERY — block production must
    resume across ALL validators within the 2-minute cooldown period. If
    peer discovery backoff is too aggressive, the partitioned nodes will take
    minutes to reconnect even after the partition heals.
  tags: [network, bor, partition, recovery, peer-discovery, backoff, dial]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-7-bor-heimdall-v2-validator"
      alias: bor_7

  duration: 3m
  warmup: 30s
  cooldown: 2m

  faults:
    - phase: partition_2
      description: Full Bor P2P partition for 3 minutes
      target: bor_2
      type: network
      params:
        packet_loss: 100
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: partition_5
      target: bor_5
      type: network
      params:
        packet_loss: 100
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: partition_7
      target: bor_7
      type: network
      params:
        packet_loss: 100
        target_ports: "30303"
        target_proto: tcp,udp

  success_criteria:
    # During fault: partitioned nodes stall (proves fault is effective)
    - name: partitioned_nodes_stall
      description: Partitioned validators stop advancing chain head
      type: prometheus
      query: max(rate(chain_head_block{job=~"l2-el-[257]-bor-heimdall-v2-validator"}[2m]))
      threshold: "< 0.1"
      critical: false
      during_fault: true

    # During fault: healthy nodes keep going
    - name: healthy_nodes_produce
      description: Non-partitioned validators continue block production
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[13468]-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances (Heimdall not faulted)
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    # RECOVERY ASSERTIONS (the key test)
    - name: partitioned_nodes_recover
      description: >
        Previously partitioned validators resume block sync within 2-minute
        cooldown — tests peer discovery backoff recovery speed
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[257]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: heimdall_peers_reconnect
      description: >
        Heimdall consensus P2P peers recover on validator nodes 2, 5, 7 after
        fault heals. Bor has no Prometheus P2P peer count metric, so Heimdall
        CometBFT peer recovery serves as a network-layer proxy — if CometBFT
        can re-peer, the underlying network path is restored.
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-[257]-heimdall-v2-bor-validator"})
      threshold: "> 4"
      critical: false
      post_fault_only: true

    - name: no_span_rotation
      description: Partition + recovery must not trigger span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - up
