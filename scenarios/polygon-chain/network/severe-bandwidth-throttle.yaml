apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: severe-bandwidth-throttle
  description: Extreme bandwidth throttle (32 Kbps) - tests data sync under severe constraints with subtle degradation metrics
  tags: [network, bandwidth, extreme, subtle-metrics]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: throttled_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: throttled_bor

  duration: 10m
  warmup: 2m
  cooldown: 2m

  faults:
    - phase: extreme_throttle_heimdall
      description: 32 Kbps bandwidth (slower than dial-up, increased stress from 56 Kbps)
      target: throttled_heimdall
      type: network
      params:
        device: eth0
        bandwidth: 32        # 32 Kbps - slower than dial-up modem!
        target_proto: tcp,udp

    - phase: extreme_throttle_bor
      description: 32 Kbps bandwidth on Bor (increased stress from 56 Kbps)
      target: throttled_bor
      type: network
      params:
        device: eth0
        bandwidth: 32        # 32 Kbps - severe throttle!
        target_proto: tcp,udp

  success_criteria:
    # ========== CRITICAL BASELINE (Must Pass) ==========

    # Gap detection: healthy validators must never stall
    - name: network_continues_producing
      description: CRITICAL - Other validators maintain block production without gaps
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[134]-.*-validator"}[1m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    - name: throttled_validator_maintains_connection
      description: CRITICAL - Throttled validator stays connected (may lag)
      type: prometheus
      query: up{job="l2-cl-2-heimdall-v2-bor-validator"}
      threshold: "== 1"
      window: 10m
      critical: true

    # Gap detection: healthy consensus never stalls
    - name: healthy_consensus_no_gaps
      description: CRITICAL - Healthy validators maintain consensus without gaps
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[134]-heimdall-v2-bor-validator"}[1m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # ========== SUBTLE DEGRADATION METRICS (Detect Stress) ==========

    - name: late_votes_from_bandwidth_limits
      description: Late votes under 3500/min (bandwidth limits delay data transmission)
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job="l2-cl-2-heimdall-v2-bor-validator"}[2m])) * 60
      threshold: "< 3500"
      window: 10m
      critical: false

    - name: peer_connections_survive_throttle
      description: P2P peers stay above 2 (bandwidth limits may cause timeouts)
      type: prometheus
      query: min(cometbft_p2p_peers{job="l2-cl-2-heimdall-v2-bor-validator"})
      threshold: ">= 2"
      window: 10m
      critical: false

    - name: duplicate_votes_from_sync_delays
      description: Duplicate votes under 200/min (bandwidth causes sync issues)
      type: prometheus
      query: sum(rate(cometbft_consensus_duplicate_vote{job="l2-cl-2-heimdall-v2-bor-validator"}[2m])) * 60
      threshold: "< 200"
      window: 10m
      critical: false

    - name: consensus_round_duration_stressed
      description: Consensus rounds under 8s (bandwidth limits slow communication)
      type: prometheus
      query: rate(cometbft_consensus_round_duration_seconds_sum{job="l2-cl-2-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_round_duration_seconds_count{job="l2-cl-2-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 8.0"
      window: 10m
      critical: false

    # Fault effectiveness: throttled validator's consensus rate degrades vs healthy
    - name: throttled_validator_rate_degrades
      description: Throttled validator's consensus rate is lower than healthy validators
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-2-heimdall-v2-bor-validator"}[2m]) / clamp_min(avg(rate(cometbft_consensus_height{job=~"l2-cl-[134]-heimdall-v2-bor-validator"}[2m])), 0.001)
      threshold: "< 0.8"
      window: 10m
      critical: false

    # Bounded degradation: throttled validator still makes some progress
    - name: throttled_validator_falls_behind
      description: Throttled validator continues at reduced rate (but not zero)
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-2-heimdall-v2-bor-validator"}[3m])
      threshold: "> 0.1"
      window: 10m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 10m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false


  metrics:
    # Basic metrics
    - chain_head_block
    - cometbft_consensus_height
    - up

    # Subtle degradation metrics
    - cometbft_consensus_late_votes
    - cometbft_p2p_peers
    - cometbft_consensus_duplicate_vote
    - cometbft_consensus_round_duration_seconds_sum
    - cometbft_consensus_round_duration_seconds_count
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
