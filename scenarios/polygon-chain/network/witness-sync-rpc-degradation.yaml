apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: witness-sync-rpc-degradation
  description: >
    Throttle bandwidth on the stateless Bor RPC node that syncs with witness proofs.
    Unlike stateful nodes that maintain full trie state, the witness-sync node depends
    on receiving witness proofs from validator peers for every block. Under bandwidth
    pressure, witness proof delivery is delayed or incomplete, which can cause:
    (1) Block verification failures if witness data arrives corrupted/partial,
    (2) Sync stalls if the node cannot verify blocks without witnesses,
    (3) Memory accumulation from buffered unverified blocks waiting for witnesses,
    (4) Divergent block height vs stateful peers — the witness node falls behind
        while stateful nodes continue normally.
    This scenario compares the witness-sync RPC against the stateful Bor RPC under
    identical network conditions to surface witness-specific failure modes.
    NOTE: The witness-sync and stateful Bor RPCs share the same naming pattern
    (l2-el-N-bor-heimdall-v2-rpc) — the only difference is config, not the service
    name. You MUST update the index numbers below to match your deployment:
    the first Bor RPC (lower index) is typically witness-sync, the second is stateful.
  tags: [network, bandwidth, rpc, witness, stateless, sync, high-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    # Witness-sync (stateless) Bor RPC — depends on witness proofs
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-rpc"
      alias: witness_rpc

    # Stateful Bor RPC — has full trie, no witness dependency
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-rpc"
      alias: stateful_rpc

  duration: 10m
  warmup: 2m
  cooldown: 1m

  faults:
    # Phase 1 (0-5m): Moderate throttle on BOTH RPCs — same conditions,
    # different sync modes. Any divergence is witness-specific.
    - phase: moderate_throttle_witness
      description: 64kbit on witness-sync RPC — witness proofs may not fit in bandwidth
      target: witness_rpc
      type: network
      params:
        device: eth0
        bandwidth: 64
        target_proto: tcp,udp
      duration: 5m

    - phase: moderate_throttle_stateful
      description: 64kbit on stateful RPC — same conditions for comparison
      target: stateful_rpc
      type: network
      params:
        device: eth0
        bandwidth: 64
        target_proto: tcp,udp
      duration: 5m

    # Phase 2 (5-10m): Severe throttle — 8kbit. Witness proofs are larger than
    # block headers, so the witness node should degrade much faster than stateful.
    - phase: severe_throttle_witness
      description: 8kbit on witness-sync RPC — witness proofs cannot be delivered
      target: witness_rpc
      type: network
      params:
        device: eth0
        bandwidth: 8
        latency: 500
        target_proto: tcp,udp
      duration: 5m
      delay: 5m

    - phase: severe_throttle_stateful
      description: 8kbit on stateful RPC — same conditions for comparison
      target: stateful_rpc
      type: network
      params:
        device: eth0
        bandwidth: 8
        latency: 500
        target_proto: tcp,udp
      duration: 5m
      delay: 5m

  success_criteria:
    # Critical: Validators unaffected — RPC degradation must not propagate to consensus.
    - name: validators_unaffected
      description: Validator block production and consensus continue without gaps
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[10m:1m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Critical: Neither RPC node crashes.
    - name: rpc_nodes_stay_alive
      description: Both RPC nodes stay up (no OOM or panic from sync issues)
      type: prometheus
      query: min(min_over_time(up{job=~"l2-el-.*-bor-heimdall-v2-rpc"}[10m:1m]))
      threshold: "== 1"
      window: 10m
      critical: true

    # Non-critical: Witness RPC falls further behind than stateful RPC.
    # This is the key comparison — if both degrade equally, witness sync
    # handles bandwidth limits well. If witness degrades much more, that's
    # a witness-specific issue worth investigating.
    - name: witness_rpc_falls_behind_more
      description: Witness RPC block height falls further behind validators than stateful RPC
      type: prometheus
      query: (max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}) - chain_head_block{job="l2-el-5-bor-heimdall-v2-rpc"}) - (max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}) - chain_head_block{job="l2-el-6-bor-heimdall-v2-rpc"})
      threshold: "> 20"
      window: 10m
      critical: false
      during_fault: true

    # Non-critical: Witness RPC sync rate during severe throttle.
    - name: witness_sync_rate_severe
      description: Witness RPC sync rate during 8kbit throttle (may approach zero)
      type: prometheus
      query: rate(chain_head_block{job="l2-el-5-bor-heimdall-v2-rpc"}[3m])
      threshold: "> 0"
      window: 10m
      critical: false

    # Non-critical: Memory growth on witness node from buffered unverified blocks.
    - name: witness_memory_growth
      description: Witness RPC memory grows from buffered blocks waiting for witness data
      type: prometheus
      query: process_resident_memory_bytes{job="l2-el-5-bor-heimdall-v2-rpc"} / 1024 / 1024
      threshold: "> 512"
      window: 10m
      critical: false

    # Non-critical: Peer count on RPC nodes.
    - name: rpc_peer_stability
      description: RPC nodes maintain peer connections despite throttle
      type: prometheus
      query: min(p2p_peers{job=~"l2-el-.*-bor-heimdall-v2-rpc"})
      threshold: ">= 1"
      window: 10m
      critical: false

  metrics:
    - chain_head_block
    - p2p_peers
    - process_resident_memory_bytes
    - go_memstats_alloc_bytes
    - cometbft_consensus_height
    - up
