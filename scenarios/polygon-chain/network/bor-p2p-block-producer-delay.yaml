apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-p2p-block-producer-delay
  description: >
    Detect the WIT protocol peer lock bug (bor#2120). Adds 15s egress latency
    to 5 validators' P2P port (30303), dynamically excluding the current
    block producer. This leaves 3+ unfaulted validators (including the
    producer) to maintain milestone quorum. On unfixed bor, the WIT lock
    serializes p2p.Send(), stalling block broadcast and triggering span
    rotation. On fixed bor, concurrent sends keep peers in sync.
  tags: [network, bor, p2p, block-producer, wit-lock, egress-latency]
  author: DevTools
  version: "0.9.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: peer_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: peer_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: peer_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: peer_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: peer_6

  duration: 2m
  warmup: 30s
  cooldown: 15s

  faults:
    - phase: egress_latency_2
      target: peer_2
      type: network
      exclude_producer: true
      params:
        latency: 15000
        target_ports: "30303"
        target_proto: tcp,udp
    - phase: egress_latency_3
      target: peer_3
      type: network
      exclude_producer: true
      params:
        latency: 15000
        target_ports: "30303"
        target_proto: tcp,udp
    - phase: egress_latency_4
      target: peer_4
      type: network
      exclude_producer: true
      params:
        latency: 15000
        target_ports: "30303"
        target_proto: tcp,udp
    - phase: egress_latency_5
      target: peer_5
      type: network
      exclude_producer: true
      params:
        latency: 15000
        target_ports: "30303"
        target_proto: tcp,udp
    - phase: egress_latency_6
      target: peer_6
      type: network
      exclude_producer: true
      params:
        latency: 15000
        target_ports: "30303"
        target_proto: tcp,udp

  success_criteria:
    # ========== PRIMARY: Log-based bug detection ==========

    - name: no_span_rotation
      description: No producer replaced due to ineffectiveness
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true
      post_fault_only: true

    # ========== Chain health ==========

    - name: chain_continues_producing
      description: Block production continues across the network
      type: prometheus
      query: sum(increase(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: consensus_progresses
      description: Heimdall consensus height advances
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    # ========== Informational ==========

    - name: peer_block_propagation
      description: Average block sync rate across all validators during fault
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 1.0"
      window: 5m
      critical: false
      post_fault_only: true
      during_fault: true

    - name: block_intervals_acceptable
      description: Heimdall block intervals stay under 4s
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 4.0"
      window: 5m
      critical: false

    - name: span_api_calls_succeed
      description: Span API success rate stays healthy
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[2m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[2m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false

    - name: late_votes_bounded
      description: Late votes stay bounded
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job=~"l2-cl-.*-validator"}[2m])) * 60
      threshold: "< 50000"
      window: 5m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_rounds
    - cometbft_consensus_late_votes
    - cometbft_consensus_validator_power
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - heimdallv2_checkpoint_api_calls_total
    - cometbft_p2p_peers
    - up
