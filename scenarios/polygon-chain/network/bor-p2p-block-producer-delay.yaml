apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-p2p-block-producer-delay
  description: >
    Reproduce the WIT protocol peer lock bug (bor#2120). The bug: p.lock is held
    during p2p.Send() with a 20s write timeout. When peers become slow,
    p2p.Send() blocks waiting for the write deadline, holding p.lock and
    serializing the entire BroadcastWitness() loop — AsyncSendNewWitness() needs
    p.lock.RLock() which blocks while the write lock is held. This scenario drops
    95% of incoming P2P traffic on all three peers, simulating peers with severely
    degraded network connectivity. Unlike 100% drop (which causes devp2p to
    quickly disconnect and remove the peer from the broadcast list), 95% drop
    keeps TCP connections alive but causes the producer's TCP send buffer to fill
    with unACKed data. When the buffer is full, p2p.Send()/conn.Write() blocks,
    triggering the lock contention that stalls ALL witness broadcasts for up to
    20s per peer. Since veblopBlockTimeout is 8s, this broadcast stall causes
    validators to detect the producer as ineffective and trigger span rotation.
    Expected: producer broadcast stalls, block propagation fails for >8s,
    span rotation occurs, other validators take over production.
  tags: [network, bor, p2p, block-producer, wit-lock, tcp-degradation, bor-2120]
  author: DevTools
  version: "0.0.2"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: block_producer_bor

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: unresponsive_peer_1

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: unresponsive_peer_2

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: unresponsive_peer_3

  duration: 5m
  warmup: 30s
  cooldown: 30s

  faults:
    - phase: peers_p2p_degraded
      description: >
        Drop 95% of incoming traffic on P2P (30303) and bor RPC (8545) on peer 1.
        P2P degradation: keeps TCP alive but fills the producer's send buffer with
        unACKed data, causing conn.Write() to block → p.lock held → BroadcastWitness()
        stalls on AsyncSendNewWitness()'s RLock.
        RPC degradation: prevents this peer's heimdall from querying its local bor
        for block info, so it cannot propose accurate milestones. This is critical —
        without RPC degradation, all heimdall nodes agree on milestones (>33% voting
        power) which prevents span rotation via the "skipping span rotation" check.
      target: unresponsive_peer_1
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "30303,8545"
        target_proto: tcp,udp
        probability: 0.95

    - phase: peers_p2p_degraded_2
      description: >
        Second degraded peer — compounds the WIT lock contention and further reduces
        milestone voting power below the 1/3 threshold needed to skip span rotation.
      target: unresponsive_peer_2
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "30303,8545"
        target_proto: tcp,udp
        probability: 0.95

    - phase: peers_p2p_degraded_3
      description: >
        Third degraded peer — all peers now have severely degraded P2P and RPC.
        With all three peers' heimdall nodes unable to query bor, only the producer's
        heimdall can propose milestones (25% voting power < 33% threshold), allowing
        span rotation to proceed when the producer's broadcast stall exceeds 8s.
      target: unresponsive_peer_3
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "30303,8545"
        target_proto: tcp,udp
        probability: 0.95

  success_criteria:
    # ========== CRITICAL: Chain must not halt ==========

    - name: chain_continues_producing
      description: CRITICAL — Block production continues across the network despite degraded peers
      type: prometheus
      query: sum(increase(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: no_prolonged_block_stall
      description: CRITICAL — Block production must not stall for any 1-minute window on healthy validators
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job="l2-el-4-bor-heimdall-v2-validator"}[1m])[4m:30s]))
      threshold: "> 0"
      window: 5m
      critical: true

    - name: consensus_progresses
      description: CRITICAL — Heimdall consensus height advances throughout the test
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    # ========== WIT LOCK BUG DETECTION ==========

    - name: block_intervals_acceptable
      description: Average block intervals stay under 4s — the WIT lock bug serializes broadcasts, inflating block intervals
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 4.0"
      window: 5m
      critical: false

    - name: producer_block_rate
      description: Block producer's block rate stays healthy — WIT lock bug causes p2p.Send() to block up to 20s per peer, stalling production
      type: prometheus
      query: rate(chain_head_block{job="l2-el-1-bor-heimdall-v2-validator"}[2m])
      threshold: "> 0.1"
      window: 5m
      critical: false

    - name: other_producers_take_over
      description: Other validators take over block production after span rotation — proves the network self-heals when a producer is ineffective
      type: prometheus
      query: sum(rate(chain_head_block{job=~"l2-el-[234]-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0.1"
      window: 5m
      critical: false

    # ========== SPAN ROTATION DETECTION ==========

    - name: span_api_calls_succeed
      description: Span API call success rate remains healthy
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[2m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[2m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false

    - name: span_proposals_continue
      description: Heimdall continues processing span/milestone proposals
      type: prometheus
      query: sum(increase(heimdallv2_bor_api_calls_total[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: false

    - name: checkpoint_submissions_continue
      description: Checkpoint submissions continue despite unresponsive peer
      type: prometheus
      query: sum(increase(heimdallv2_checkpoint_api_calls_total[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: false

    # ========== NETWORK HEALTH ==========

    - name: p2p_peers_maintained
      description: Healthy validators maintain P2P connections
      type: prometheus
      query: min(cometbft_p2p_peers{job="l2-cl-1-heimdall-v2-bor-validator"})
      threshold: ">= 2"
      window: 5m
      critical: false

    - name: late_votes_bounded
      description: Late votes stay bounded — degraded peers should not cascade to consensus voting
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job=~"l2-cl-.*-validator"}[2m])) * 60
      threshold: "< 3000"
      window: 5m
      critical: false

    - name: consensus_rounds_efficient
      description: Multi-round consensus stays low — excess rounds indicate difficulty reaching agreement
      type: prometheus
      query: sum(rate(cometbft_consensus_rounds{job=~"l2-cl-.*-validator"}[2m])) * 60
      threshold: "< 10"
      window: 5m
      critical: false

    - name: validator_not_jailed
      description: Block producer retains voting power — degraded peers must not cause jailing
      type: prometheus
      query: cometbft_consensus_validator_power{job="l2-cl-1-heimdall-v2-bor-validator"}
      threshold: "> 0"
      window: 5m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed
      type: prometheus
      query: (sum(rate(client_requests_span_valid[2m])) / clamp_min(sum(rate(client_requests_span_valid[2m])) + sum(rate(client_requests_span_invalid[2m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false


  metrics:
    # Block production
    - chain_head_block

    # Consensus
    - cometbft_consensus_height
    - cometbft_consensus_rounds
    - cometbft_consensus_late_votes
    - cometbft_consensus_duplicate_vote
    - cometbft_consensus_validator_power
    - cometbft_consensus_missing_validators

    # Block timing
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count

    # Span rotation
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - heimdallv2_checkpoint_api_calls_total

    # Network health
    - cometbft_p2p_peers
    - up
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
