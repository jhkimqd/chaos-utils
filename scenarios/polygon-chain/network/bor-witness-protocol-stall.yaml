apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-witness-protocol-stall
  description: >
    Target the WIT (witness) protocol's lack of timeouts, rate limiting, and
    concurrency bounds. In eth/protocols/wit/handler.go:18 there is a TODO:
    "Once everything is working, check if need to set limits like we do in
    eth/handler.go" — meaning the witness protocol currently has NO protection
    against slow or stalled peers.
    Witness delivery via p2p.Send() is synchronous — if the recipient is slow,
    the sender blocks. This scenario injects high latency specifically on the P2P
    port to simulate slow witness delivery. Unlike bor-p2p-block-producer-delay
    (which targets the WIT lock bug with 15s latency), this uses moderate latency
    (5s) on MORE validators (6 of 8) to create widespread witness backpressure.
    The hypothesis: without rate limiting, slow witness sends accumulate and
    eventually block the P2P message handling goroutine, stalling block propagation
    as a side effect — even though the latency alone is not enough to trigger
    individual peer timeouts.
  tags: [network, bor, witness, wit-protocol, backpressure, rate-limit, p2p]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-7-bor-heimdall-v2-validator"
      alias: bor_7

  duration: 5m
  warmup: 30s
  cooldown: 30s

  faults:
    # 5s latency on all P2P traffic — enough to create witness backpressure
    # across many peers without individually triggering the 30s frame timeout
    - phase: witness_backpressure_2
      description: 5s P2P latency to create witness send backpressure
      target: bor_2
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: witness_backpressure_3
      target: bor_3
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: witness_backpressure_4
      target: bor_4
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: witness_backpressure_5
      target: bor_5
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: witness_backpressure_6
      target: bor_6
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: witness_backpressure_7
      target: bor_7
      type: network
      exclude_producer: true
      params:
        latency: 5000
        target_ports: "30303"
        target_proto: tcp,udp

  success_criteria:
    # ========== PRIMARY: Chain survives witness backpressure ==========

    - name: block_production_no_gaps
      description: Block production has no 1-minute gaps — witness backpressure must not stall blocks
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[5m:1m]))
      threshold: "> 0"
      window: 5m
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: no_span_rotation
      description: Witness backpressure must not trigger span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true
      post_fault_only: true

    # ========== Backpressure indicators ==========

    - name: goroutine_count_bounded
      description: Goroutine count stays bounded — witness sends not spawning unbounded goroutines
      type: prometheus
      query: max(go_goroutines{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 10000"
      window: 5m
      critical: false
      during_fault: true

    - name: block_sync_rate_acceptable
      description: Block sync rate stays above 50% of normal — measures propagation degradation
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0.5"
      window: 5m
      critical: false
      during_fault: true

    - name: block_intervals_acceptable
      description: Block intervals bounded — witness stalls cause block delivery delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 5m
      critical: false

    - name: span_api_success_rate
      description: Span API healthy despite P2P backpressure
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[2m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[2m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - go_goroutines
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - client_requests_span_valid
    - client_requests_span_invalid
    - cometbft_consensus_late_votes
    - up
