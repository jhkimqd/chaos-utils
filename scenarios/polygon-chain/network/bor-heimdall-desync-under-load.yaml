apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-heimdall-desync-under-load
  description: >
    Block Bor from reaching its LOCAL Heimdall on one validator while the network
    is at quorum edge (4 validators). Unlike bor-heimdall-link-isolation which
    tests within a single span window, this combines the REST isolation with
    high latency on the Heimdall consensus port to create a compound failure:
    (1) Bor cannot fetch span/checkpoint/milestone data from Heimdall REST,
    (2) Heimdall itself is slow to participate in consensus due to latency,
    (3) The validator is degraded on both layers simultaneously.
    This tests Bor's retry/backoff logic when Heimdall is unreachable, whether
    stale span cache causes block production issues, and whether the combination
    of slow consensus + missing REST data creates a feedback loop that degrades
    the entire validator beyond what either fault alone would cause.
    TARGET SETUP: 4 validators + 1 RPC.
  tags: [network, bor-heimdall, desync, compound-fault, span, quorum-edge, high-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: victim_bor

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: victim_heimdall

  duration: 10m
  warmup: 1m
  cooldown: 1m

  faults:
    # Fault 1: Block Bor→Heimdall REST API (port 1317).
    # Bor can no longer fetch spans, checkpoints, or milestones.
    # Bor's cached span will eventually expire if the test runs long enough
    # or if devnet has short span length.
    - phase: bor_heimdall_rest_blackhole
      description: 100% packet loss on Bor→Heimdall REST (port 1317) — Bor loses span/checkpoint source
      target: victim_bor
      type: network
      exclude_producer: true
      params:
        device: eth0
        packet_loss: 100
        target_ports: "1317"
        target_proto: tcp

    # Fault 2: High latency on Heimdall consensus P2P.
    # This validator's Heimdall votes arrive late, compounding the Bor-side
    # issues. The validator becomes unreliable on both layers.
    - phase: heimdall_consensus_slow
      description: 400ms latency on Heimdall P2P — votes arrive late, compounding Bor desync
      target: victim_heimdall
      type: network
      exclude_producer: true
      params:
        device: eth0
        latency: 400
        target_ports: "26656"
        target_proto: tcp

    # Fault 3: Throttle Bor P2P bandwidth.
    # Even if Bor has a cached span, throttled P2P means it can't keep up
    # with block/tx gossip, causing it to fall behind and potentially
    # triggering Bor's sync mechanism which needs Heimdall — creating a loop.
    - phase: bor_p2p_throttle
      description: 32kbit bandwidth on Bor P2P — block gossip backs up, may trigger sync that needs Heimdall
      target: victim_bor
      type: network
      exclude_producer: true
      params:
        device: eth0
        bandwidth: 32
        target_ports: "30303,30304"
        target_proto: tcp,udp

  success_criteria:
    # Critical: Healthy validators (2,3,4) must keep producing blocks.
    - name: healthy_block_production
      description: Validators 2-4 block production continues without gaps
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[2-4]-bor-heimdall-v2-validator"}[2m])[10m:1m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Critical: Healthy consensus continues.
    - name: healthy_consensus
      description: Validators 2-4 consensus height advances without gaps
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[2-4]-heimdall-v2-bor-validator"}[2m])[10m:1m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Critical: Healthy validators stay up.
    - name: healthy_validators_alive
      description: Validators 2-4 never crash from compound fault propagation
      type: prometheus
      query: min(min_over_time(up{job=~"l2-cl-[2-4]-heimdall-v2-bor-validator"}[10m:1m]))
      threshold: "== 1"
      window: 10m
      critical: true

    # Non-critical: Victim validator's Bor falls behind — expected.
    - name: victim_bor_falls_behind
      description: Victim Bor block height diverges from healthy validators
      type: prometheus
      query: max(chain_head_block{job=~"l2-el-[2-4]-bor-heimdall-v2-validator"}) - chain_head_block{job="l2-el-1-bor-heimdall-v2-validator"}
      threshold: "> 50"
      window: 10m
      critical: false
      during_fault: true

    # Non-critical: Victim Heimdall generates late votes.
    - name: victim_late_votes
      description: Victim Heimdall generates late votes from 400ms P2P latency
      type: prometheus
      query: rate(cometbft_consensus_late_votes{job="l2-cl-1-heimdall-v2-bor-validator"}[3m]) * 60
      threshold: "> 1"
      window: 10m
      critical: false

    # Non-critical: Checkpoint/span API calls from victim fail.
    - name: victim_heimdall_api_fails
      description: Victim validator cannot reach Heimdall REST API
      type: prometheus
      query: rate(heimdallv2_bor_api_calls_success_total{job="l2-cl-1-heimdall-v2-bor-validator"}[3m])
      threshold: "== 0"
      window: 10m
      critical: false
      during_fault: true

    # Non-critical: Victim validator not jailed despite compound degradation.
    - name: victim_not_jailed
      description: Victim validator retains voting power (not jailed)
      type: prometheus
      query: cometbft_consensus_validator_power{job="l2-cl-1-heimdall-v2-bor-validator"}
      threshold: "> 0"
      window: 10m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 10m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_late_votes
    - cometbft_consensus_round_duration_seconds_sum
    - cometbft_consensus_round_duration_seconds_count
    - cometbft_p2p_peers
    - cometbft_consensus_validator_power
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - heimdallv2_checkpoint_api_calls_total
    - process_resident_memory_bytes
    - up
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
