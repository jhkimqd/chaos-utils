apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-p2p-frame-timeout-cascade
  description: >
    Exploit the P2P frame read timeout (p2p/server.go:57, 30 seconds) to trigger
    cascading peer disconnections. Bor disconnects any peer whose connection is idle
    for 30 seconds — and the frame write timeout is 20 seconds (server.go:60). This
    scenario injects 25-second latency on the P2P port of 3 validators. At 25s,
    messages are still technically deliverable (under both the 30s read and 20s write
    timeouts when counted individually), but under load the compounding of write delay
    + read delay can push total round-trip past the frame timeout, causing the remote
    peer to close the connection.
    The cascading effect: when peers disconnect, remaining peers get hammered with
    reconnection attempts, the 30s inbound throttle (server.go:53) kicks in, and the
    node enters a connect/disconnect loop that degrades block propagation.
    This tests whether Bor's peer management gracefully handles near-timeout latency
    without entering a reconnection storm.
  tags: [network, bor, p2p, timeout, cascade, peer-disconnect, reconnection]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4

  duration: 5m
  warmup: 30s
  cooldown: 30s

  faults:
    # 25s latency on P2P — just under the 30s frameReadTimeout, but when combined
    # with normal processing time it pushes total round-trip past the deadline
    - phase: near_timeout_latency_2
      description: 25s P2P latency to push connections near frame timeout boundary
      target: bor_2
      type: network
      exclude_producer: true
      params:
        latency: 25000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: near_timeout_latency_3
      target: bor_3
      type: network
      exclude_producer: true
      params:
        latency: 25000
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: near_timeout_latency_4
      target: bor_4
      type: network
      exclude_producer: true
      params:
        latency: 25000
        target_ports: "30303"
        target_proto: tcp,udp

  success_criteria:
    # ========== PRIMARY: Chain must survive ==========

    - name: block_production_continues
      description: Block production never fully stalls despite peer churn
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[5m:1m]))
      threshold: "> 0"
      window: 5m
      critical: true

    - name: consensus_continues
      description: Heimdall consensus progresses
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: no_span_rotation
      description: No span rotation triggered by peer disconnection cascade
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true
      post_fault_only: true

    # ========== Peer stability indicators ==========

    - name: healthy_validator_peer_count
      description: Unfaulted validators maintain at least 1 peer — cascade hasn't fully isolated them
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-[1]-heimdall-v2-bor-validator"})
      threshold: ">= 1"
      window: 5m
      critical: false
      during_fault: true

    - name: peer_recovery_after_fault
      description: All validators re-establish peers after fault removal
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-.*-heimdall-v2-bor-validator"})
      threshold: ">= 2"
      window: 5m
      critical: false
      post_fault_only: true

    # ========== Degradation signals ==========

    - name: block_intervals_acceptable
      description: Block intervals stay reasonable — spikes indicate peer churn degrading propagation
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 5m
      critical: false

    - name: span_api_success_rate
      description: Span API remains healthy despite peer instability
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[2m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[2m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false

    - name: late_votes_bounded
      description: Late votes stay bounded — peer disconnection shouldn't cause vote delivery failures
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job=~"l2-cl-.*-validator"}[2m])) * 60
      threshold: "< 50000"
      window: 5m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - cometbft_consensus_late_votes
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - client_requests_span_valid
    - client_requests_span_invalid
    - up
