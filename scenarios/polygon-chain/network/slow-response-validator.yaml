apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: slow-response-validator
  description: Validator with slow response times - models CPU/resource exhaustion as latency
  tags: [latency, degradation, performance]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: slow_validator_consensus

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: slow_validator_execution

  duration: 10m
  warmup: 2m
  cooldown: 2m

  # Progressive latency injection to simulate CPU exhaustion
  faults:
    # Phase 1: Moderate latency (simulates moderate CPU contention)
    - phase: moderate_response_delay_consensus
      description: 200ms latency on all consensus traffic (simulates CPU contention)
      target: slow_validator_consensus
      type: network
      params:
        device: eth0
        latency: 200
        target_proto: tcp,udp
      duration: 5m

    - phase: moderate_response_delay_execution
      description: 200ms latency on all execution traffic
      target: slow_validator_execution
      type: network
      params:
        device: eth0
        latency: 200
        target_proto: tcp,udp
      duration: 5m

    # Phase 2: Severe latency (simulates severe resource exhaustion)
    - phase: severe_response_delay_consensus
      description: 500ms latency (simulates severe CPU exhaustion)
      target: slow_validator_consensus
      type: network
      params:
        device: eth0
        latency: 500
        target_proto: tcp,udp
      duration: 5m
      delay: 5m

    - phase: severe_response_delay_execution
      description: 500ms latency (simulates severe resource exhaustion)
      target: slow_validator_execution
      type: network
      params:
        device: eth0
        latency: 500
        target_proto: tcp,udp
      duration: 5m
      delay: 5m

  success_criteria:
    # Gap detection: healthy validators must never stall during the test
    - name: network_survives_slow_validator
      description: Other validators produce blocks continuously (no mid-test stalls)
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[124]-bor-heimdall-v2-validator"}[1m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Gap detection: healthy consensus never stalls
    - name: consensus_survives_degradation
      description: Healthy validators maintain consensus without gaps
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[124]-heimdall-v2-bor-validator"}[1m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    - name: quorum_maintained
      description: At least 3/4 validators remain responsive
      type: prometheus
      query: count(up{job=~"l2-cl-.*-validator"} == 1)
      threshold: ">= 3"
      window: 10m
      critical: true

    # Fault effectiveness: slow validator sees increased late votes
    - name: late_votes_from_slow_validator
      description: Slow validator generates late votes due to latency injection
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job="l2-cl-3-heimdall-v2-bor-validator"}[2m])) * 60
      threshold: "> 0"
      window: 10m
      critical: false

    # Fault effectiveness: slow validator's consensus rate degrades
    - name: slow_validator_consensus_degrades
      description: Slow validator's consensus rate is lower than healthy validators
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-3-heimdall-v2-bor-validator"}[2m]) / clamp_min(avg(rate(cometbft_consensus_height{job=~"l2-cl-[124]-heimdall-v2-bor-validator"}[2m])), 0.001)
      threshold: "< 0.8"
      window: 10m
      critical: false

    # Bounded degradation: slow validator still makes some progress
    - name: slow_validator_still_participates
      description: Slow validator maintains minimum consensus rate
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-3-heimdall-v2-bor-validator"}[2m])
      threshold: "> 0.1"
      window: 10m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_late_votes
    - cometbft_p2p_peers
    - up
