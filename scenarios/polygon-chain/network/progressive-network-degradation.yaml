apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: progressive-network-degradation
  description: Gradually increase network issues to test system resilience under progressive stress
  tags: [network, latency, packet-loss, progressive, high-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: degraded_validator_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: degraded_validator_bor

  duration: 12m
  warmup: 30s
  cooldown: 1m

  faults:
    # Phase 1: Light latency on Heimdall
    - phase: light_latency_heimdall
      description: Add 100ms latency to Heimdall
      target: degraded_validator_heimdall
      type: network
      params:
        device: eth0
        latency: 100
        target_proto: tcp,udp
      duration: 3m

    # Phase 1: Light latency on Bor
    - phase: light_latency_bor
      description: Add 100ms latency to Bor
      target: degraded_validator_bor
      type: network
      params:
        device: eth0
        latency: 100
        target_proto: tcp,udp
      duration: 3m

    # Phase 2: Moderate latency + packet loss on Heimdall
    - phase: moderate_degradation_heimdall
      description: Increase latency to 300ms and add 5% packet loss on Heimdall
      target: degraded_validator_heimdall
      type: network
      params:
        device: eth0
        latency: 300
        packet_loss: 5
        target_proto: tcp,udp
      duration: 3m
      delay: 3m

    # Phase 2: Moderate latency + packet loss on Bor
    - phase: moderate_degradation_bor
      description: Increase latency to 300ms and add 5% packet loss on Bor
      target: degraded_validator_bor
      type: network
      params:
        device: eth0
        latency: 300
        packet_loss: 5
        target_proto: tcp,udp
      duration: 3m
      delay: 3m

    # Phase 3: Heavy degradation on Heimdall
    - phase: heavy_degradation_heimdall
      description: Increase to 500ms latency and 10% packet loss on Heimdall
      target: degraded_validator_heimdall
      type: network
      params:
        device: eth0
        latency: 500
        packet_loss: 10
        target_proto: tcp,udp
      duration: 3m
      delay: 6m

    # Phase 3: Heavy degradation on Bor
    - phase: heavy_degradation_bor
      description: Increase to 500ms latency and 10% packet loss on Bor
      target: degraded_validator_bor
      type: network
      params:
        device: eth0
        latency: 500
        packet_loss: 10
        target_proto: tcp,udp
      duration: 3m
      delay: 6m

  success_criteria:
    # Gap detection: healthy validators must never stall
    - name: network_continues_producing_blocks
      description: Overall network continues block production without mid-test stalls
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[134]-bor-heimdall-v2-validator"}[2m])[12m:4m]))
      threshold: "> 0"
      window: 12m
      critical: true

    # Gap detection: consensus must never stall
    - name: consensus_progresses
      description: Heimdall consensus continues without gaps
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[134]-heimdall-v2-bor-validator"}[2m])[12m:4m]))
      threshold: "> 0"
      window: 12m
      critical: true

    # Bounded degradation: checkpoint API rate stays above minimum
    - name: checkpoint_api_accessible
      description: Checkpoint API continues to respond at a reasonable rate
      type: prometheus
      query: rate(heimdallv2_checkpoint_api_calls_total[5m])
      threshold: "> 0.1"
      window: 12m
      critical: false

    # Fault effectiveness: late votes increase under progressive latency
    - name: late_votes_from_progressive_degradation
      description: Late votes appear as latency increases progressively
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job="l2-cl-2-heimdall-v2-bor-validator"}[2m])) * 60
      threshold: "> 0"
      window: 12m
      critical: false

    # Fault effectiveness: degraded validator's consensus rate drops
    - name: degraded_validator_rate_decreases
      description: Degraded validator's consensus rate is lower than healthy peers
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-2-heimdall-v2-bor-validator"}[2m]) / clamp_min(avg(rate(cometbft_consensus_height{job=~"l2-cl-[134]-heimdall-v2-bor-validator"}[2m])), 0.001)
      threshold: "< 0.8"
      window: 12m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_late_votes
    - cometbft_p2p_peers
    - heimdallv2_checkpoint_api_calls_total
