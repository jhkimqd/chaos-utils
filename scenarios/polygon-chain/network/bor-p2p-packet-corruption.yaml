apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-p2p-packet-corruption
  description: >
    Inspired by Chaos Mesh NetworkChaos "corrupt" action. Injects 15% packet
    corruption on P2P ports (30303) for 3 validators. Unlike packet loss (which
    TCP retransmits handle), corruption delivers garbled data that passes TCP
    checksum (tc netem corrupts after checksum). This tests:
    - devp2p RLP decoding of corrupted block/tx data
    - Bor's handling of malformed block headers in eth/handler.go
    - Whether corrupted state trie nodes cause panic or graceful error
    Combined with 5% packet duplication to test idempotency of block propagation.
    P2P protocols should detect and discard corrupted messages without crashing.
  tags: [network, corruption, p2p, devp2p, chaos-mesh-inspired]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-8-bor-heimdall-v2-validator"
      alias: bor_8
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6

  duration: 2m
  warmup: 30s
  cooldown: 1m

  faults:
    - phase: corrupt_bor_2
      description: 15% packet corruption + 5% duplication on Bor P2P
      target: bor_2
      type: network
      params:
        corrupt: 15
        duplicate: 5
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: corrupt_bor_8
      target: bor_8
      type: network
      params:
        corrupt: 15
        duplicate: 5
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: corrupt_bor_6
      target: bor_6
      type: network
      params:
        corrupt: 15
        duplicate: 5
        target_ports: "30303"
        target_proto: tcp,udp

  success_criteria:
    - name: block_production_continues
      description: Network produces blocks despite corrupted P2P traffic
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: corrupted_nodes_still_sync
      description: Corrupted validators maintain some sync progress
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[268]-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0"
      critical: false

    - name: peer_connections_stable
      description: Corrupted packets should not cause peer disconnections
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-[268]-heimdall-v2-bor-validator"})
      threshold: ">= 2"
      critical: false

    - name: consensus_continues
      description: Heimdall consensus advances
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: no_span_rotation
      description: Packet corruption must not trigger span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true
      post_fault_only: true

    - name: no_crash_from_corruption
      description: No validator crashes from corrupted packet data
      type: prometheus
      query: min(up{job=~"l2-el-[268]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
