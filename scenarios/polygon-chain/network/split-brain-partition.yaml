apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: split-brain-partition
  description: Create a network partition splitting validators into two groups
  tags: [network, partition, split-brain, critical-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: partition_group_a_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: partition_group_a_bor

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: partition_group_b_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: partition_group_b_bor

  duration: 5m
  warmup: 30s
  cooldown: 1m

  faults:
    # NOTE: This creates full network isolation (including monitoring).
    # For true split-brain, ideally add target_hosts to scope packet loss
    # to opposite partition only, preserving intra-partition communication.

    # Partition group A Heimdall from group B
    - phase: partition_a_heimdall_from_b
      description: Complete network isolation of validator 1 Heimdall from all nodes
      target: partition_group_a_heimdall
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp
        # TODO: Add target_hosts parameter when supported to scope to partition B only

    # Partition group A Bor from group B
    - phase: partition_a_bor_from_b
      description: Complete network isolation of validator 1 Bor from all nodes
      target: partition_group_a_bor
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp
        # TODO: Add target_hosts parameter when supported

    # Partition group B Heimdall from group A (bidirectional)
    - phase: partition_b_heimdall_from_a
      description: Complete network isolation of validator 2 Heimdall from all nodes
      target: partition_group_b_heimdall
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp
        # TODO: Add target_hosts parameter when supported

    # Partition group B Bor from group A (bidirectional)
    - phase: partition_b_bor_from_a
      description: Complete network isolation of validator 2 Bor from all nodes
      target: partition_group_b_bor
      type: network
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp
        # TODO: Add target_hosts parameter when supported

  success_criteria:
    # Critical: Healthy validators (3,4) never stall block production
    - name: healthy_validators_no_block_gaps
      description: Non-partitioned validators maintain continuous block production
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[3-4]-bor-heimdall-v2-validator"}[1m])[5m:30s]))
      threshold: "> 0"
      window: 5m
      critical: true

    # Critical: Healthy validators (3,4) maintain consensus progress
    - name: healthy_validators_consensus_continues
      description: Non-partitioned validators consensus never stalls
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[3-4]-heimdall-v2-bor-validator"}[1m])[5m:30s]))
      threshold: "> 0"
      window: 5m
      critical: true

    # Critical: Partitioned validators STOP making consensus progress — proves
    # the partition is effective. With 100% packet loss on both sides, neither
    # validator 1 nor 2 should advance.
    - name: partitioned_validators_stall
      description: Partitioned validators (1,2) stop consensus progress (proves partition works)
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-[1-2]-heimdall-v2-bor-validator"}[3m]))
      threshold: "== 0"
      window: 5m
      critical: true
      during_fault: true

    # Non-critical: BFT quorum maintained — with 2 of 4 partitioned,
    # remaining 2 may or may not have quorum depending on voting power.
    - name: quorum_health
      description: At least 2 validators actively participating in consensus
      type: prometheus
      query: count(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[1m]) > 0)
      threshold: ">= 2"
      window: 5m
      critical: false

    # Non-critical: Partitioned validators lose peers
    - name: partitioned_peers_drop
      description: Partitioned validators lose peer connections
      type: prometheus
      query: max(cometbft_p2p_peers{job=~"l2-cl-[1-2]-heimdall-v2-bor-validator"})
      threshold: "== 0"
      window: 5m
      critical: false
      during_fault: true

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 5m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 5m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - cometbft_consensus_validators
    - heimdallv2_checkpoint_api_calls_total
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
