apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: checkpoint-delay-cascade
  description: Simulate progressive delays in checkpoint submission from multiple validators
  tags: [latency, cascade, checkpoint, medium-severity]
  author: DevTools
  version: "0.0.1"

spec:
  # Target multiple validators to simulate cascading delays
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-.*-heimdall.*validator"
      alias: all_validators

  duration: 8m
  warmup: 30s
  cooldown: 1m

  faults:
    # Phase 1: Add moderate latency to first validator
    - phase: initial_delay
      description: Add 200ms latency to first validator's checkpoint communication
      target: all_validators
      type: network
      params:
        device: eth0
        latency: 200
        target_ports: "26656,26657,1317"
        target_proto: tcp,udp
      duration: 3m

    # Phase 2: Increase latency progressively
    - phase: progressive_delay
      description: Increase latency to 500ms to simulate cascade effect
      target: all_validators
      type: network
      params:
        device: eth0
        latency: 500
        target_ports: "26656,26657,1317"
        target_proto: tcp,udp
      duration: 3m
      delay: 3m

  success_criteria:
    # Gap detection: block production must never stall during the test
    - name: block_production_continues
      description: Bor continues producing blocks without mid-test stalls
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[8m:3m]))
      threshold: "> 0"
      window: 8m
      critical: true

    # Gap detection: consensus must never stall
    - name: heimdall_consensus_progresses
      description: Heimdall consensus height increases without gaps
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])[8m:3m]))
      threshold: "> 0"
      window: 8m
      critical: true

    # Bounded degradation: checkpoint API rate stays above minimum
    - name: checkpoint_api_accessible
      description: Checkpoint API continues to respond at a reasonable rate
      type: prometheus
      query: rate(heimdallv2_checkpoint_api_calls_total[5m])
      threshold: "> 0.1"
      window: 8m
      critical: false

    # Fault effectiveness: affected validators see increased round duration
    - name: consensus_round_duration_increases
      description: Consensus round duration increases under latency injection
      type: prometheus
      query: rate(cometbft_consensus_round_duration_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_round_duration_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "> 0.5"
      window: 8m
      critical: false

    # Fault effectiveness: late votes increase under latency
    - name: late_votes_from_checkpoint_delay
      description: Late votes appear due to RPC port latency
      type: prometheus
      query: sum(rate(cometbft_consensus_late_votes{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) * 60
      threshold: "> 0"
      window: 8m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 8m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 8m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 8m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_late_votes
    - cometbft_consensus_round_duration_seconds_sum
    - cometbft_consensus_round_duration_seconds_count
    - heimdallv2_checkpoint_api_calls_total
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
