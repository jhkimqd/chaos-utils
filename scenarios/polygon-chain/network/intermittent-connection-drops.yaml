apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: intermittent-connection-drops
  description: Random connection drops using iptables - simulates firewall flakiness or network instability
  tags: [network, connection-drop, iptables, high-priority]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: validator2_consensus

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: validator2_execution

  duration: 10m
  warmup: 2m
  cooldown: 2m

  faults:
    - phase: consensus_connection_drops
      description: 10% probability of dropping new TCP connections on consensus ports
      target: validator2_consensus
      type: connection_drop
      exclude_producer: true
      params:
        rule_type: drop
        target_ports: "26656,26657"
        target_proto: tcp
        probability: 0.10
        stateful: true

    - phase: execution_connection_drops
      description: 10% probability of dropping new connections on execution P2P
      target: validator2_execution
      type: connection_drop
      exclude_producer: true
      params:
        rule_type: drop
        target_ports: "30303,30304"
        target_proto: tcp,udp
        probability: 0.10

  success_criteria:
    # Gap detection: healthy validators must never stall during the test
    - name: network_survives_connection_drops
      description: Other validators produce blocks continuously (no mid-test stalls)
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[134]-bor-heimdall-v2-validator"}[1m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Gap detection: healthy consensus never stalls
    - name: healthy_consensus_no_gaps
      description: Healthy validators maintain consensus without gaps
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[134]-heimdall-v2-bor-validator"}[1m])[10m:3m]))
      threshold: "> 0"
      window: 10m
      critical: true

    # Fault effectiveness: affected validator sees degraded peer count
    - name: affected_validator_degraded_peers
      description: Affected validator sees reduced peer count due to connection drops
      type: prometheus
      query: min(cometbft_p2p_peers{job="l2-cl-2-heimdall-v2-bor-validator"})
      threshold: "< 3"
      window: 10m
      critical: false

    # Bounded degradation: affected validator still participates at reduced rate
    - name: affected_validator_participates
      description: Affected validator continues consensus participation despite drops
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-2-heimdall-v2-bor-validator"}[2m])
      threshold: "> 0.1"
      window: 10m
      critical: false

    - name: quorum_maintained
      description: At least 3/4 validators always reachable
      type: prometheus
      query: count(up{job=~"l2-cl-.*-validator"} == 1)
      threshold: ">= 3"
      window: 10m
      critical: true

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 10m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 10m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - p2p_peers
    - up
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
