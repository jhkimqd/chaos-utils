apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bor-dns-delay-peer-discovery
  description: >
    Inject 5s DNS resolution delay on 4 validators while simultaneously
    restarting 2 other validators. This targets the peer discovery path in
    p2p/dial.go where DNS is used to resolve bootnodes and static peers.
    After a validator restart, reconnection depends on DNS resolution for
    peer discovery. With 5s DNS delay, the initialResolveDelay (60s,
    p2p/dial.go:50) combined with slow resolution means restarted validators
    take significantly longer to find peers and rejoin the network.
    This simulates a real-world scenario: cloud DNS issues (common during
    region failover) coinciding with a rolling validator restart (common
    during upgrades). The compound effect — slow DNS + need to discover peers
    — may push recovery time past the span rotation threshold.
  tags: [network, dns, peer-discovery, restart, compound, rolling-upgrade]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-7-bor-heimdall-v2-validator"
      alias: bor_7
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-8-bor-heimdall-v2-validator"
      alias: bor_restart_8
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_restart_6

  duration: 2m
  warmup: 30s
  cooldown: 2m

  faults:
    # DNS delay on 4 validators
    - phase: dns_delay_2
      description: 5s DNS resolution delay
      target: bor_2
      type: dns
      params:
        delay_ms: 5000

    - phase: dns_delay_3
      target: bor_3
      type: dns
      params:
        delay_ms: 5000

    - phase: dns_delay_5
      target: bor_5
      type: dns
      params:
        delay_ms: 5000

    - phase: dns_delay_7
      target: bor_7
      type: dns
      params:
        delay_ms: 5000

    # Restart 2 validators (they need DNS to rediscover peers)
    - phase: restart_8
      description: Restart validator 8 — must rediscover peers via slow DNS
      target: bor_restart_8
      type: container_restart
      params:
        grace_period: 5
        restart_delay: 3

    - phase: restart_6
      description: Restart validator 6 — must rediscover peers via slow DNS
      target: bor_restart_6
      type: container_restart
      params:
        grace_period: 5
        restart_delay: 3

  success_criteria:
    - name: block_production_continues
      description: Remaining validators keep producing blocks
      type: prometheus
      query: sum(increase(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: no_span_rotation
      description: DNS delay + restart must not trigger span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true
      post_fault_only: true

    # Recovery assertions
    - name: restarted_validators_recover
      description: Restarted validators come back online
      type: prometheus
      query: min(up{job=~"l2-el-[68]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: restarted_validators_sync
      description: Restarted validators resume block sync during cooldown
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[68]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: false
      post_fault_only: true

    - name: peer_count_recovers
      description: All validators reestablish peer connections
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-.*-heimdall-v2-bor-validator"})
      threshold: "> 3"
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - up
