apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: regional-network-outage
  description: Simulate regional outage isolating single validator while maintaining network consensus
  tags: [network, outage, validator-isolation, high-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    # Single validator isolation (maintains 3/4 = 75% > 67% threshold)
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: isolated_validator_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: isolated_validator_bor

  duration: 8m
  warmup: 3m  # Increased: allow network to stabilize after previous tests
  cooldown: 2m  # Increased: allow network to fully recover

  # Isolate single validator (maintains consensus with 3/4 validators)
  faults:
    - phase: isolate_validator_heimdall
      description: Complete network isolation of validator 1 Heimdall
      target: isolated_validator_heimdall
      type: network
      exclude_producer: true
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp

    - phase: isolate_validator_bor
      description: Complete network isolation of validator 1 Bor
      target: isolated_validator_bor
      type: network
      exclude_producer: true
      params:
        device: eth0
        packet_loss: 100
        target_proto: tcp,udp

  success_criteria:
    # Critical: Network survives with 3/4 validators (gap detection)
    - name: network_survives_single_validator_loss
      description: Network continues with 3 remaining validators - no mid-test stalls
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[8m:4m])) > 0
      threshold: "> 0"
      window: 8m
      critical: true

    # Critical: Consensus maintained by majority (gap detection)
    - name: consensus_maintained_by_majority
      description: Consensus continues with 3/4 validators - no mid-test stalls
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[2-4]-heimdall-v2-bor-validator"}[1m])[8m:4m])) > 0
      threshold: "> 0"
      window: 8m
      critical: true

    # Expected: Only 3 validators actively participating (validator 1 isolated)
    - name: only_three_validators_active
      description: Only 3 validators participating in consensus (validator 1 isolated)
      type: prometheus
      query: count(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[1m]) > 0)
      threshold: "== 3"
      window: 8m
      critical: false

    # Fault effectiveness: Isolated validator stalls
    - name: isolated_validator_stalls
      description: Isolated validator 1 stops making consensus progress
      type: prometheus
      query: increase(cometbft_consensus_height{job="l2-cl-1-heimdall-v2-bor-validator"}[2m])
      threshold: "<= 0"
      window: 8m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 8m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 8m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 8m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_validators
    - cometbft_p2p_peers
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
