apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: bridge-subscription-failure
  description: >
    Corrupt packets on 1 Heimdall validator to break WebSocket subscriptions.
    bridge/listener/base.go:190-210 exits its goroutine on subscription error
    without reconnecting — falls back to polling with an event gap.

    Target code paths:
    - bridge/listener/base.go:190-210 — StartSubscription exits on error, no reconnect
    - bridge/listener/base.go:140-188 — StartPolling fallback
    - bridge/listener/rootchain.go — L1 event listening

    Network: 8 validators (chaos-suite topology), sprint=16, span=128, block_time=1s
  tags: [network, bridge, subscription, websocket, event-loss]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2

  duration: 2m
  warmup: 20s
  cooldown: 1m

  faults:
    - phase: corrupt_heimdall_2
      description: "20% packet corruption on Heimdall 2 — breaks WebSocket subscriptions"
      target: heimdall_2
      type: network
      params:
        corrupt: 20

  success_criteria:
    - name: heimdall_consensus_continues
      description: "Heimdall consensus unaffected by bridge subscription failure"
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-[1235678]-heimdall-v2-bor-validator"}[1m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: bor_block_production
      description: "Bor block production unaffected"
      type: prometheus
      # F2: widen inner window [1m]→[3m] — avoids cold-start tail flake; every validator must produce.
      query: min(rate(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"}[3m]))
      threshold: "> 0"
      critical: true

    - name: bridge_api_resumes
      description: "Bridge API calls resume after corruption removed"
      type: prometheus
      query: sum(rate(heimdallv2_bor_api_calls_total[2m])) or vector(0)
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: subscription_errors_logged
      description: "Bridge subscription errors appear in logs"
      type: log
      pattern: "(error while subscribing|subscription.*error|websocket.*close|context deadline exceeded|error.*milestone)"
      container_pattern: "l2-cl-2-heimdall-v2-bor-validator"
      absence: false
      critical: false

    - name: no_panics
      description: "No panics from corrupted bridge data"
      type: log
      pattern: "(panic|fatal)"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - up
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    - heimdallv2_checkpoint_api_calls_total
