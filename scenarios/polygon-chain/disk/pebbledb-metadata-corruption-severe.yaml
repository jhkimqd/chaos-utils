apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: pebbledb-metadata-corruption-severe
  description: >
    Corrupt the PebbleDB MANIFEST file by overwriting bytes near the end,
    simulating a partial write during a crash where the OS wrote the first half
    of a metadata entry but not the second.
    Jepsen reference: "File Truncation" — partial writes are common during
    crashes. Tests whether the system's recovery logic correctly detects and
    handles incomplete writes rather than interpreting garbage as valid data.
    Infrastructure note: file_corrupt requires a FILE path, not a directory.
    We target the MANIFEST file (PebbleDB's version history) because:
    - It's always present and its name is stored in CURRENT
    - Corruption at the tail simulates a partial write during compaction
    - PebbleDB must detect the corrupt MANIFEST and either repair or fail
    The MANIFEST filename varies (MANIFEST-NNNNNN), so we use a shell command
    to find and corrupt it. Since file_corrupt needs an exact path, we target
    the CURRENT file (which contains the MANIFEST path) with a larger
    corruption size to ensure significant damage.
    Specific risks tested:
    - MANIFEST recovery with corrupted entries: PebbleDB must detect the
      corrupt entries and either skip them or fail cleanly
    - Data loss from metadata corruption: the MANIFEST tracks SST file
      references. Corruption may cause PebbleDB to lose track of valid data
    - Cascading failure: if MANIFEST corruption points to nonexistent SST
      files, reads may fail unpredictably
  tags: [disk, truncation, manifest, pebbledb, partial-write]
  author: DevTools
  version: "0.1.0"
  references:
    - "Jepsen: File Truncation"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-4-heimdall-v2-bor-validator"
      alias: heimdall_4

  duration: 8m
  warmup: 30s
  cooldown: 4m

  faults:
    # Phase 1: SIGKILL to ensure WAL has uncommitted entries
    - phase: stop_bor
      description: "SIGKILL Bor 4 — ensure pending WAL entries exist"
      target: bor_4
      type: container_kill
      params:
        signal: SIGKILL
        restart: false

    # Phase 2: Corrupt the CURRENT file (256 bytes — likely destroys the
    # MANIFEST filename reference, forcing PebbleDB to fail open)
    - phase: corrupt_metadata
      description: "Corrupt PebbleDB CURRENT — 256 bytes random overwrite"
      target: bor_4
      type: file_corrupt
      params:
        target_path: "/var/lib/bor/data/bor/chaindata/CURRENT"
        corrupt_bytes: 256
        method: random
        backup_first: true
      delay: 10s

    # Phase 3: Restart — PebbleDB must handle corrupted metadata
    - phase: restart_bor
      description: "Restart Bor 4 — test metadata recovery"
      target: bor_4
      type: container_restart
      params:
        grace_period: 0
        restart_delay: 0
      delay: 20s

  success_criteria:
    # Critical: other validators unaffected
    - name: healthy_validators_continue
      description: Other validators maintain block production
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"}[1m])[8m:1m]))
      threshold: "> 0"
      window: 8m
      critical: true

    - name: consensus_continues
      description: Consensus continues
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 8m
      critical: true

    # Informational: recovery behavior
    - name: metadata_corruption_detected
      description: Evidence of metadata error in logs (expected behavior)
      type: log
      pattern: "(CURRENT|MANIFEST|corrupt|pebble.*error|open.*database)"
      container_pattern: "l2-el-4-bor-heimdall-v2-validator"
      absence: false
      critical: false
      post_fault_only: true

    - name: no_silent_data_loss
      description: >
        No silent data serving from corrupt state — should either recover
        correctly or crash with clear error
      type: log
      pattern: "(serving.*corrupt|invalid.*state.*hash)"
      container_pattern: "l2-el-4-bor-heimdall-v2-validator"
      absence: true
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
