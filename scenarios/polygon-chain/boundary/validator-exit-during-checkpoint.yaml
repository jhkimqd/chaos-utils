apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: validator-exit-during-checkpoint
  description: >
    Kill 1 validator (Bor + Heimdall) mid-checkpoint to test the race
    between EndBlocker validator set updates and checkpoint vote extension
    validation. With 4 validators, losing 1 leaves 3/4 = 75% > 2/3,
    so consensus must continue.

    Target code paths:
    - stake/keeper/abci.go:14-18 — EndBlocker updates every block
    - app/abci.go:940-952 — VE uses penultimate-block validator set
    - x/checkpoint/keeper/ — checkpoint with missing vote extensions

    Network: 8 validators (chaos-suite topology), sprint=16, span=128, block_time=1s
  tags: [boundary, checkpoint, validator-exit, vote-extension, race-condition]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2

  duration: 3m
  warmup: 20s
  cooldown: 2m

  faults:
    - phase: kill_heimdall_2
      description: "SIGKILL Heimdall 2 — disrupts checkpoint vote extensions"
      target: heimdall_2
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 20

    - phase: kill_bor_2
      description: "SIGKILL Bor 2 — removes from block production"
      target: bor_2
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 20

  success_criteria:
    - name: majority_block_production
      description: "Remaining validators produce blocks (v2 is fault target; v4 excluded as known flaky)"
      type: prometheus
      # F2: widen inner window [1m]→[3m] — avoids cold-start tail flake; every validator must produce.
      query: min(rate(chain_head_block{job=~"l2-el-[135678]-bor-heimdall-v2-validator"}[3m]))
      threshold: "> 0"
      critical: true

    - name: heimdall_consensus_continues
      description: "Heimdall consensus continues with 3/4 validators"
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-[1235678]-heimdall-v2-bor-validator"}[1m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: checkpoints_continue
      description: "Checkpoint API continues from remaining validators"
      type: prometheus
      query: sum(rate(heimdallv2_checkpoint_api_calls_total{job!="l2-cl-2-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

    - name: killed_validator_recovers
      description: "Killed validator rejoins consensus after restart"
      type: prometheus
      query: rate(cometbft_consensus_height{job="l2-cl-2-heimdall-v2-bor-validator"}[1m])
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: block_times_acceptable
      description: "Block intervals stay reasonable during disruption"
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-[1235678]-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-[1235678]-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 15.0"
      critical: false

    - name: post_chaos_state_root_consensus
      description: >
        All validators — including the one that restarted mid-checkpoint — agree
        on stateRoot after recovery. A divergence would indicate the kill
        interrupted an EndBlocker validator-set update in a way that left
        validator 2 applying a different validator set than the remaining 3,
        causing different state sync outcomes.
      type: state_root_consensus
      container_pattern: "bor-heimdall-v2-validator"
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - up
    - heimdallv2_checkpoint_api_calls_total
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
