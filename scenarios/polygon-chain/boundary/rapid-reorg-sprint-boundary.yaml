apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: rapid-reorg-sprint-boundary
  description: >
    Force reorgs at sprint boundaries by degrading 1 validator's P2P with
    high latency + packet loss. At sprint=16 blocks/1s, the 90s fault window
    crosses ~5 sprint boundaries. The degraded validator builds competing
    chains that converge slowly, triggering reorgs at boundary blocks.

    Target code paths:
    - snapshot.go:129 — delete(snap.Recents, number-sprintLength) non-atomic
    - State sync TX loss/duplication when reorg crosses sprint boundary

    Network: 4 validators, sprint=16, span=128, block_time=1s
  tags: [boundary, sprint, reorg, snapshot, medium-severity]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3

  duration: 90s
  warmup: 20s
  cooldown: 2m

  faults:
    - phase: degrade_bor_3
      description: "200ms latency + 30% loss on Bor 3 P2P — causes occasional reorgs at sprint boundaries"
      target: bor_3
      type: network
      params:
        latency: 200
        packet_loss: 30
        target_ports: "30303"
        target_proto: tcp

    - phase: degrade_heimdall_3
      description: "200ms latency + 30% loss on Heimdall 3 consensus"
      target: heimdall_3
      type: network
      params:
        latency: 200
        packet_loss: 30
        target_ports: "26656"
        target_proto: tcp

  success_criteria:
    - name: majority_block_production
      description: "3 healthy validators produce blocks"
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[12]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: chain_head_converges
      description: "All validators converge — no snapshot corruption"
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"})
      threshold: "< 60"
      critical: true
      post_fault_only: true

    - name: no_permanent_fork
      description: "No permanent chain split from Recents map corruption"
      type: log
      pattern: "(fork.*detected|conflicting.*chain)"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: true
      post_fault_only: true

    - name: affected_validator_resync
      description: "Degraded validator resumes after fault removed"
      type: prometheus
      query: rate(chain_head_block{job="l2-el-3-bor-heimdall-v2-validator"}[1m])
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: post_chaos_state_root_consensus
      description: >
        All Bor validators agree on stateRoot after rapid reorg stress at sprint boundaries.
        The Recents map and snapshot accumulator must survive concurrent reorgs without
        producing divergent state.
      type: state_root_consensus
      container_pattern: "bor-heimdall-v2-validator"
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
