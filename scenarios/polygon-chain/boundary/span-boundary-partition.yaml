apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: span-boundary-partition
  description: >
    Full network partition of 2/4 validators at a span boundary. With
    span=128 blocks at 1s/block = 128s per span. The 3-minute partition
    crosses at least 1 span boundary, forcing each side to attempt span
    commitment independently with only 2 validators.

    With 4 validators and BFT 2/3 threshold, a 50/50 split stalls Heimdall
    consensus. Bor may continue on one side via backup producer logic.
    After heal, the LRU span cache (no reorg invalidation) is tested.

    Target code paths:
    - bor.go:checkAndCommitSpan() — commit at spanEnd - sprint + 1
    - span_store.go — LRU cache not invalidated on reorg after reunite
    - snapshot.go:apply() — validator set at sprint-end

    Network: 4 validators, sprint=16, span=128, block_time=1s
  tags: [boundary, span, partition, cache-divergence, high-severity]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-1-bor-heimdall-v2-validator"
      alias: bor_1
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-1-heimdall-v2-bor-validator"
      alias: heimdall_1
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2

  duration: 2m
  warmup: 20s
  cooldown: 30s

  faults:
    - phase: partition_bor_1
      description: "Partition Bor 1 P2P"
      target: bor_1
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "30303"
        target_proto: tcp
        probability: 1.0

    - phase: partition_bor_2
      description: "Partition Bor 2 P2P"
      target: bor_2
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "30303"
        target_proto: tcp
        probability: 1.0

    - phase: partition_heimdall_1
      description: "Partition Heimdall 1 consensus"
      target: heimdall_1
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "26656"
        target_proto: tcp
        probability: 1.0

    - phase: partition_heimdall_2
      description: "Partition Heimdall 2 consensus"
      target: heimdall_2
      type: connection_drop
      params:
        rule_type: drop
        target_ports: "26656"
        target_proto: tcp
        probability: 1.0

  success_criteria:
    - name: chain_head_converges
      description: "All validators converge after heal — span cache not stale"
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-[123]-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: heimdall_consensus_resumes
      description: "Heimdall consensus was advancing during partition (non-critical: CometBFT P2P reconnect takes minutes after 50% partition)"
      type: prometheus
      query: max(rate(cometbft_consensus_height{job=~"l2-cl-[123]-heimdall-v2-bor-validator"}[1m]))
      threshold: "> 0"
      critical: false
      post_fault_only: true

    - name: partitioned_validators_resync
      description: "Partitioned validators resume block production"
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[12]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: span_api_recovers
      description: "Span API calls succeed after partition heals"
      type: prometheus
      query: (sum(rate(client_requests_span_valid[2m])) / clamp_min(sum(rate(client_requests_span_valid[2m])) + sum(rate(client_requests_span_invalid[2m])), 0.001)) or vector(1)
      threshold: ">= 0.9"
      critical: false
      post_fault_only: true

    - name: no_permanent_fork
      description: "No permanent fork from span cache divergence"
      type: log
      pattern: "(fork.*detected|conflicting.*chain|reorgani)"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: true
      post_fault_only: true

    - name: post_chaos_state_root_consensus
      description: >
        All Bor validators agree on stateRoot after span-boundary partition heals.
        Span cache divergence can cause different validator sets post-partition,
        leading to silent state divergence that only surfaces at the next checkpoint.
      type: state_root_consensus
      container_pattern: "bor-heimdall-v2-validator"
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - cometbft_p2p_peers
    - up
    - client_requests_span_valid
    - client_requests_span_invalid
