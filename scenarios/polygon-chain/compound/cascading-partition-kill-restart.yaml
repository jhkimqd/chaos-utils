apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: cascading-partition-kill-restart
  description: >
    Inspired by Gremlin's compound scenario patterns. Simulates a cascading
    infrastructure failure: network partition → process kill → forced restart.
    Models a real-world scenario where a network switch failure isolates nodes,
    causing timeouts that trigger OOM kills, followed by automated restart.
    Phase 1: Complete P2P blackhole (100% loss) on 3 validators
    Phase 2: SIGKILL the isolated validators (simulating watchdog/OOM kill)
    Phase 3: Restart with 10s delay (simulating slow VM recovery)
    Tests whether the chain recovers after a cascading failure affecting 3/8
    validators. The remaining 5 healthy validators must maintain consensus
    and the recovering nodes must rejoin without forking.
  tags: [compound, cascading, partition, kill, restart, gremlin-inspired]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-4-heimdall-v2-bor-validator"
      alias: heimdall_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-6-heimdall-v2-bor-validator"
      alias: heimdall_6

  duration: 6m
  warmup: 30s
  cooldown: 3m

  faults:
    # Phase 1: Network partition (100% packet loss = blackhole)
    - phase: partition_bor_2
      description: Complete P2P blackhole on Bor 2
      target: bor_2
      type: network
      params:
        packet_loss: 100
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: partition_bor_4
      target: bor_4
      type: network
      params:
        packet_loss: 100
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: partition_bor_6
      target: bor_6
      type: network
      params:
        packet_loss: 100
        target_ports: "30303"
        target_proto: tcp,udp

    # Phase 2: Kill isolated nodes (simulating watchdog/OOM after partition)
    - phase: kill_bor_2
      description: SIGKILL partitioned validator 2
      target: bor_2
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 10

    - phase: kill_bor_4
      target: bor_4
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 10

    - phase: kill_bor_6
      target: bor_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 10

    # Also kill Heimdall on same nodes
    - phase: kill_heimdall_2
      description: SIGKILL Heimdall on partitioned nodes
      target: heimdall_2
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 10

    - phase: kill_heimdall_4
      target: heimdall_4
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 10

    - phase: kill_heimdall_6
      target: heimdall_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 10

  success_criteria:
    - name: healthy_quorum_maintained
      description: 5/8 healthy validators maintain block production throughout
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[13578]-bor-heimdall-v2-validator"}[1m])[6m:1m]))
      threshold: "> 0"
      window: 6m
      critical: true

    - name: consensus_continues
      description: Consensus advances with 5/8 validators online
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 6m
      critical: true

    - name: crashed_validators_recover
      description: All killed validators come back online
      type: prometheus
      query: min(up{job=~"l2-el-[246]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: crashed_validators_sync
      description: Recovered validators resume block sync
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[246]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: chain_head_converges
      description: All validators converge — no fork from cascading failure
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 80"
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
