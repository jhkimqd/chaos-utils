apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: disk-fill-chaindata-under-load
  description: >
    Inspired by Gremlin's Disk Fill attack. Fills the chaindata directory on 2
    validators to 90% capacity while the chain is actively producing blocks.
    Tests how Bor handles "no space left on device" errors during LevelDB/Pebble
    writes (core/rawdb/accessors_chain.go). The DB engine should either:
    (a) gracefully degrade and stop accepting new blocks, or
    (b) trigger a controlled shutdown rather than silent corruption.
    Simultaneously stresses Heimdall's data directory on the same nodes.
    After fault removal (fill file deleted), validators should recover and
    resume syncing without manual intervention or data directory wipe.
  tags: [compound, disk-fill, storage, capacity, gremlin-inspired]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-2-heimdall-v2-bor-validator"
      alias: heimdall_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-4-heimdall-v2-bor-validator"
      alias: heimdall_4

  duration: 5m
  warmup: 30s
  cooldown: 2m

  faults:
    - phase: fill_bor_2
      description: Fill Bor chaindata to 90% on validator 2
      target: bor_2
      type: disk_fill
      params:
        target_path: "/var/lib/bor/bor/chaindata"
        fill_percent: 90

    - phase: fill_bor_4
      description: Fill Bor chaindata to 90% on validator 4
      target: bor_4
      type: disk_fill
      params:
        target_path: "/var/lib/bor/bor/chaindata"
        fill_percent: 90

    - phase: fill_heimdall_2
      description: Fill Heimdall data to 90% on validator 2
      target: heimdall_2
      type: disk_fill
      params:
        target_path: "/etc/heimdall/data"
        fill_percent: 90

    - phase: fill_heimdall_4
      description: Fill Heimdall data to 90% on validator 4
      target: heimdall_4
      type: disk_fill
      params:
        target_path: "/etc/heimdall/data"
        fill_percent: 90

  success_criteria:
    - name: healthy_validators_unaffected
      description: Non-faulted validators maintain block production
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[13568]-bor-heimdall-v2-validator"}[1m])[5m:1m]))
      threshold: "> 0"
      window: 5m
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances despite disk pressure on 2 nodes
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: faulted_validators_recover
      description: Disk-filled validators resume sync after cleanup
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[24]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: no_db_corruption_on_recovery
      description: Validators converge to same chain head — no corruption from disk full
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: no_span_rotation
      description: Disk-full on 2/8 validators must not cause span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
