apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: wal-corruption-under-load
  description: >
    Inspired by Chaos Mesh IOChaos fault action. Corrupts 4KB of the active
    CometBFT WAL file on 2 Heimdall validators while consensus is live.
    CometBFT WAL (cs.wal/wal) records all consensus state transitions — votes,
    proposals, and precommits. Corrupting the WAL mid-round simulates partial
    disk writes from power loss or disk controller errors.
    Combined with a container restart (to force WAL replay), this tests whether
    Heimdall detects the corruption and recovers from the last committed state.
  tags: [compound, wal, corruption, crash-recovery, database, chaos-mesh-inspired]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-7-heimdall-v2-bor-validator"
      alias: heimdall_7

  duration: 5m
  warmup: 30s
  cooldown: 3m

  faults:
    # Corrupt active Heimdall WAL file to simulate partial write / disk corruption
    - phase: corrupt_heimdall_wal_3
      description: Corrupt active Heimdall CometBFT WAL on validator 3
      target: heimdall_3
      type: file_corrupt
      params:
        target_path: "/etc/heimdall/data/cs.wal/wal"
        corrupt_bytes: 4096
        method: zero
        backup_first: true

    - phase: corrupt_heimdall_wal_7
      description: Corrupt active Heimdall CometBFT WAL on validator 7
      target: heimdall_7
      type: file_corrupt
      params:
        target_path: "/etc/heimdall/data/cs.wal/wal"
        corrupt_bytes: 4096
        method: zero
        backup_first: true

    # Force restart to trigger WAL replay
    - phase: restart_heimdall_3
      target: heimdall_3
      type: container_restart
      params:
        grace_period: 5
        restart_delay: 3

    - phase: restart_heimdall_7
      target: heimdall_7
      type: container_restart
      params:
        grace_period: 5
        restart_delay: 3

  success_criteria:
    - name: validators_come_back
      description: All WAL-deleted validators restart successfully
      type: prometheus
      query: min(up{job=~"l2-el-[37]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: validators_resume_sync
      description: WAL-deleted validators resume block sync after restart
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[37]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: heimdall_recovers
      description: Heimdall consensus continues after WAL deletion
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: chain_head_converges
      description: No fork from WAL loss — validators converge to same chain head
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: healthy_validators_unaffected
      description: Non-faulted validators continue normally
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[124568]-bor-heimdall-v2-validator"}[1m])[5m:1m]))
      threshold: "> 0"
      window: 5m
      critical: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
