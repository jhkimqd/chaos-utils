apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: wal-corruption
  description: >
    Corrupts Bor's PebbleDB CURRENT file on 2 validators, then restarts them.
    CURRENT is a 16-byte pointer to the active MANIFEST — without it PebbleDB
    cannot open the database. This tests the hardest database failure path:
    Bor must detect the corrupted DB, fail to start, and the container manager
    (docker restart policy) should bring it back. On restart with a corrupted
    CURRENT, Bor either repairs using MANIFEST directly or requires a full
    resync from peers. This validates the operational recovery path.
  tags: [compound, corruption, pebbledb, crash-recovery, bor]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-7-bor-heimdall-v2-validator"
      alias: bor_7

  duration: 5m
  warmup: 30s
  cooldown: 3m

  faults:
    # Corrupt CURRENT pointer — PebbleDB cannot find MANIFEST on open
    - phase: corrupt_bor_current_3
      description: Corrupt PebbleDB CURRENT file on validator 3
      target: bor_3
      type: file_corrupt
      params:
        target_path: "/var/lib/bor/bor/chaindata/CURRENT"
        corrupt_bytes: 16
        method: random
        backup_first: true

    - phase: corrupt_bor_current_7
      description: Corrupt PebbleDB CURRENT file on validator 7
      target: bor_7
      type: file_corrupt
      params:
        target_path: "/var/lib/bor/bor/chaindata/CURRENT"
        corrupt_bytes: 16
        method: random
        backup_first: true

    # Restart to force Bor to re-open the corrupted DB
    - phase: restart_bor_3
      description: Restart Bor 3 — PebbleDB must handle corrupted CURRENT
      target: bor_3
      type: container_restart
      params:
        grace_period: 5
        restart_delay: 3

    - phase: restart_bor_7
      description: Restart Bor 7 — PebbleDB must handle corrupted CURRENT
      target: bor_7
      type: container_restart
      params:
        grace_period: 5
        restart_delay: 3

  success_criteria:
    - name: validators_come_back
      description: Corrupted validators eventually come back online
      type: prometheus
      query: min(up{job=~"l2-el-[37]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: validators_resume_sync
      description: Corrupted validators resume block sync after recovery
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[37]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: chain_head_converges
      description: No fork — all validators converge to same chain head
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: consensus_continues
      description: Heimdall consensus unaffected
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: healthy_validators_unaffected
      description: Non-faulted validators continue normally
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[124568]-bor-heimdall-v2-validator"}[1m])[5m:1m]))
      threshold: "> 0"
      window: 5m
      critical: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
