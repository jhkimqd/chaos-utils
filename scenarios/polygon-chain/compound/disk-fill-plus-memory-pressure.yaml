apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: disk-fill-plus-memory-pressure
  description: >
    Inspired by Gremlin compound patterns. Combines disk space exhaustion with
    memory pressure on the same validators. This models a worst-case resource
    scenario: the VM is running out of both disk and memory simultaneously.
    When disk fills, Bor's DB engine may try to compact/flush more aggressively,
    consuming MORE memory. Meanwhile, memory pressure forces the Go GC to run
    more frequently, consuming CPU cycles. This creates a resource death spiral:
    disk full → more memory needed → GC pressure → slower compaction → timeout.
    Tests 2 validators with 85% disk fill + 768MB memory limit.
  tags: [compound, disk-fill, memory, resource-spiral, gremlin-inspired]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-8-bor-heimdall-v2-validator"
      alias: bor_8
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-4-heimdall-v2-bor-validator"
      alias: heimdall_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-8-heimdall-v2-bor-validator"
      alias: heimdall_8

  duration: 5m
  warmup: 30s
  cooldown: 2m

  faults:
    # Disk fill on Bor
    - phase: fill_bor_4
      description: Fill Bor 4 chaindata to 85%
      target: bor_4
      type: disk_fill
      params:
        target_path: "/var/lib/bor/bor/chaindata"
        fill_percent: 85

    - phase: fill_bor_8
      target: bor_8
      type: disk_fill
      params:
        target_path: "/var/lib/bor/bor/chaindata"
        fill_percent: 85

    # Memory pressure on Bor
    - phase: mem_bor_4
      description: Memory limit 768MB on Bor 4
      target: bor_4
      type: memory_pressure
      params:
        memory_mb: 768

    - phase: mem_bor_8
      target: bor_8
      type: memory_pressure
      params:
        memory_mb: 768

    # Memory pressure on Heimdall
    - phase: mem_heimdall_4
      description: Memory limit 512MB on Heimdall 4
      target: heimdall_4
      type: memory_pressure
      params:
        memory_mb: 512

    - phase: mem_heimdall_8
      target: heimdall_8
      type: memory_pressure
      params:
        memory_mb: 512

  success_criteria:
    - name: healthy_validators_unaffected
      description: Non-faulted validators maintain block production
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[123567]-bor-heimdall-v2-validator"}[1m])[5m:1m]))
      threshold: "> 0"
      window: 5m
      critical: true

    - name: consensus_continues
      description: Consensus advances with 6/8 healthy validators
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: recovery_after_cleanup
      description: Degraded validators recover after resource restoration
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[48]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: no_oom_crash
      description: Validators stay online (no OOM kill at 768MB)
      type: prometheus
      query: min(up{job=~"l2-el-[48]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      window: 5m
      critical: false

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
