apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: shifting-fault-combinations
  description: >
    Different fault types are rotated over time within a single test run:
    Phase 1 (t=0): network latency on validators 3,5
    Phase 2 (t=45s): disk I/O delay on validators 4,6 (while network heals)
    Phase 3 (t=90s): process kills on validators 3,7
    Phase 4 (t=135s): container pause (SIGSTOP) on validators 5,8
    Creates overlapping failure scenarios where the system may not have fully
    recovered from one fault before the next begins.
    Jepsen reference: "Shifting Fault Combinations Over Time" — creates complex,
    overlapping failure scenarios. Metastable failures emerge where brief
    interruptions cause long-lasting partial unavailability.
    Note: original Jepsen nemesis uses clock skew in later phases, but Docker
    containers share the host kernel clock, making per-container clock skew
    impossible. We substitute container_pause (SIGSTOP) which creates similar
    "zombie node" disruption.
    Specific risks tested:
    - Recovery-during-new-fault: each new fault phase begins while the system
      is still recovering from the previous one. Tests whether recovery from
      fault A is derailed by the onset of fault B
    - Cumulative degradation: even if each individual fault is tolerable, the
      continuous stream of different fault types may exhaust system resources
      (connection pools, goroutines, retry budgets)
    - Different fault type interactions: network → disk → process → pause
      exercises different subsystems in sequence, testing whether state left
      behind by one fault type affects the system's ability to handle another
  tags: [compound, shifting, rotation, multi-fault, metastable]
  author: DevTools
  version: "0.1.0"
  references:
    - "Jepsen: Shifting Fault Combinations Over Time"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: bor_4
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-7-bor-heimdall-v2-validator"
      alias: bor_7
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-8-bor-heimdall-v2-validator"
      alias: bor_8
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-5-heimdall-v2-bor-validator"
      alias: heimdall_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-7-heimdall-v2-bor-validator"
      alias: heimdall_7
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-8-heimdall-v2-bor-validator"
      alias: heimdall_8

  duration: 8m
  warmup: 30s
  cooldown: 3m

  faults:
    # ============ PHASE 1 (t=0): NETWORK LATENCY ============
    - phase: network_latency_bor_3
      description: "Phase 1 — 3s P2P latency on Bor 3"
      target: bor_3
      type: network
      params:
        latency: 3000
        target_ports: "30303"
        target_proto: tcp

    - phase: network_latency_bor_5
      description: "Phase 1 — 3s P2P latency on Bor 5"
      target: bor_5
      type: network
      params:
        latency: 3000
        target_ports: "30303"
        target_proto: tcp

    # ============ PHASE 2 (t=45s): DISK I/O DELAY ============
    - phase: disk_io_bor_4
      description: "Phase 2 — 200ms disk I/O delay on Bor 4 chaindata"
      target: bor_4
      type: disk_io
      params:
        io_latency_ms: 200
        target_path: "/var/lib/bor/bor/chaindata"
        operation: all
      delay: 45s

    - phase: disk_io_bor_6
      description: "Phase 2 — 200ms disk I/O delay on Bor 6 chaindata"
      target: bor_6
      type: disk_io
      params:
        io_latency_ms: 200
        target_path: "/var/lib/bor/bor/chaindata"
        operation: all
      delay: 45s

    # ============ PHASE 3 (t=90s): PROCESS KILLS ============
    - phase: kill_bor_3
      description: "Phase 3 — SIGKILL Bor 3 (may still be recovering from Phase 1 latency)"
      target: bor_3
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 90s

    - phase: kill_heimdall_7
      description: "Phase 3 — SIGKILL Heimdall 7"
      target: heimdall_7
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 90s

    - phase: kill_bor_7
      description: "Phase 3 — SIGKILL Bor 7"
      target: bor_7
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 90s

    # ============ PHASE 4 (t=135s): CONTAINER PAUSE (SIGSTOP) ============
    - phase: pause_bor_5
      description: "Phase 4 — pause Bor 5 (zombie node with open sockets)"
      target: bor_5
      type: container_pause
      params:
        duration: 60s
      delay: 135s

    - phase: pause_heimdall_5
      description: "Phase 4 — pause Heimdall 5"
      target: heimdall_5
      type: container_pause
      params:
        duration: 60s
      delay: 135s

    - phase: pause_bor_8
      description: "Phase 4 — pause Bor 8"
      target: bor_8
      type: container_pause
      params:
        duration: 60s
      delay: 135s

    - phase: pause_heimdall_8
      description: "Phase 4 — pause Heimdall 8"
      target: heimdall_8
      type: container_pause
      params:
        duration: 60s
      delay: 135s

  success_criteria:
    # Critical: block production never fully stops
    - name: block_production_continues
      description: Block production continues through all 4 fault phases
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[2m])[8m:2m]))
      threshold: "> 0"
      window: 8m
      critical: true

    - name: consensus_continues
      description: Consensus advances through shifting fault combinations
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 8m
      critical: true

    # Critical: full convergence after all faults cleared
    - name: chain_head_converges
      description: All validators converge after shifting faults end
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    # Critical: all validators online
    - name: all_validators_online
      description: All validators online after shifting faults
      type: prometheus
      query: count(up{job=~"l2-el-.*-bor-heimdall-v2-validator"} == 1) / scalar(count(up{job=~"l2-el-.*-bor-heimdall-v2-validator"}))
      threshold: ">= 1"
      window: 8m
      critical: true

    # Informational: no corruption from compound faults
    - name: no_db_corruption
      description: No PebbleDB corruption from overlapping fault types
      type: log
      pattern: "(corruption|MANIFEST.*error|pebble.*panic)"
      container_pattern: "bor-heimdall-v2-validator"
      absence: true
      critical: false
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - cometbft_p2p_peers
    - up
    - go_goroutines
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
