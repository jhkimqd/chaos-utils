apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: clock-skew-consensus-drift
  description: >
    Inspired by Chaos Mesh TimeChaos and Gremlin Time Travel. Skews the system
    clock forward by 5 minutes on 2 validators with NTP blocked. This directly
    tests CometBFT's block timestamp validation and Bor's span rotation timing.
    In Heimdall, CometBFT rejects blocks with timestamps too far in the future
    (consensus/state.go:validateBlock). A 5-minute drift approaches the allowed
    threshold. Bor's block production also depends on accurate time for:
    - Sprint timing (16 blocks at 2s = 32s per sprint)
    - Span rotation calculations (6400 blocks)
    - Checkpoint submission windows
    NOTE: Requires SYS_TIME capability on target containers. Docker containers
    share the host kernel clock, so this skew may affect other containers.
  tags: [compound, clock-skew, time, consensus, chaos-mesh-inspired]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-5-heimdall-v2-bor-validator"
      alias: heimdall_5

  duration: 4m
  warmup: 30s
  cooldown: 2m

  faults:
    - phase: skew_bor_3
      description: Skew Bor 3 clock +5 minutes into the future
      target: bor_3
      type: clock_skew
      params:
        offset: "+5m"
        disable_ntp: true

    - phase: skew_bor_5
      description: Skew Bor 5 clock +5 minutes into the future
      target: bor_5
      type: clock_skew
      params:
        offset: "+5m"
        disable_ntp: true

    - phase: skew_heimdall_3
      description: Skew Heimdall 3 clock +5 minutes into the future
      target: heimdall_3
      type: clock_skew
      params:
        offset: "+5m"
        disable_ntp: true

    - phase: skew_heimdall_5
      description: Skew Heimdall 5 clock +5 minutes into the future
      target: heimdall_5
      type: clock_skew
      params:
        offset: "+5m"
        disable_ntp: true

  success_criteria:
    - name: network_continues
      description: Block production continues despite clock-skewed validators
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[4m:1m]))
      threshold: "> 0"
      window: 4m
      critical: true

    - name: consensus_advances
      description: Heimdall consensus height increases
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 4m
      critical: true

    - name: skewed_validators_not_rejected
      description: Clock-skewed validators still participate (not fully ejected)
      type: prometheus
      query: min(cometbft_p2p_peers{job=~"l2-cl-[35]-heimdall-v2-bor-validator"})
      threshold: ">= 1"
      window: 4m
      critical: false

    - name: healthy_validators_unaffected
      description: Non-skewed validators maintain normal sync rate
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-[124678]-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0.5"
      window: 4m
      critical: true

    - name: validators_recover_after_fix
      description: Validators resume normal operation after clock restoration
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[35]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - up
