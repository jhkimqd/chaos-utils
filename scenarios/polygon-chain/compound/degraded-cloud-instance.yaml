apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: degraded-cloud-instance
  description: >
    Inspired by Gremlin's compound resource attacks. Simulates a degraded cloud
    VM (the "noisy neighbor" problem) by simultaneously applying CPU throttle,
    memory pressure, network latency, and disk I/O delay on the same validators.
    Models real-world scenarios: cloud provider CPU steal, memory contention from
    co-located VMs, network congestion from over-subscribed links.
    Each individual fault is intentionally mild (CPU 60%, memory 1GB limit,
    500ms latency, ionice idle) — the test is whether their combination causes
    cascading failure. Individually survivable, combined they may overwhelm
    goroutine scheduling, GC pause times, and block import pipelines.
  tags: [compound, resource, cpu, memory, network, disk-io, cloud, gremlin-inspired]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-3-bor-heimdall-v2-validator"
      alias: bor_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-5-bor-heimdall-v2-validator"
      alias: bor_5
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-3-heimdall-v2-bor-validator"
      alias: heimdall_3
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-5-heimdall-v2-bor-validator"
      alias: heimdall_5

  duration: 5m
  warmup: 30s
  cooldown: 2m

  faults:
    # Memory pressure — 1GB limit
    - phase: mem_heimdall_3
      description: Memory limit 1GB on Heimdall 3
      target: heimdall_3
      type: memory_pressure
      params:
        memory_mb: 1024

    - phase: mem_heimdall_5
      target: heimdall_5
      type: memory_pressure
      params:
        memory_mb: 1024

    # Network latency — 500ms on P2P
    - phase: latency_bor_3
      description: 500ms P2P latency on Bor 3
      target: bor_3
      type: network
      params:
        latency: 500
        target_ports: "30303"
        target_proto: tcp,udp

    - phase: latency_bor_5
      target: bor_5
      type: network
      params:
        latency: 500
        target_ports: "30303"
        target_proto: tcp,udp

    # Disk I/O — idle priority
    - phase: disk_bor_3
      description: Disk I/O deprioritized on Bor 3
      target: bor_3
      type: disk_io
      params:
        io_latency_ms: 100
        target_path: "/var/lib/bor/bor/chaindata"
        operation: all

    - phase: disk_bor_5
      target: bor_5
      type: disk_io
      params:
        io_latency_ms: 100
        target_path: "/var/lib/bor/bor/chaindata"
        operation: all

  success_criteria:
    - name: network_survives_degradation
      description: Block production continues under 4-way degradation
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-.*-bor-heimdall-v2-validator"}[1m])[5m:1m]))
      threshold: "> 0"
      window: 5m
      critical: true

    - name: consensus_continues
      description: Heimdall consensus advances
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      window: 5m
      critical: true

    - name: degraded_nodes_still_sync
      description: Degraded validators maintain some sync progress
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-[35]-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0"
      window: 5m
      critical: false

    - name: healthy_validators_unaffected
      description: Non-degraded validators maintain normal rate
      type: prometheus
      query: avg(rate(chain_head_block{job=~"l2-el-[124678]-bor-heimdall-v2-validator"}[2m]))
      threshold: "> 0.5"
      window: 5m
      critical: true

    - name: no_span_rotation
      description: Mild compound degradation must not trigger span rotation
      type: log
      pattern: "Span rotated due to the current producer's ineffectiveness"
      container_pattern: "heimdall-v2-bor-validator"
      absence: true
      critical: false
      post_fault_only: true

    - name: recovery_after_cleanup
      description: Degraded nodes return to full speed after fault removal
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[35]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - up
