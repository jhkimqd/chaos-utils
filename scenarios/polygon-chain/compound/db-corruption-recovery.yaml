apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: db-corruption-recovery
  description: >
    Tests Bor's database recovery after data loss caused by SIGKILL under
    disk I/O contention. Bor runs PebbleDB in NoSync mode (async WAL writes)
    meaning unflushed memtable data is lost on crash. Under I/O contention,
    the flush-to-disk pipeline backs up, widening the data loss window.
    Phase 1: Inject I/O contention on Bor's chaindata directory
    Phase 2: SIGKILL Bor (simulating OOM kill during degraded I/O)
    Phase 3: Restart and verify Bor re-syncs lost blocks from peers
    This is more realistic than static file corruption — it tests the actual
    data loss path that occurs in production during disk degradation events.
  tags: [compound, corruption, pebbledb, crash-recovery, sigkill, bor]
  author: DevTools
  version: "0.1.0"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-2-bor-heimdall-v2-validator"
      alias: bor_2
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-6-bor-heimdall-v2-validator"
      alias: bor_6

  duration: 4m
  warmup: 30s
  cooldown: 1m

  faults:
    # Phase 1: I/O contention on chaindata — widens the unflushed data window
    - phase: io_contention_bor_2
      description: I/O contention on Bor 2 chaindata
      target: bor_2
      type: disk_io
      params:
        io_latency_ms: 200
        target_path: "/var/lib/bor/bor/chaindata"
        operation: write

    - phase: io_contention_bor_6
      description: I/O contention on Bor 6 chaindata
      target: bor_6
      type: disk_io
      params:
        io_latency_ms: 200
        target_path: "/var/lib/bor/bor/chaindata"
        operation: write

    # Phase 2: SIGKILL while I/O is backed up — maximum data loss
    # delay: 60s ensures I/O contention is fully established before kill
    - phase: kill_bor_2
      description: SIGKILL Bor 2 during I/O contention
      target: bor_2
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 60s

    - phase: kill_bor_6
      description: SIGKILL Bor 6 during I/O contention
      target: bor_6
      type: container_kill
      params:
        signal: SIGKILL
        restart: true
        restart_delay: 5
      delay: 60s

  success_criteria:
    - name: killed_validators_recover
      description: Killed validators come back online
      type: prometheus
      query: min(up{job=~"l2-el-[26]-bor-heimdall-v2-validator"})
      threshold: "== 1"
      critical: true
      post_fault_only: true

    - name: killed_validators_sync
      description: Killed validators resume block sync — DB recovered
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[26]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true
      post_fault_only: true

    - name: chain_head_converges
      description: No fork from crash — all validators on same chain
      type: prometheus
      query: >
        max(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
        - min(chain_head_block{job=~"l2-el-[1235678]-bor-heimdall-v2-validator"})
      threshold: "< 50"
      critical: true
      post_fault_only: true

    - name: healthy_validators_unaffected
      description: Non-faulted validators maintain block production
      type: prometheus
      query: min(rate(chain_head_block{job=~"l2-el-[13458]-bor-heimdall-v2-validator"}[1m]))
      threshold: "> 0"
      critical: true

    - name: consensus_continues
      description: Heimdall consensus unaffected
      type: prometheus
      query: sum(increase(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m])) or vector(0)
      threshold: "> 0"
      critical: true

  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_p2p_peers
    - up
