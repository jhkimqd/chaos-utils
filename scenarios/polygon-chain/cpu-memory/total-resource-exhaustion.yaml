apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: total-resource-exhaustion
  description: Simultaneous CPU, memory, and disk I/O exhaustion on 2 validators
  tags: [extreme, resource, cpu, memory, disk, combined]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-[34]-heimdall-v2-bor-validator"
      alias: stressed_validators_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-[34]-bor-heimdall-v2-validator"
      alias: stressed_validators_bor

  duration: 12m
  warmup: 2m
  cooldown: 3m

  faults:
    # CPU starvation on both validators
    - phase: cpu_starvation_heimdall
      description: 95% CPU load on validators 3 & 4 Heimdall
      target: stressed_validators_heimdall
      type: cpu
      params:
        cpu_percent: 95
        duration: 12m

    - phase: cpu_starvation_bor
      description: 95% CPU load on validators 3 & 4 Bor
      target: stressed_validators_bor
      type: cpu
      params:
        cpu_percent: 95
        duration: 12m

    # Memory pressure
    - phase: memory_pressure_heimdall
      description: 80% memory consumption
      target: stressed_validators_heimdall
      type: memory
      params:
        memory_percent: 80
        duration: 12m

    - phase: memory_pressure_bor
      description: 80% memory consumption
      target: stressed_validators_bor
      type: memory
      params:
        memory_percent: 80
        duration: 12m

    # Disk I/O delays
    - phase: disk_io_heimdall
      description: Severe I/O delays
      target: stressed_validators_heimdall
      type: disk_io
      params:
        delay_ms: 500
        duration: 12m

    - phase: disk_io_bor
      description: Severe I/O delays
      target: stressed_validators_bor
      type: disk_io
      params:
        delay_ms: 500
        duration: 12m

  success_criteria:
    # Network continues with healthy validators — gap detection
    - name: healthy_validators_continue
      description: Validators 1 & 2 maintain network without any 1-minute gap
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[12]-bor-heimdall-v2-validator"}[1m])[12m:4m]))
      threshold: "> 0"
      window: 12m
      critical: true

    # Stressed validators stay up (don't OOM or crash)
    - name: stressed_validators_survive_heimdall
      description: Heimdall validators 3 & 4 stay online despite resource exhaustion
      type: prometheus
      query: count(up{job=~"l2-cl-[34]-heimdall-v2-bor-validator"} == 1)
      threshold: "== 2"
      window: 12m
      critical: false

    - name: stressed_validators_survive_bor
      description: Bor validators 3 & 4 stay online despite resource exhaustion
      type: prometheus
      query: count(up{job=~"l2-el-[34]-bor-heimdall-v2-validator"} == 1)
      threshold: "== 2"
      window: 12m
      critical: false

    # Consensus continues — gap detection
    - name: consensus_continues
      description: Consensus maintained without any 1-minute gap by healthy majority
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[1m])[12m:4m]))
      threshold: "> 0"
      window: 12m
      critical: true

    # Fault effectiveness: stressed validators have measurably lower block rate
    - name: stressed_validators_rate_degrades
      description: Stressed validators (3,4) produce blocks at a lower rate than healthy validators (1,2)
      type: prometheus
      query: sum(rate(cometbft_consensus_height{job=~"l2-cl-[12]-heimdall-v2-bor-validator"}[2m])) - sum(rate(cometbft_consensus_height{job=~"l2-cl-[34]-heimdall-v2-bor-validator"}[2m]))
      threshold: "> 0"
      window: 12m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 12m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 12m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 12m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_missing_validators
    - up
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
