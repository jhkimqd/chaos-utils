apiVersion: chaos.polygon.io/v1
kind: ChaosScenario
metadata:
  name: monitoring-stress-test
  description: Progressive failure injection to validate monitoring and alerting systems detect issues
  tags: [monitoring, alerting, progressive, validation, medium-severity]
  author: DevTools
  version: "0.0.1"

spec:
  targets:
    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-cl-4-heimdall-v2-bor-validator"
      alias: monitored_validator_heimdall

    - selector:
        type: kurtosis_service
        enclave: "${ENCLAVE_NAME}"
        pattern: "l2-el-4-bor-heimdall-v2-validator"
      alias: monitored_validator_bor

  duration: 18m
  warmup: 1m
  cooldown: 1m

  # Progressive failure injection to test monitoring thresholds
  faults:
    # Phase 1: Subtle degradation (should NOT trigger alerts)
    - phase: subtle_degradation_heimdall
      description: 5% packet loss - below alert threshold
      target: monitored_validator_heimdall
      type: network
      params:
        device: eth0
        packet_loss: 5
        target_proto: tcp,udp
      duration: 5m

    - phase: subtle_degradation_bor
      description: 5% packet loss - below alert threshold
      target: monitored_validator_bor
      type: network
      params:
        device: eth0
        packet_loss: 5
        target_proto: tcp,udp
      duration: 5m

    # Phase 2: Noticeable degradation (should trigger WARNING)
    - phase: noticeable_degradation_heimdall
      description: 25% packet loss - should trigger warnings
      target: monitored_validator_heimdall
      type: network
      params:
        device: eth0
        packet_loss: 25
        target_proto: tcp,udp
      duration: 5m
      delay: 6m

    - phase: noticeable_degradation_bor
      description: 25% packet loss - should trigger warnings
      target: monitored_validator_bor
      type: network
      params:
        device: eth0
        packet_loss: 25
        target_proto: tcp,udp
      duration: 5m
      delay: 6m

    # Phase 3: Severe degradation (should trigger CRITICAL)
    - phase: severe_degradation_heimdall
      description: 75% packet loss - should trigger critical alerts
      target: monitored_validator_heimdall
      type: network
      params:
        device: eth0
        packet_loss: 75
        target_proto: tcp,udp
      duration: 5m
      delay: 12m

    - phase: severe_degradation_bor
      description: 75% packet loss - should trigger critical alerts
      target: monitored_validator_bor
      type: network
      params:
        device: eth0
        packet_loss: 75
        target_proto: tcp,udp
      duration: 5m
      delay: 12m

  success_criteria:
    # Critical: Network continues with other validators — gap detection
    - name: network_resilient_to_single_failure
      description: Healthy validators continue producing blocks without any 2-minute gap
      type: prometheus
      query: min(min_over_time(rate(chain_head_block{job=~"l2-el-[1-3]-bor-heimdall-v2-validator"}[2m])[18m:6m]))
      threshold: "> 0"
      window: 18m
      critical: true

    # Critical: Consensus continues with majority — gap detection
    - name: consensus_with_majority
      description: Healthy validators maintain consensus without any 2-minute gap
      type: prometheus
      query: min(min_over_time(rate(cometbft_consensus_height{job=~"l2-cl-[1-3]-heimdall-v2-bor-validator"}[2m])[18m:6m]))
      threshold: "> 0"
      window: 18m
      critical: true

    # Monitoring validation: Validator 4 should show degradation
    - name: degraded_validator_detected
      description: Monitoring should detect validator 4 degradation
      type: prometheus
      query: increase(cometbft_consensus_height{job="l2-cl-4-heimdall-v2-bor-validator"}[5m])
      threshold: "< 10"
      window: 18m
      critical: false

    # ========== SLOW BLOCK & SPAN ROTATION DETECTION ==========

    - name: block_times_acceptable
      description: Block intervals stay within acceptable range — detects slow blocks from degraded p2p or span delays
      type: prometheus
      query: rate(cometbft_consensus_block_interval_seconds_sum{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]) / clamp_min(rate(cometbft_consensus_block_interval_seconds_count{job=~"l2-cl-.*-heimdall-v2-bor-validator"}[2m]), 0.001)
      threshold: "< 10.0"
      window: 18m
      critical: false

    - name: span_api_success_rate
      description: Span API call success rate remains healthy — detects span rotation issues from p2p or network delays
      type: prometheus
      query: (sum(rate(heimdallv2_bor_api_calls_success_total[5m])) / clamp_min(sum(rate(heimdallv2_bor_api_calls_total[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 18m
      critical: false

    - name: bor_span_requests_healthy
      description: Bor-side span fetch requests succeed — detects client-side span rotation failures from p2p delays or Heimdall unavailability
      type: prometheus
      query: (sum(rate(client_requests_span_valid[5m])) / clamp_min(sum(rate(client_requests_span_valid[5m])) + sum(rate(client_requests_span_invalid[5m])), 0.001)) or vector(1)
      threshold: ">= 0.8"
      window: 18m
      critical: false


  metrics:
    - chain_head_block
    - cometbft_consensus_height
    - cometbft_consensus_validators
    - cometbft_consensus_missing_validators
    - panoptichain_heimdall_missed_block_proposal
    # Slow block & span rotation detection
    - cometbft_consensus_block_interval_seconds_sum
    - cometbft_consensus_block_interval_seconds_count
    - heimdallv2_bor_api_calls_total
    - heimdallv2_bor_api_calls_success_total
    # Bor-side span rotation detection
    - client_requests_span_valid
    - client_requests_span_invalid
    - client_requests_span_duration
    - client_requests_latestspan_valid
    - client_requests_latestspan_invalid
