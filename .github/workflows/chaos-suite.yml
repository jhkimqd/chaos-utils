name: chaos-suite

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8 AM UTC
  workflow_dispatch:
    inputs:
      scenario_filter:
        description: "Scenario category: all, network, applications, boundary, compound, disk"
        required: false
        default: "all"
      scenario_count:
        description: "Number of scenarios to sample (0 = run all)"
        required: false
        default: "8"
      kurtosis_pos_ref:
        description: "kurtosis-pos branch/tag to deploy"
        required: false
        default: "feat/execution-specs"
      fast_mode:
        description: "Compress scenario timings for faster CI (true/false)"
        required: false
        default: "true"
      bor_image:
        description: "Bor Docker image (leave empty to auto-detect latest release)"
        required: false
        default: ""
      heimdall_v2_image:
        description: "Heimdall-v2 Docker image (leave empty to auto-detect latest release)"
        required: false
        default: ""

permissions:
  contents: read
  actions: write
  packages: read
  id-token: write

concurrency:
  group: chaos-suite-${{ github.ref }}
  cancel-in-progress: true

env:
  ENCLAVE_NAME: pos
  KURTOSIS_POS_REF: ${{ inputs.kurtosis_pos_ref || 'feat/execution-specs' }}

jobs:
  resolve-images:
    runs-on: ubuntu-latest
    outputs:
      bor-image: ${{ steps.resolve.outputs.bor-image }}
      heimdall-v2-image: ${{ steps.resolve.outputs.heimdall-v2-image }}
    steps:
      - name: Resolve bor and heimdall-v2 images
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use explicit images if provided
          if [[ -n "${{ inputs.bor_image }}" ]]; then
            echo "bor-image=${{ inputs.bor_image }}" >> "$GITHUB_OUTPUT"
          else
            bor_tag=$(gh api repos/0xPolygon/bor/releases --jq \
              '[.[] | select(.draft == false)] | .[0].tag_name' 2>/dev/null || echo "")
            if [[ -n "$bor_tag" ]]; then
              echo "bor-image=0xpolygon/bor:${bor_tag#v}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch bor release, using 'latest'."
              echo "bor-image=0xpolygon/bor:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [[ -n "${{ inputs.heimdall_v2_image }}" ]]; then
            echo "heimdall-v2-image=${{ inputs.heimdall_v2_image }}" >> "$GITHUB_OUTPUT"
          else
            hv2_tag=$(gh api repos/0xPolygon/heimdall-v2/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [[ -n "$hv2_tag" ]]; then
              echo "heimdall-v2-image=0xpolygon/heimdall-v2:${hv2_tag#v}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch heimdall-v2 release, using 'latest'."
              echo "heimdall-v2-image=0xpolygon/heimdall-v2:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Summary
        run: |
          echo "### Chaos Suite Image Resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bor | \`${{ steps.resolve.outputs.bor-image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Heimdall-v2 | \`${{ steps.resolve.outputs.heimdall-v2-image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kurtosis-pos ref | \`${{ env.KURTOSIS_POS_REF }}\` |" >> "$GITHUB_STEP_SUMMARY"

  run-chaos-tests:
    needs: resolve-images
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout chaos-utils
        uses: actions/checkout@v6

      - name: Checkout kurtosis-pos
        uses: actions/checkout@v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Install Kurtosis
        run: |
          echo "deb [trusted=yes] https://apt.fury.io/kurtosis-tech/ /" | sudo tee /etc/apt/sources.list.d/kurtosis.list
          sudo apt update
          sudo apt install -y kurtosis-cli
          kurtosis analytics disable

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build chaos-runner
        run: make build-runner

      - name: Build sidecar image
        run: docker build . --tag jhkimqd/chaos-utils:latest --file ./Dockerfile.chaos-utils

      - name: Generate kurtosis params
        run: |
          BOR_IMAGE="${{ needs.resolve-images.outputs.bor-image }}"
          HV2_IMAGE="${{ needs.resolve-images.outputs.heimdall-v2-image }}"

          echo "Bor:         ${BOR_IMAGE}"
          echo "Heimdall-v2: ${HV2_IMAGE}"

          # 8 validators + 1 RPC node for chaos testing.
          # Chaos scenarios reference validators l2-el-[1-8] and RPC l2-el-9.
          cat > /tmp/chaos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 8
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_IMAGE}"

              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_IMAGE}"

            additional_services:
              - observability
          PARAMS

          echo "--- Generated params ---"
          cat /tmp/chaos-params.yml

      - name: Deploy devnet
        run: |
          set -o pipefail
          pushd kurtosis-pos
          kurtosis run \
            --enclave=${{ env.ENCLAVE_NAME }} \
            --args-file /tmp/chaos-params.yml \
            . 2>&1 | tee ../deploy.log
          popd

      - name: Wait for network readiness
        run: |
          VALIDATOR_RPC="$(kurtosis port print ${{ env.ENCLAVE_NAME }} l2-el-1-bor-heimdall-v2-validator rpc)"
          # Normalize: strip any existing scheme, then prepend http://
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}"
          VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          RPC_URL="http://${VALIDATOR_RPC}"
          echo "Waiting for 40 blocks on ${RPC_URL}..."

          for i in $(seq 1 120); do
            BLOCK=$(cast bn --rpc-url "${RPC_URL}" 2>/dev/null || echo "0")
            echo "Block: ${BLOCK}/40 (attempt ${i}/120)"
            if [[ "${BLOCK}" -ge 40 ]]; then
              echo "Network ready!"
              break
            fi
            if [[ "${i}" -eq 120 ]]; then
              echo "::error::Network did not reach 40 blocks in 10 minutes"
              exit 1
            fi
            sleep 5
          done

      - name: Select and run chaos scenarios
        run: |
          FILTER="${{ inputs.scenario_filter || 'all' }}"
          COUNT="${{ inputs.scenario_count || '8' }}"
          FAST_MODE="${{ inputs.fast_mode || 'true' }}"
          REPORT_DIR="reports/ci-$(date +%Y%m%d-%H%M%S)"
          mkdir -p "${REPORT_DIR}"

          # ── Resolve RPC URLs for health checks ──
          # Check validators 1, 3, 6 — spread across the set so a single
          # faulted validator doesn't false-alarm the gate.
          HEALTH_CHECK_VALIDATORS="1 3 6"
          declare -A VALIDATOR_RPCS
          for v in ${HEALTH_CHECK_VALIDATORS}; do
            raw="$(kurtosis port print ${{ env.ENCLAVE_NAME }} l2-el-${v}-bor-heimdall-v2-validator rpc 2>/dev/null || echo "")"
            raw="${raw#http://}"; raw="${raw#https://}"
            if [[ -n "${raw}" ]]; then
              VALIDATOR_RPCS[${v}]="http://${raw}"
            fi
          done

          # ── Health gate: verify devnet is alive (blocks advancing) ──
          # Checks multiple validators; returns 0 if ANY show block advancement.
          # On total failure, dumps last 50 log lines from each checked validator.
          check_devnet_health() {
            local any_advanced=false
            local failed_validators=""

            # Snapshot block heights
            declare -A blocks_before
            for v in ${HEALTH_CHECK_VALIDATORS}; do
              local url="${VALIDATOR_RPCS[${v}]:-}"
              if [[ -z "${url}" ]]; then
                blocks_before[${v}]="0"
                continue
              fi
              blocks_before[${v}]=$(cast bn --rpc-url "${url}" 2>/dev/null || echo "0")
            done

            sleep 30

            # Re-check and compare
            for v in ${HEALTH_CHECK_VALIDATORS}; do
              local url="${VALIDATOR_RPCS[${v}]:-}"
              local before="${blocks_before[${v}]}"
              if [[ -z "${url}" || "${before}" == "0" ]]; then
                echo "  validator ${v}: ⚠ RPC unreachable"
                failed_validators="${failed_validators} ${v}"
                continue
              fi
              local after
              after=$(cast bn --rpc-url "${url}" 2>/dev/null || echo "0")
              if [[ "${after}" == "0" ]]; then
                echo "  validator ${v}: ⚠ RPC unreachable after wait"
                failed_validators="${failed_validators} ${v}"
                continue
              fi
              local delta=$((after - before))
              echo "  validator ${v}: blocks ${before} → ${after} (Δ${delta} in 30s)"
              if [[ "${delta}" -gt 0 ]]; then
                any_advanced=true
              else
                failed_validators="${failed_validators} ${v}"
              fi
            done

            if [[ "${any_advanced}" == "true" ]]; then
              return 0
            fi

            # Total failure — dump recent logs for diagnosis
            echo ""
            echo "  ╔══════════════════════════════════════════════════════╗"
            echo "  ║  ALL HEALTH-CHECK VALIDATORS UNRESPONSIVE           ║"
            echo "  ╚══════════════════════════════════════════════════════╝"
            for v in ${failed_validators}; do
              echo ""
              echo "  ── last 50 lines: l2-el-${v}-bor-heimdall-v2-validator ──"
              kurtosis service logs ${{ env.ENCLAVE_NAME }} l2-el-${v}-bor-heimdall-v2-validator 2>/dev/null | tail -50 || echo "  (logs unavailable)"
            done
            echo ""
            return 1
          }

          # ── Collect all candidate scenario files ──
          SCENARIO_DIRS=""
          case "${FILTER}" in
            all)  SCENARIO_DIRS="scenarios/polygon-chain/network scenarios/polygon-chain/applications scenarios/polygon-chain/boundary scenarios/polygon-chain/compound scenarios/polygon-chain/disk" ;;
            *)    SCENARIO_DIRS="scenarios/polygon-chain/${FILTER}" ;;
          esac

          ALL_SCENARIOS=""
          for dir in ${SCENARIO_DIRS}; do
            [[ -d "${dir}" ]] || continue
            for f in "${dir}"/*.yaml; do
              ALL_SCENARIOS="${ALL_SCENARIOS} ${f}"
            done
          done

          # ── Sample random subset (or run all if count=0) ──
          if [[ "${COUNT}" -eq 0 ]]; then
            SELECTED="${ALL_SCENARIOS}"
          else
            SELECTED=$(echo "${ALL_SCENARIOS}" | tr ' ' '\n' | grep -v '^$' | shuf | head -n "${COUNT}")
          fi

          SCENARIO_COUNT=$(echo "${SELECTED}" | wc -w)
          echo "Selected ${SCENARIO_COUNT} scenarios (from $(echo ${ALL_SCENARIOS} | wc -w) total)"
          echo "${SELECTED}" | tr ' ' '\n' | grep -v '^$' | while read f; do echo "  - $(basename $f .yaml)"; done

          # ── Scenarios with hard timing floors that cannot be compressed ──
          # container_pause durations and large fault delays are baked into
          # fault params, not spec-level fields. --set duration only changes
          # the spec-level duration, so it must be >= the longest fault.
          SLOW_SCENARIOS="validator-freeze-zombie shifting-fault-combinations rolling-restart oom-flapping-loop"

          PASSED=0
          FAILED=0
          ERRORS=0
          SKIPPED=0
          TEST_FAILURES=""
          DEVNET_HALTED=false

          for scenario in ${SELECTED}; do
            name=$(basename "${scenario}" .yaml)
            echo "::group::${name}"
            echo "────────────────────────────────────"

            # ── Pre-flight health gate ──
            echo "Pre-flight health check..."
            if ! check_devnet_health; then
              echo "Health check failed — waiting 60s for recovery..."
              sleep 60
              if ! check_devnet_health; then
                echo "::error::Devnet is unrecoverable — halting test suite"
                echo "SKIPPED ${name} (devnet halted)" >> "${REPORT_DIR}/results.txt"
                SKIPPED=$((SKIPPED + 1))
                DEVNET_HALTED=true
                echo "::endgroup::"
                break
              fi
              echo "Devnet recovered after retry"
            fi
            echo "Health check passed ✓"

            echo "Running: ${name}"

            # ── Build --set overrides for fast mode ──
            SET_FLAGS=""
            if [[ "${FAST_MODE}" == "true" ]]; then
              IS_SLOW=false
              for s in ${SLOW_SCENARIOS}; do
                [[ "${name}" == "${s}" ]] && IS_SLOW=true
              done

              if [[ "${IS_SLOW}" == "true" ]]; then
                # Scenarios with large fault delays / pause durations:
                # compress warmup + cooldown but keep duration close to original
                SET_FLAGS="--set warmup=15s --set cooldown=90s"
              else
                # Standard compression: 15s warmup, 2m duration, 90s cooldown
                # Total: ~3m45s per scenario (vs 7-10m original)
                SET_FLAGS="--set warmup=15s --set duration=2m --set cooldown=90s"
              fi
            fi

            EXIT_CODE=0
            ./bin/chaos-runner run \
              --scenario "${scenario}" \
              ${SET_FLAGS} \
              --format text 2>&1 | tee "${REPORT_DIR}/${name}.log" || EXIT_CODE=$?

            if [[ ${EXIT_CODE} -eq 0 ]]; then
              echo "✅ PASSED: ${name}"
              echo "PASSED ${name}" >> "${REPORT_DIR}/results.txt"
              PASSED=$((PASSED + 1))
            elif [[ ${EXIT_CODE} -eq 1 ]]; then
              echo "::error::FAILED: ${name} — one or more critical success criteria did not pass"
              echo "FAILED ${name}" >> "${REPORT_DIR}/results.txt"
              FAILED=$((FAILED + 1))
              TEST_FAILURES="${TEST_FAILURES}  - ${name}\n"
            else
              echo "::error::ERROR: ${name} (exit: ${EXIT_CODE})"
              echo "ERROR  ${name}" >> "${REPORT_DIR}/results.txt"
              ERRORS=$((ERRORS + 1))
            fi

            echo "::endgroup::"
          done

          # ── Mark remaining scenarios as skipped if halted ──
          if [[ "${DEVNET_HALTED}" == "true" ]]; then
            REMAINING=$(echo "${SELECTED}" | tr ' ' '\n' | grep -v '^$' | tail -n +$((PASSED + FAILED + ERRORS + SKIPPED + 1)))
            for scenario in ${REMAINING}; do
              name=$(basename "${scenario}" .yaml)
              echo "SKIPPED ${name} (devnet halted)" >> "${REPORT_DIR}/results.txt"
              SKIPPED=$((SKIPPED + 1))
            done
          fi

          TOTAL=$((PASSED + FAILED + ERRORS + SKIPPED))
          echo ""
          echo "═══════════════════════════════════════"
          echo "  RESULTS: ${PASSED}/${TOTAL} passed, ${FAILED} failed, ${ERRORS} errors, ${SKIPPED} skipped"
          echo "═══════════════════════════════════════"

          if [[ -n "${TEST_FAILURES}" ]]; then
            echo ""
            echo "Failed scenarios:"
            echo -e "${TEST_FAILURES}"
          fi

          if [[ "${DEVNET_HALTED}" == "true" ]]; then
            echo ""
            echo "⚠ Suite halted early: devnet became unrecoverable"
          fi

          echo "REPORT_DIR=${REPORT_DIR}" >> "${GITHUB_ENV}"

          # Write job summary
          {
            echo "### Chaos Suite Results"
            echo "| Status | Count |"
            echo "|--------|-------|"
            echo "| ✅ Passed | ${PASSED} |"
            echo "| ❌ Failed (critical criteria) | ${FAILED} |"
            echo "| ⚠️ Errors (infra) | ${ERRORS} |"
            echo "| ⏭️ Skipped | ${SKIPPED} |"
            if [[ -n "${TEST_FAILURES}" ]]; then
              echo ""
              echo "**Failed scenarios:**"
              echo -e "${TEST_FAILURES}" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail the job on test failures (critical criteria), infrastructure
          # errors (exit code > 1), or if the devnet became unrecoverable.
          if [[ "${FAILED}" -gt 0 ]]; then
            echo "::error::${FAILED} scenario(s) failed critical success criteria — these are real test failures, not infra issues"
            exit 1
          fi
          if [[ "${ERRORS}" -gt 0 ]]; then
            echo "::error::${ERRORS} scenario(s) hit infrastructure errors"
            exit 1
          fi
          if [[ "${DEVNET_HALTED}" == "true" ]]; then
            echo "::error::Devnet became unrecoverable — ${SKIPPED} scenario(s) skipped"
            exit 1
          fi

      - name: Dump enclave logs
        if: failure()
        run: kurtosis dump ./dump

      - name: Upload enclave dump
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: chaos-enclave-dump-${{ github.run_id }}
          path: ./dump

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: chaos-reports-${{ github.run_id }}
          path: reports/

      - name: Cleanup enclave
        if: always()
        run: |
          kurtosis enclave stop ${{ env.ENCLAVE_NAME }} 2>/dev/null || true
          kurtosis enclave rm ${{ env.ENCLAVE_NAME }} 2>/dev/null || true
