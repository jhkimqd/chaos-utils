name: chaos-suite

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8 AM UTC
  workflow_dispatch:
    inputs:
      scenario_filter:
        description: "Scenario category: all, network, applications, boundary, compound, disk"
        required: false
        default: "all"
      scenario_count:
        description: "Number of scenarios to sample (0 = run all)"
        required: false
        default: "0"
      kurtosis_pos_ref:
        description: "kurtosis-pos branch/tag to deploy"
        required: false
        default: "feat/execution-specs"
      fast_mode:
        description: "Compress scenario timings for faster CI"
        required: false
        type: boolean
        default: true
      bor_image:
        description: "Bor Docker image (leave empty to auto-detect latest release)"
        required: false
        default: ""
      heimdall_v2_image:
        description: "Heimdall-v2 Docker image (leave empty to auto-detect latest release)"
        required: false
        default: ""
      erigon_image:
        description: "Erigon Docker image (leave empty to auto-detect latest release)"
        required: false
        default: ""

permissions:
  contents: read
  packages: read

concurrency:
  group: chaos-suite-${{ github.ref }}
  cancel-in-progress: true

env:
  ENCLAVE_NAME: pos
  KURTOSIS_POS_REF: ${{ inputs.kurtosis_pos_ref || 'feat/execution-specs' }}

jobs:
  resolve-images:
    runs-on: ubuntu-latest
    outputs:
      bor-image: ${{ steps.resolve.outputs.bor-image }}
      heimdall-v2-image: ${{ steps.resolve.outputs.heimdall-v2-image }}
      erigon-image: ${{ steps.resolve.outputs.erigon-image }}
    steps:
      - name: Resolve bor and heimdall-v2 images
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BOR_IMAGE: ${{ inputs.bor_image }}
          INPUT_HEIMDALL_V2_IMAGE: ${{ inputs.heimdall_v2_image }}
          INPUT_ERIGON_IMAGE: ${{ inputs.erigon_image }}
        run: |
          # Use explicit images if provided
          if [[ -n "${INPUT_BOR_IMAGE}" ]]; then
            echo "bor-image=${INPUT_BOR_IMAGE}" >> "$GITHUB_OUTPUT"
          else
            bor_tag=$(gh api repos/0xPolygon/bor/releases --jq \
              '[.[] | select(.draft == false)] | .[0].tag_name' 2>/dev/null || echo "")
            if [[ -n "$bor_tag" ]]; then
              echo "bor-image=0xpolygon/bor:${bor_tag#v}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch bor release, using 'latest'."
              echo "bor-image=0xpolygon/bor:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [[ -n "${INPUT_HEIMDALL_V2_IMAGE}" ]]; then
            echo "heimdall-v2-image=${INPUT_HEIMDALL_V2_IMAGE}" >> "$GITHUB_OUTPUT"
          else
            hv2_tag=$(gh api repos/0xPolygon/heimdall-v2/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [[ -n "$hv2_tag" ]]; then
              echo "heimdall-v2-image=0xpolygon/heimdall-v2:${hv2_tag#v}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch heimdall-v2 release, using 'latest'."
              echo "heimdall-v2-image=0xpolygon/heimdall-v2:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

          # Erigon keeps the 'v' prefix in image tags (unlike bor/heimdall which strip it)
          if [[ -n "${INPUT_ERIGON_IMAGE}" ]]; then
            echo "erigon-image=${INPUT_ERIGON_IMAGE}" >> "$GITHUB_OUTPUT"
          else
            erigon_tag=$(gh api repos/0xPolygon/erigon/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [[ -n "$erigon_tag" && "$erigon_tag" != "null" ]]; then
              echo "erigon-image=0xpolygon/erigon:${erigon_tag}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch erigon release, using 'v3.5.0'."
              echo "erigon-image=0xpolygon/erigon:v3.5.0" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Summary
        env:
          BOR_IMAGE: ${{ steps.resolve.outputs.bor-image }}
          HV2_IMAGE: ${{ steps.resolve.outputs.heimdall-v2-image }}
          ERIGON_IMAGE: ${{ steps.resolve.outputs.erigon-image }}
        run: |
          echo "### Chaos Suite Image Resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bor | \`${BOR_IMAGE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Heimdall-v2 | \`${HV2_IMAGE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Erigon | \`${ERIGON_IMAGE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kurtosis-pos ref | \`${KURTOSIS_POS_REF}\` |" >> "$GITHUB_STEP_SUMMARY"

  run-chaos-tests:
    needs: resolve-images
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout chaos-utils
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout kurtosis-pos
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Install Kurtosis
        env:
          KURTOSIS_VERSION: "1.17.7"
        run: |
          curl -fsSL -o /tmp/kurtosis-cli.deb \
            "https://github.com/kurtosis-tech/kurtosis-cli-release-artifacts/releases/download/${KURTOSIS_VERSION}/kurtosis-cli_${KURTOSIS_VERSION}_linux_amd64.deb"
          sudo dpkg -i /tmp/kurtosis-cli.deb
          rm /tmp/kurtosis-cli.deb
          kurtosis analytics disable || true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build chaos-runner
        run: make build-runner

      - name: Build sidecar image
        run: docker build . --tag jhkimqd/chaos-utils:latest --file ./Dockerfile.chaos-utils

      - name: Generate kurtosis params
        run: |
          BOR_IMAGE="${{ needs.resolve-images.outputs.bor-image }}"
          HV2_IMAGE="${{ needs.resolve-images.outputs.heimdall-v2-image }}"
          ERIGON_IMAGE="${{ needs.resolve-images.outputs.erigon-image }}"

          echo "Bor:         ${BOR_IMAGE}"
          echo "Heimdall-v2: ${HV2_IMAGE}"
          echo "Erigon:      ${ERIGON_IMAGE}"

          # 8 validators + 1 Bor RPC node + 1 Erigon RPC node for chaos testing.
          # Chaos scenarios reference validators l2-el-[1-8], Bor RPC l2-el-9,
          # and Erigon RPC l2-el-10.
          cat > /tmp/chaos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 8
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_IMAGE}"

              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_IMAGE}"

              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: erigon
                el_image: "${ERIGON_IMAGE}"

            additional_services:
              - observability
          PARAMS

          echo "--- Generated params ---"
          cat /tmp/chaos-params.yml

      - name: Deploy devnet
        run: |
          set -o pipefail
          pushd kurtosis-pos
          timeout 900 kurtosis run \
            --enclave=${{ env.ENCLAVE_NAME }} \
            --args-file /tmp/chaos-params.yml \
            . 2>&1 | tee ../deploy.log
          popd

      - name: Wait for network readiness
        run: |
          VALIDATOR_RPC="$(timeout 30 kurtosis port print ${{ env.ENCLAVE_NAME }} l2-el-1-bor-heimdall-v2-validator rpc)"
          # Normalize: strip any existing scheme, then prepend http://
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}"
          VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          RPC_URL="http://${VALIDATOR_RPC}"
          echo "Waiting for 40 blocks on ${RPC_URL}..."

          for i in $(seq 1 120); do
            BLOCK=$(timeout 5 cast bn --rpc-url "${RPC_URL}" 2>/dev/null || echo "0")
            echo "Block: ${BLOCK}/40 (attempt ${i}/120)"
            if [[ "${BLOCK}" -ge 40 ]]; then
              echo "Network ready!"
              break
            fi
            if [[ "${i}" -eq 120 ]]; then
              echo "::error::Network did not reach 40 blocks in 10 minutes"
              exit 1
            fi
            sleep 5
          done

      - name: Select and run chaos scenarios
        env:
          INPUT_SCENARIO_FILTER: ${{ inputs.scenario_filter }}
          INPUT_SCENARIO_COUNT: ${{ inputs.scenario_count }}
          INPUT_FAST_MODE: ${{ inputs.fast_mode }}
        run: |
          FILTER="${INPUT_SCENARIO_FILTER:-all}"
          COUNT="${INPUT_SCENARIO_COUNT:-8}"
          FAST_MODE="${INPUT_FAST_MODE:-true}"
          REPORT_DIR="reports/ci-$(date +%Y%m%d-%H%M%S)"
          mkdir -p "${REPORT_DIR}"

          # ── Resolve RPC URLs for health checks and recovery ──
          # Health gate checks validators 1, 3, 6 — spread across the set so a
          # single faulted validator doesn't false-alarm.
          # Recovery scan resolves all 8 upfront so it can identify and restart
          # exactly the stuck nodes, regardless of which scenario caused the issue.
          HEALTH_CHECK_VALIDATORS="1 3 6"
          ALL_VALIDATORS="1 2 3 4 5 6 7 8"
          declare -A VALIDATOR_RPCS
          for v in ${ALL_VALIDATORS}; do
            raw="$(timeout 30 kurtosis port print ${{ env.ENCLAVE_NAME }} l2-el-${v}-bor-heimdall-v2-validator rpc 2>/dev/null || echo "")"
            raw="${raw#http://}"; raw="${raw#https://}"
            if [[ -n "${raw}" ]]; then
              VALIDATOR_RPCS[${v}]="http://${raw}"
            fi
          done

          # ── Health gate: verify devnet is alive (blocks advancing) ──
          # Checks multiple validators; returns 0 if ANY show block advancement.
          # On total failure, dumps last 50 log lines from each checked validator.
          check_devnet_health() {
            local any_advanced=false
            local failed_validators=""

            # Snapshot block heights
            declare -A blocks_before
            for v in ${HEALTH_CHECK_VALIDATORS}; do
              local url="${VALIDATOR_RPCS[${v}]:-}"
              if [[ -z "${url}" ]]; then
                blocks_before[${v}]="0"
                continue
              fi
              blocks_before[${v}]=$(timeout 5 cast bn --rpc-url "${url}" 2>/dev/null || echo "0")
            done

            sleep 30

            # Re-check and compare
            for v in ${HEALTH_CHECK_VALIDATORS}; do
              local url="${VALIDATOR_RPCS[${v}]:-}"
              local before="${blocks_before[${v}]}"
              if [[ -z "${url}" || "${before}" == "0" ]]; then
                echo "  validator ${v}: ⚠ RPC unreachable"
                failed_validators="${failed_validators} ${v}"
                continue
              fi
              local after
              after=$(timeout 5 cast bn --rpc-url "${url}" 2>/dev/null || echo "0")
              if [[ "${after}" == "0" ]]; then
                echo "  validator ${v}: ⚠ RPC unreachable after wait"
                failed_validators="${failed_validators} ${v}"
                continue
              fi
              local delta=$((after - before))
              echo "  validator ${v}: blocks ${before} → ${after} (Δ${delta} in 30s)"
              if [[ "${delta}" -gt 0 ]]; then
                any_advanced=true
              else
                failed_validators="${failed_validators} ${v}"
              fi
            done

            if [[ "${any_advanced}" == "true" ]]; then
              return 0
            fi

            # Total failure — dump recent logs for diagnosis
            echo ""
            echo "  ╔══════════════════════════════════════════════════════╗"
            echo "  ║  ALL HEALTH-CHECK VALIDATORS UNRESPONSIVE           ║"
            echo "  ╚══════════════════════════════════════════════════════╝"
            for v in ${failed_validators}; do
              echo ""
              echo "  ── last 50 lines: l2-el-${v}-bor-heimdall-v2-validator ──"
              timeout 30 kurtosis service logs ${{ env.ENCLAVE_NAME }} l2-el-${v}-bor-heimdall-v2-validator 2>/dev/null | tail -50 || echo "  (logs unavailable)"
            done
            echo ""
            return 1
          }

          # ── Recovery: scan all validators and docker-restart unresponsive ones ──
          # Called when the health gate fails. Scans all 8 validators, identifies
          # which are unreachable (RPC returns 0), and docker-restarts those
          # containers. Works for any scenario — no hardcoded validator list.
          # Restarting also clears stale in-memory CometBFT state or any lingering
          # iptables rules that may be blocking peer reconnection.
          recover_unresponsive_validators() {
            echo "  Scanning all validators for responsiveness..."
            local unresponsive=""

            for v in ${ALL_VALIDATORS}; do
              local url="${VALIDATOR_RPCS[${v}]:-}"
              if [[ -z "${url}" ]]; then
                continue
              fi
              local height
              height=$(timeout 5 cast bn --rpc-url "${url}" 2>/dev/null || echo "0")
              if [[ "${height}" == "0" ]]; then
                echo "  validator ${v}: ✗ unreachable"
                unresponsive="${unresponsive} ${v}"
              else
                echo "  validator ${v}: ✓ responsive (block ${height})"
              fi
            done

            if [[ -z "$(echo "${unresponsive}" | tr -d ' ')" ]]; then
              echo "  All validators reachable — waiting 60s for consensus recovery..."
              sleep 60
              return 0
            fi

            echo "  Restarting unresponsive validators:${unresponsive}"
            for v in ${unresponsive}; do
              for svc in "l2-el-${v}-bor-heimdall-v2-validator" "l2-cl-${v}-heimdall-v2-bor-validator"; do
                ctr=$(docker ps -a -q --filter "name=${{ env.ENCLAVE_NAME }}--${svc}" 2>/dev/null | head -1)
                # Fallback: plain name (older kurtosis versions omit the enclave prefix)
                [[ -z "${ctr}" ]] && ctr=$(docker ps -a -q --filter "name=${svc}" 2>/dev/null | head -1)
                if [[ -n "${ctr}" ]]; then
                  echo "  → restarting ${svc} (${ctr})"
                  docker restart "${ctr}" 2>/dev/null \
                    || echo "  ⚠ restart failed for ${svc}"
                else
                  echo "  ⚠ container not found: ${svc}"
                fi
              done
            done

            echo "  Waiting 90s for restarted validators to rejoin network..."
            sleep 90
          }

          # ── Escalation: force-restart ALL validators to clear stale consensus state ──
          # Called when recover_unresponsive_validators() did not restore block production.
          # That function handles the case where some nodes are unreachable (RPC = 0) but
          # does nothing when ALL nodes are reachable yet consensus is stalled — it just
          # sleeps 60s and returns. This escalation covers that gap: restarting every node
          # clears stale in-memory CometBFT consensus state and any lingering iptables rules
          # left behind by the previous chaos scenario. All 16 containers (8 Bor + 8 Heimdall)
          # are restarted simultaneously, so the wait is 120s instead of 90s to account for
          # the thundering-herd P2P reconnect delay when the entire cluster cold-starts together.
          force_restart_all_validators() {
            echo "  Force-restarting ALL validators to clear stale CometBFT state..."
            for v in ${ALL_VALIDATORS}; do
              for svc in "l2-el-${v}-bor-heimdall-v2-validator" "l2-cl-${v}-heimdall-v2-bor-validator"; do
                ctr=$(docker ps -a -q --filter "name=${{ env.ENCLAVE_NAME }}--${svc}" 2>/dev/null | head -1)
                # Fallback: plain name (older kurtosis versions omit the enclave prefix)
                [[ -z "${ctr}" ]] && ctr=$(docker ps -a -q --filter "name=${svc}" 2>/dev/null | head -1)
                if [[ -n "${ctr}" ]]; then
                  echo "  → restarting ${svc} (${ctr})"
                  docker restart "${ctr}" 2>/dev/null \
                    || echo "  ⚠ restart failed for ${svc}"
                else
                  echo "  ⚠ container not found: ${svc}"
                fi
              done
            done

            echo "  Waiting 120s for full cluster cold-start and CometBFT P2P mesh re-establishment..."
            sleep 120
          }

          # ── Quick liveness probe: instant RPC reachability check ──
          # Unlike check_devnet_health (which sleeps 30s to confirm block advancement),
          # this is a ~3s check that only tests whether RPC endpoints respond at all.
          # Used after failed scenarios to fast-detect a completely dead network
          # without the overhead of a full block-advancement health gate.
          quick_liveness_probe() {
            local reachable=0
            local total=0
            for v in ${HEALTH_CHECK_VALIDATORS}; do
              local url="${VALIDATOR_RPCS[${v}]:-}"
              [[ -z "${url}" ]] && continue
              total=$((total + 1))
              local height
              height=$(timeout 5 cast bn --rpc-url "${url}" 2>/dev/null || echo "0")
              if [[ "${height}" != "0" ]]; then
                reachable=$((reachable + 1))
              fi
            done
            if [[ ${reachable} -eq 0 ]]; then
              echo "  ⚠ All probed validators unreachable (0/${total})"
              return 1
            fi
            echo "  Liveness probe: ${reachable}/${total} validators reachable"
            return 0
          }

          # ── Full devnet redeploy: kurtosis clean + fresh deploy ──
          # Called when a scenario has broken the network beyond what container
          # restarts can fix. Tears down the entire Kurtosis enclave, redeploys
          # from scratch, waits for block production, and re-resolves all
          # validator RPC endpoints (ports change after redeploy).
          redeploy_devnet() {
            echo "  Tearing down enclave..."
            timeout 30 kurtosis enclave stop ${ENCLAVE_NAME} 2>/dev/null || true
            timeout 30 kurtosis enclave rm ${ENCLAVE_NAME} 2>/dev/null || true

            echo "  Redeploying devnet from scratch..."
            pushd "${GITHUB_WORKSPACE}/kurtosis-pos" > /dev/null
            if ! timeout 900 kurtosis run --enclave=${ENCLAVE_NAME} --args-file /tmp/chaos-params.yml . 2>&1 | tee ../redeploy.log; then
              echo "  ✗ Redeploy failed"
              popd > /dev/null
              return 1
            fi
            popd > /dev/null

            echo "  Waiting for network readiness (40 blocks)..."
            local rpc_raw
            rpc_raw="$(timeout 30 kurtosis port print ${ENCLAVE_NAME} l2-el-1-bor-heimdall-v2-validator rpc 2>/dev/null || echo "")"
            rpc_raw="${rpc_raw#http://}"; rpc_raw="${rpc_raw#https://}"
            if [[ -z "${rpc_raw}" ]]; then
              echo "  ✗ Cannot resolve validator-1 RPC after redeploy"
              return 1
            fi
            local rpc_url="http://${rpc_raw}"

            for i in $(seq 1 120); do
              local block
              block=$(timeout 5 cast bn --rpc-url "${rpc_url}" 2>/dev/null || echo "0")
              echo "  Block: ${block}/40 (attempt ${i}/120)"
              if [[ "${block}" -ge 40 ]]; then
                echo "  ✓ Network ready"
                break
              fi
              if [[ "${i}" -eq 120 ]]; then
                echo "  ✗ Network did not reach 40 blocks after redeploy"
                return 1
              fi
              sleep 5
            done

            # Re-resolve all validator RPC URLs (ports change after redeploy)
            echo "  Re-resolving validator RPC endpoints..."
            for v in ${ALL_VALIDATORS}; do
              raw="$(timeout 30 kurtosis port print ${ENCLAVE_NAME} l2-el-${v}-bor-heimdall-v2-validator rpc 2>/dev/null || echo "")"
              raw="${raw#http://}"; raw="${raw#https://}"
              if [[ -n "${raw}" ]]; then
                VALIDATOR_RPCS[${v}]="http://${raw}"
              fi
            done

            # Verify multi-validator participation (not just validator-1 producing blocks)
            echo "  Verifying multi-validator consensus..."
            if ! check_devnet_health; then
              echo "  ✗ Devnet deployed but validators not in consensus"
              return 1
            fi

            return 0
          }

          # ── Collect all candidate scenario files ──
          SCENARIO_DIRS=""
          case "${FILTER}" in
            all)  SCENARIO_DIRS="scenarios/polygon-chain/network scenarios/polygon-chain/applications scenarios/polygon-chain/boundary scenarios/polygon-chain/compound scenarios/polygon-chain/disk" ;;
            *)    SCENARIO_DIRS="scenarios/polygon-chain/${FILTER}" ;;
          esac

          ALL_SCENARIOS=""
          for dir in ${SCENARIO_DIRS}; do
            [[ -d "${dir}" ]] || continue
            for f in "${dir}"/*.yaml; do
              ALL_SCENARIOS="${ALL_SCENARIOS} ${f}"
            done
          done

          # ── Sample random subset (or run all if count=0) ──
          if [[ "${COUNT}" -eq 0 ]]; then
            SELECTED="${ALL_SCENARIOS}"
          else
            SELECTED=$(echo "${ALL_SCENARIOS}" | tr ' ' '\n' | grep -v '^$' | shuf | head -n "${COUNT}")
          fi

          SCENARIO_COUNT=$(echo "${SELECTED}" | wc -w)
          echo "Selected ${SCENARIO_COUNT} scenarios (from $(echo ${ALL_SCENARIOS} | wc -w) total)"
          echo "${SELECTED}" | tr ' ' '\n' | grep -v '^$' | while read f; do echo "  - $(basename $f .yaml)"; done

          # ── Scenarios with hard timing floors that cannot be compressed ──
          # container_pause durations and large fault delays are baked into
          # fault params, not spec-level fields. --set duration only changes
          # the spec-level duration, so it must be >= the longest fault.
          SLOW_SCENARIOS="validator-freeze-zombie shifting-fault-combinations rolling-restart oom-flapping-loop"

          # ── Scenarios that need their full YAML cooldown for post-fault recovery ──
          # These scenarios either restart the entire validator set simultaneously,
          # cause a network-wide consensus stall, or have explicitly long cooldowns
          # whose observation window must not be truncated. After the fault clears,
          # nodes must re-discover peers and re-establish CometBFT consensus before
          # the next scenario can safely run. The standard 90 s cooldown is too short —
          # the YAML cooldown must not be compressed.
          #
          # simultaneous-validator-restart / three-validator-full-isolation:
          #   Full validator-set restart or 3-node isolation — CometBFT P2P reconnect
          #   takes minutes (known finding). YAML sets 3 m.
          # coordinated-full-cluster-crash:
          #   SIGKILL all 16 containers (8 Bor + 8 Heimdall) simultaneously —
          #   same thundering-herd recovery constraint. YAML sets 3 m.
          # span-boundary-partition:
          #   2/8 partition across span boundary — YAML author explicitly set 2 m
          #   for CometBFT P2P reconnect (documented in the YAML). Compress would
          #   truncate post-fault checks before partition heals.
          # kill-resync-under-peer-loss:
          #   Ghost-state regression test — YAML author explicitly set 3 m observation
          #   window to detect sustained sync failure vs successful resync. Compressing
          #   to 90 s halves the window and may miss the deadlock signal.
          LONG_COOLDOWN_SCENARIOS="simultaneous-validator-restart three-validator-full-isolation coordinated-full-cluster-crash span-boundary-partition kill-resync-under-peer-loss"

          PASSED=0
          FAILED=0
          ERRORS=0
          SKIPPED=0
          TEST_FAILURES=""
          DEVNET_HALTED=false
          HALT_SUSPECT=""
          CONSECUTIVE_ERRORS=0
          MAX_CONSECUTIVE_ERRORS=2
          SCENARIO_TIMEOUT=900  # 15 minutes max per scenario run

          for scenario in ${SELECTED}; do
            name=$(basename "${scenario}" .yaml)
            echo "::group::${name}"
            echo "────────────────────────────────────"

            # ── Pre-flight health gate ──
            echo "Pre-flight health check..."
            if ! check_devnet_health; then
              echo "Health check failed — scanning for unresponsive validators..."
              recover_unresponsive_validators
              if ! check_devnet_health; then
                # Tier-2 escalation: force-restart ALL validators even if tier-1 just
                # restarted some. A full simultaneous restart is needed to clear
                # cluster-wide stale CometBFT consensus state.
                echo "Consensus still stalled — force-restarting all validators..."
                force_restart_all_validators
                if ! check_devnet_health; then
                  echo "::error::Devnet is unrecoverable — halting test suite"
                  echo "SKIPPED ${name} (devnet halted)" >> "${REPORT_DIR}/results.txt"
                  SKIPPED=$((SKIPPED + 1))
                  DEVNET_HALTED=true
                  HALT_SUSPECT="${name} (pre-flight: devnet was already broken)"
                  echo "::endgroup::"
                  break
                fi
              fi
              echo "Devnet recovered after restart"
            fi
            echo "Health check passed ✓"

            echo "Running: ${name}"

            # ── Build --set overrides for fast mode ──
            SET_FLAGS=""
            if [[ "${FAST_MODE}" == "true" ]]; then
              IS_SLOW=false
              for s in ${SLOW_SCENARIOS}; do
                [[ "${name}" == "${s}" ]] && IS_SLOW=true
              done

              IS_LONG_COOLDOWN=false
              for s in ${LONG_COOLDOWN_SCENARIOS}; do
                [[ "${name}" == "${s}" ]] && IS_LONG_COOLDOWN=true
              done

              if [[ "${IS_SLOW}" == "true" ]]; then
                # Scenarios with large fault delays / pause durations:
                # compress warmup + cooldown but keep duration close to original
                SET_FLAGS="--set warmup=15s --set cooldown=90s"
              elif [[ "${IS_LONG_COOLDOWN}" == "true" ]]; then
                # Scenarios that need the full YAML cooldown for post-fault recovery:
                # only compress warmup and duration, leave cooldown at its YAML value
                SET_FLAGS="--set warmup=15s --set duration=2m"
              else
                # Standard compression: 15s warmup, 2m duration, 90s cooldown
                # Total: ~3m45s per scenario (vs 7-10m original)
                SET_FLAGS="--set warmup=15s --set duration=2m --set cooldown=90s"
              fi
            fi

            EXIT_CODE=0
            timeout --kill-after=30 ${SCENARIO_TIMEOUT} ./bin/chaos-runner run \
              --scenario "${scenario}" \
              ${SET_FLAGS} \
              --format text 2>&1 | tee "${REPORT_DIR}/${name}.log" || EXIT_CODE=$?

            # ── Pre-fault steady-state failure: recover and retry ──
            # The chaos-runner's pre-fault check is stricter than the workflow's
            # health gate (it evaluates Prometheus-based criteria, not just block
            # advancement). If it detects the system isn't in steady state, the
            # scenario aborted before fault injection — it never actually ran.
            # Recovery + retry is safe and avoids wasting the scenario slot.
            if [[ ${EXIT_CODE} -ne 0 ]] && grep -q "pre-fault health check failed:.*steady state" "${REPORT_DIR}/${name}.log" 2>/dev/null; then
              echo "::warning::${name}: pre-fault health check failed — system not in steady state"
              echo "Recovering network before retry..."
              force_restart_all_validators
              if ! check_devnet_health; then
                echo "::error::Recovery failed after pre-fault check — devnet unrecoverable"
                echo "ERROR  ${name} (steady-state check failed, recovery failed)" >> "${REPORT_DIR}/results.txt"
                ERRORS=$((ERRORS + 1))
                DEVNET_HALTED=true
                HALT_SUSPECT="${name}"
                echo "::endgroup::"
                break
              fi
              echo "Network recovered — retrying ${name}..."
              EXIT_CODE=0
              timeout --kill-after=30 ${SCENARIO_TIMEOUT} ./bin/chaos-runner run \
                --scenario "${scenario}" \
                ${SET_FLAGS} \
                --format text 2>&1 | tee -a "${REPORT_DIR}/${name}.log" || EXIT_CODE=$?
            fi

            # ── Network-death detection: full redeploy + verify ──
            # If the scenario killed the network, redeploy from scratch and
            # re-run the suspect scenario to distinguish a confirmed bug from
            # a false positive caused by residual state from earlier scenarios.
            if [[ ${EXIT_CODE} -ne 0 ]]; then
              echo "Post-scenario liveness probe..."
              if ! quick_liveness_probe; then
                echo ""
                echo "  ╔══════════════════════════════════════════════════════════════════╗"
                echo "  ║  SUSPECT: ${name} may have broken the devnet                    ║"
                echo "  ╚══════════════════════════════════════════════════════════════════╝"
                echo ""
                echo "Redeploying fresh devnet to verify..."
                if ! redeploy_devnet; then
                  echo "::error::Fresh redeploy failed — cannot verify suspect scenario"
                  echo "ERROR  ${name} (devnet broken, redeploy failed)" >> "${REPORT_DIR}/results.txt"
                  ERRORS=$((ERRORS + 1))
                  DEVNET_HALTED=true
                  HALT_SUSPECT="${name}"
                  echo "::endgroup::"
                  break
                fi

                echo "Re-running ${name} on fresh devnet to confirm..."
                EXIT_CODE=0
                timeout --kill-after=30 ${SCENARIO_TIMEOUT} ./bin/chaos-runner run \
                  --scenario "${scenario}" \
                  ${SET_FLAGS} \
                  --format text 2>&1 | tee "${REPORT_DIR}/${name}-verify.log" || EXIT_CODE=$?

                echo "Verification liveness probe..."
                if ! quick_liveness_probe; then
                  echo ""
                  echo "  ╔══════════════════════════════════════════════════════════════════╗"
                  echo "  ║  CONFIRMED: ${name} breaks the devnet reproducibly              ║"
                  echo "  ╚══════════════════════════════════════════════════════════════════╝"
                  echo ""
                  echo "::error::CONFIRMED BUG: ${name} breaks the devnet on a fresh enclave"
                  echo "CONFIRMED_BUG ${name}" >> "${REPORT_DIR}/results.txt"
                  FAILED=$((FAILED + 1))
                  TEST_FAILURES="${TEST_FAILURES}  - ${name} (**CONFIRMED: breaks devnet reproducibly**)\n"
                  DEVNET_HALTED=true
                  HALT_SUSPECT="${name}"
                  echo "::endgroup::"
                  break
                fi

                echo "✓ ${name} passed on fresh devnet — previous failure was a false positive"
                echo "Continuing tests on fresh devnet..."
                CONSECUTIVE_ERRORS=0
                # EXIT_CODE now reflects the re-run on fresh devnet — fall through to classification
              fi
            fi

            # ── Classify result ──
            if [[ ${EXIT_CODE} -eq 124 || ${EXIT_CODE} -eq 137 ]]; then
              # 124 = SIGTERM from timeout, 137 = SIGKILL from --kill-after
              echo "::error::TIMEOUT: ${name} — exceeded ${SCENARIO_TIMEOUT}s (network may be hung)"
              echo "ERROR  ${name} (timeout after ${SCENARIO_TIMEOUT}s)" >> "${REPORT_DIR}/results.txt"
              ERRORS=$((ERRORS + 1))
              CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
            elif [[ ${EXIT_CODE} -eq 0 ]]; then
              echo "✅ PASSED: ${name}"
              echo "PASSED ${name}" >> "${REPORT_DIR}/results.txt"
              PASSED=$((PASSED + 1))
              CONSECUTIVE_ERRORS=0
            elif [[ ${EXIT_CODE} -eq 1 ]]; then
              echo "::error::FAILED: ${name} — one or more critical success criteria did not pass"
              echo "FAILED ${name}" >> "${REPORT_DIR}/results.txt"
              FAILED=$((FAILED + 1))
              TEST_FAILURES="${TEST_FAILURES}  - ${name}\n"
            else
              echo "::error::ERROR: ${name} (exit: ${EXIT_CODE})"
              echo "ERROR  ${name}" >> "${REPORT_DIR}/results.txt"
              ERRORS=$((ERRORS + 1))
              CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
            fi

            # ── Consecutive-error circuit breaker ──
            # Multiple infra errors in a row on a live network suggest a
            # systemic issue. Force-restart all validators as a last resort.
            if [[ ${CONSECUTIVE_ERRORS} -ge ${MAX_CONSECUTIVE_ERRORS} ]]; then
              echo "::warning::${CONSECUTIVE_ERRORS} consecutive infra errors — attempting full validator restart"
              force_restart_all_validators
              if ! check_devnet_health; then
                echo "::error::Devnet unrecoverable after ${CONSECUTIVE_ERRORS} consecutive errors — halting suite"
                DEVNET_HALTED=true
                HALT_SUSPECT="${name}"
                echo "::endgroup::"
                break
              fi
              echo "Network recovered — resetting error counter"
              CONSECUTIVE_ERRORS=0
            fi

            echo "::endgroup::"
          done

          # ── Mark remaining scenarios as skipped if halted ──
          if [[ "${DEVNET_HALTED}" == "true" ]]; then
            REMAINING=$(echo "${SELECTED}" | tr ' ' '\n' | grep -v '^$' | tail -n +$((PASSED + FAILED + ERRORS + SKIPPED + 1)))
            for scenario in ${REMAINING}; do
              name=$(basename "${scenario}" .yaml)
              echo "SKIPPED ${name} (devnet halted)" >> "${REPORT_DIR}/results.txt"
              SKIPPED=$((SKIPPED + 1))
            done
          fi

          TOTAL=$((PASSED + FAILED + ERRORS + SKIPPED))
          echo ""
          echo "═══════════════════════════════════════"
          echo "  RESULTS: ${PASSED}/${TOTAL} passed, ${FAILED} failed, ${ERRORS} errors, ${SKIPPED} skipped"
          echo "═══════════════════════════════════════"

          if [[ -n "${TEST_FAILURES}" ]]; then
            echo ""
            echo "Failed scenarios:"
            echo -e "${TEST_FAILURES}"
          fi

          if [[ "${DEVNET_HALTED}" == "true" ]]; then
            echo ""
            echo "⚠ Suite halted early: devnet became unrecoverable"
            if [[ -n "${HALT_SUSPECT}" ]]; then
              echo "  ➜ Last scenario before halt: ${HALT_SUSPECT}"
              echo "  ➜ Check the scenario logs and enclave dump for root cause"
            fi
          fi

          echo "REPORT_DIR=${REPORT_DIR}" >> "${GITHUB_ENV}"

          # Write job summary
          {
            echo "### Chaos Suite Results"
            echo "| Status | Count |"
            echo "|--------|-------|"
            echo "| ✅ Passed | ${PASSED} |"
            echo "| ❌ Failed (critical criteria) | ${FAILED} |"
            echo "| ⚠️ Errors (infra) | ${ERRORS} |"
            echo "| ⏭️ Skipped | ${SKIPPED} |"
            if [[ -n "${TEST_FAILURES}" ]]; then
              echo ""
              echo "**Failed scenarios:**"
              echo -e "${TEST_FAILURES}" | sed 's/^/- /'
            fi
            if [[ "${DEVNET_HALTED}" == "true" ]]; then
              echo ""
              echo "> **Suite halted early: devnet became unrecoverable**"
              if [[ -n "${HALT_SUSPECT}" ]]; then
                echo ">"
                echo "> Last scenario before halt: \`${HALT_SUSPECT}\`"
                echo "> Check the scenario logs and enclave dump for root cause."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Fail the job on test failures (critical criteria), infrastructure
          # errors (exit code > 1), or if the devnet became unrecoverable.
          if [[ "${FAILED}" -gt 0 ]]; then
            echo "::error::${FAILED} scenario(s) failed critical success criteria — these are real test failures, not infra issues"
            exit 1
          fi
          if [[ "${ERRORS}" -gt 0 ]]; then
            echo "::error::${ERRORS} scenario(s) hit infrastructure errors"
            exit 1
          fi
          if [[ "${DEVNET_HALTED}" == "true" ]]; then
            echo "::error::Devnet became unrecoverable after '${HALT_SUSPECT}' — ${SKIPPED} scenario(s) skipped"
            exit 1
          fi

      - name: Dump enclave logs
        if: failure()
        run: timeout 120 kurtosis dump ./dump

      - name: Upload enclave dump
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: chaos-enclave-dump-${{ github.run_id }}
          path: ./dump
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: chaos-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Cleanup enclave
        if: always()
        run: |
          timeout 30 kurtosis enclave stop ${{ env.ENCLAVE_NAME }} 2>/dev/null || true
          timeout 30 kurtosis enclave rm ${{ env.ENCLAVE_NAME }} 2>/dev/null || true
