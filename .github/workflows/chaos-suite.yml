name: chaos-suite

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8 AM UTC
  workflow_dispatch:
    inputs:
      scenario_filter:
        description: "Scenario category to test"
        required: false
        type: choice
        default: "all"
        options:
          - all
          - applications
          - boundary
          - compound
          - disk
          - network
          - semantic
      samples_per_category:
        description: "Scenarios to sample per category (0 = run all in category)"
        required: false
        default: "2"
      kurtosis_pos_ref:
        description: "kurtosis-pos branch/tag to deploy"
        required: false
        default: "feat/execution-specs"
      fast_mode:
        description: "Compress scenario timings for faster CI"
        required: false
        type: boolean
        default: true
      bor_image:
        description: "Bor Docker image (leave empty to auto-detect latest release)"
        required: false
        default: ""
      heimdall_v2_image:
        description: "Heimdall-v2 Docker image (leave empty to auto-detect latest release)"
        required: false
        default: ""
      erigon_image:
        description: "Erigon Docker image (leave empty to auto-detect latest release)"
        required: false
        default: ""

permissions:
  contents: read
  packages: read

concurrency:
  group: chaos-suite-${{ github.ref }}
  cancel-in-progress: true

env:
  ENCLAVE_NAME: pos
  KURTOSIS_POS_REF: ${{ inputs.kurtosis_pos_ref || 'feat/execution-specs' }}

jobs:
  resolve-images:
    runs-on: ubuntu-latest
    outputs:
      bor-image: ${{ steps.resolve.outputs.bor-image }}
      heimdall-v2-image: ${{ steps.resolve.outputs.heimdall-v2-image }}
      erigon-image: ${{ steps.resolve.outputs.erigon-image }}
    steps:
      - name: Resolve bor and heimdall-v2 images
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BOR_IMAGE: ${{ inputs.bor_image }}
          INPUT_HEIMDALL_V2_IMAGE: ${{ inputs.heimdall_v2_image }}
          INPUT_ERIGON_IMAGE: ${{ inputs.erigon_image }}
        run: |
          # Use explicit images if provided
          if [[ -n "${INPUT_BOR_IMAGE}" ]]; then
            echo "bor-image=${INPUT_BOR_IMAGE}" >> "$GITHUB_OUTPUT"
          else
            bor_tag=$(gh api repos/0xPolygon/bor/releases --jq \
              '[.[] | select(.draft == false)] | .[0].tag_name' 2>/dev/null || echo "")
            if [[ -n "$bor_tag" ]]; then
              echo "bor-image=0xpolygon/bor:${bor_tag#v}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch bor release, using 'latest'."
              echo "bor-image=0xpolygon/bor:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [[ -n "${INPUT_HEIMDALL_V2_IMAGE}" ]]; then
            echo "heimdall-v2-image=${INPUT_HEIMDALL_V2_IMAGE}" >> "$GITHUB_OUTPUT"
          else
            hv2_tag=$(gh api repos/0xPolygon/heimdall-v2/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [[ -n "$hv2_tag" ]]; then
              echo "heimdall-v2-image=0xpolygon/heimdall-v2:${hv2_tag#v}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch heimdall-v2 release, using 'latest'."
              echo "heimdall-v2-image=0xpolygon/heimdall-v2:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

          # Erigon keeps the 'v' prefix in image tags (unlike bor/heimdall which strip it)
          if [[ -n "${INPUT_ERIGON_IMAGE}" ]]; then
            echo "erigon-image=${INPUT_ERIGON_IMAGE}" >> "$GITHUB_OUTPUT"
          else
            erigon_tag=$(gh api repos/0xPolygon/erigon/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
            if [[ -n "$erigon_tag" && "$erigon_tag" != "null" ]]; then
              echo "erigon-image=0xpolygon/erigon:${erigon_tag}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Failed to fetch erigon release, using 'latest'."
              echo "erigon-image=0xpolygon/erigon:latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Summary
        env:
          BOR_IMAGE: ${{ steps.resolve.outputs.bor-image }}
          HV2_IMAGE: ${{ steps.resolve.outputs.heimdall-v2-image }}
          ERIGON_IMAGE: ${{ steps.resolve.outputs.erigon-image }}
        run: |
          echo "### Chaos Suite Image Resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bor | \`${BOR_IMAGE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Heimdall-v2 | \`${HV2_IMAGE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Erigon | \`${ERIGON_IMAGE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kurtosis-pos ref | \`${KURTOSIS_POS_REF}\` |" >> "$GITHUB_STEP_SUMMARY"

  run-chaos-tests:
    needs: resolve-images
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout chaos-utils
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout kurtosis-pos
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: 0xPolygon/kurtosis-pos
          ref: ${{ env.KURTOSIS_POS_REF }}
          path: kurtosis-pos

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Install Kurtosis
        env:
          KURTOSIS_VERSION: "1.17.7"
        run: |
          curl -fsSL -o /tmp/kurtosis-cli.deb \
            "https://github.com/kurtosis-tech/kurtosis-cli-release-artifacts/releases/download/${KURTOSIS_VERSION}/kurtosis-cli_${KURTOSIS_VERSION}_linux_amd64.deb"
          sudo dpkg -i /tmp/kurtosis-cli.deb
          rm /tmp/kurtosis-cli.deb
          kurtosis analytics disable || true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build chaos-runner
        run: make build-runner

      - name: Build sidecar image
        run: docker build . --tag jhkimqd/chaos-utils:latest --file ./Dockerfile.chaos-utils

      - name: Generate kurtosis params
        env:
          BOR_IMAGE: ${{ needs.resolve-images.outputs.bor-image }}
          HV2_IMAGE: ${{ needs.resolve-images.outputs.heimdall-v2-image }}
          ERIGON_IMAGE: ${{ needs.resolve-images.outputs.erigon-image }}
        run: |
          echo "Bor:         ${BOR_IMAGE}"
          echo "Heimdall-v2: ${HV2_IMAGE}"
          echo "Erigon:      ${ERIGON_IMAGE}"

          # 8 validators + 1 Bor RPC node + 1 Erigon RPC node for chaos testing.
          # Chaos scenarios reference validators l2-el-[1-8], Bor RPC l2-el-9,
          # and Erigon RPC l2-el-10.
          cat > /tmp/chaos-params.yml <<PARAMS
          polygon_pos_package:
            participants:
              - kind: validator
                count: 8
                el_bor_produce_witness: true
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_IMAGE}"

              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: bor
                el_image: "${BOR_IMAGE}"

              - kind: rpc
                count: 1
                cl_type: heimdall-v2
                cl_image: "${HV2_IMAGE}"
                el_type: erigon
                el_image: "${ERIGON_IMAGE}"

            additional_services:
              - observability
          PARAMS

          echo "--- Generated params ---"
          cat /tmp/chaos-params.yml

      - name: Deploy devnet
        run: |
          set -o pipefail
          pushd kurtosis-pos
          timeout 900 kurtosis run \
            --enclave=${ENCLAVE_NAME} \
            --args-file /tmp/chaos-params.yml \
            . 2>&1 | tee ../deploy.log
          popd

      - name: Wait for network readiness
        run: |
          VALIDATOR_RPC="$(timeout 30 kurtosis port print ${ENCLAVE_NAME} l2-el-1-bor-heimdall-v2-validator rpc)"
          # Normalize: strip any existing scheme, then prepend http://
          VALIDATOR_RPC="${VALIDATOR_RPC#http://}"
          VALIDATOR_RPC="${VALIDATOR_RPC#https://}"
          RPC_URL="http://${VALIDATOR_RPC}"
          echo "Waiting for 40 blocks on ${RPC_URL}..."

          for i in $(seq 1 120); do
            BLOCK=$(timeout 5 cast bn --rpc-url "${RPC_URL}" 2>/dev/null || echo "0")
            echo "Block: ${BLOCK}/40 (attempt ${i}/120)"
            if [[ "${BLOCK}" -ge 40 ]]; then
              echo "Network ready!"
              break
            fi
            if [[ "${i}" -eq 120 ]]; then
              echo "::error::Network did not reach 40 blocks in 10 minutes"
              exit 1
            fi
            sleep 5
          done

      - name: Select and run chaos scenarios
        env:
          INPUT_SCENARIO_FILTER: ${{ inputs.scenario_filter }}
          INPUT_SAMPLES_PER_CATEGORY: ${{ inputs.samples_per_category }}
          INPUT_FAST_MODE: ${{ inputs.fast_mode }}
        run: bash scripts/ci/run-chaos-suite.sh

      - name: Dump enclave logs
        if: failure()
        run: timeout 120 kurtosis dump ./dump

      - name: Upload enclave dump
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: chaos-enclave-dump-${{ github.run_id }}
          path: ./dump
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: chaos-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Cleanup enclave
        if: always()
        run: |
          timeout 30 kurtosis enclave stop ${ENCLAVE_NAME} 2>/dev/null || true
          timeout 30 kurtosis enclave rm ${ENCLAVE_NAME} 2>/dev/null || true
