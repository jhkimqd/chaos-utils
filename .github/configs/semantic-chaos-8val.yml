# Semantic Chaos Testing — 8 validators + 2 RPC nodes
#
# General-purpose topology for all chaos-utils semantic scenarios including
# buffer-overflow simulations and Heimdall REST / Bor RPC corruption.
# All images are stock — no custom builds required.
#
# 8 validators allows corrupting up to 3 while keeping > 2/3 quorum (5/8).
# Scenarios reference l2-el-[1-8]-bor-heimdall-v2-validator.
#
# Deploy:
#   kurtosis run --enclave=chaos \
#     --args-file .github/configs/semantic-chaos-8val.yml \
#     /path/to/kurtosis-pos

polygon_pos_package:
  participants:
    - kind: validator
      count: 8
      el_bor_produce_witness: true
      cl_type: heimdall-v2
      el_type: bor

    - kind: rpc
      count: 1
      el_bor_sync_with_witness: true
      cl_type: heimdall-v2
      el_type: bor

    - kind: rpc
      count: 1
      cl_type: heimdall-v2
      el_type: erigon

  additional_services:
    - bridge_spammer
    - observability
    - tx_spammer
